  {t:'Brachioradialis',d:'Origin: lateral supracondylar ridge of humerus. Insertion: styloid process of radius (distal). Action: elbow flexion (especially when forearm semipronated). Nerve: radial nerve (C5,C6) — EXCEPTION: radial nerve flexor! "Brachioradialis is the beer drinking muscle."',m:'"Brachioradialis = radial nerve flexor (exception)." C5,C6. Semipronated handshake position.'},
  {t:'Pronator teres',d:'Humeral head: medial epicondyle. Ulnar head: coronoid process of ulna. Insertion: lateral mid-shaft of radius. Action: pronation + assists elbow flexion. Nerve: median nerve (C6,C7). Forms medial border of cubital fossa. Median nerve passes between its 2 heads.',m:'"Pronator teres = median nerve between heads." Pronator syndrome = median nerve compression here.'},
  {t:'Pronator quadratus',d:'Origin: anterior surface distal ulna. Insertion: anterior surface distal radius. Action: forearm pronation (primary pronator). Nerve: anterior interosseous nerve (branch of median, C8,T1). Deepest forearm layer.',m:'"Pronator quadratus = primary pronator." Deepest layer. AIN branch of median. Square muscle.'},
  {t:'Supinator',d:'Origin: lateral epicondyle + supinator crest of ulna. Insertion: lateral surface of proximal radius. Action: supination (in conjunction with biceps). Nerve: deep branch of radial nerve/posterior interosseous nerve (C6,C7). Radial nerve passes through it (arcade of Frohse = compression site).',m:'"Supinator = deep radial nerve passes through it." Arcade of Frohse = PIN compression site.'},
  {t:'Flexor carpi radialis (FCR)',d:'Origin: medial epicondyle (common flexor origin). Insertion: base of 2nd (primarily) + 3rd metacarpals. Action: wrist flexion + radial deviation (abduction). Nerve: median nerve (C6,C7). Tendon is landmark for carpal tunnel surgery (radial border).',m:'"FCR = wrist flex + radial deviate." Median nerve. Tendon = surgical landmark at wrist.'},
  {t:'Flexor carpi ulnaris (FCU)',d:'Humeral head: medial epicondyle. Ulnar head: olecranon + posterior ulna. Insertion: pisiform (sesamoid in tendon) + hamate + 5th metacarpal. Action: wrist flexion + ulnar deviation (adduction). Nerve: ulnar nerve (C7,C8). Pisiform is sesamoid in its tendon.',m:'"FCU = wrist flex + ulnar deviate." Ulnar nerve. Pisiform = sesamoid in FCU tendon.'},
  {t:'Palmaris longus',d:'Origin: medial epicondyle. Insertion: palmar aponeurosis + flexor retinaculum. Action: weak wrist flexion + tightens palmar fascia. Nerve: median nerve (C7,C8). Absent in ~14% of population (test: oppose thumb to little finger + flex wrist). Common tendon graft source.',m:'"Palmaris longus = absent in 14%." Common tendon graft (Tommy John surgery, ACL reconstruction).'},
  {t:'Flexor digitorum superficialis (FDS)',d:'2 heads: humeroulnar (medial epicondyle + coronoid) + radial (oblique line of radius). Insertion: margins of middle phalanges (digits 2-5) — bifurcates to allow FDP through (Camper\'s chiasm). Action: PIP joint flexion + assists MCP/wrist flexion. Nerve: median nerve (C7,C8,T1).',m:'"FDS = Superficialis = Stops at middle phalanx (PIP)." Splits to let FDP through. Median nerve.'},
  {t:'Flexor digitorum profundus (FDP)',d:'Origin: anterior + medial proximal ulna + interosseous membrane. Insertion: distal phalanges (digits 2-5) — passes through FDS split. Action: DIP joint flexion + assists PIP/MCP/wrist. Nerve: medial 2 digits = ulnar nerve (C8,T1); lateral 2 digits = AIN/median nerve. Jersey finger = FDP avulsion from ring finger.',m:'"FDP = Profundus = Pulls distal phalanx (DIP)." Split nerve supply. Jersey finger = ring finger FDP avulsion.'},
  {t:'Flexor pollicis longus (FPL)',d:'Origin: anterior radius + interosseous membrane. Insertion: distal phalanx of thumb. Action: flexion of thumb IP joint + assists MCP + CMC flexion. Nerve: anterior interosseous nerve (branch of median, C8,T1). "OK sign" tests FPL (with FDP of index).',m:'"FPL = thumb flexor." AIN branch of median. OK sign = FPL + FDP index finger.'},
  {t:'Extensor carpi radialis longus (ECRL)',d:'Origin: lateral supracondylar ridge of humerus. Insertion: base of 2nd metacarpal (dorsal). Action: wrist extension + radial deviation. Nerve: radial nerve (C6,C7). Lateral epicondyle region. Active during power grip.',m:'"ECRL = wrist extend + radial deviate." Radial nerve. Active in power grip (wrist extension).'},
  {t:'Extensor carpi radialis brevis (ECRB)',d:'Origin: lateral epicondyle (common extensor origin). Insertion: base of 3rd metacarpal (dorsal). Action: wrist extension + weak radial deviation. Nerve: posterior interosseous nerve (C7,C8). Most commonly affected in lateral epicondylitis (tennis elbow).',m:'"ECRB = tennis elbow tendon." Lateral epicondylitis most affects ECRB. PIN.'},
  {t:'Extensor carpi ulnaris (ECU)',d:'2 heads: humeral (lateral epicondyle) + ulnar (posterior ulna). Insertion: base of 5th metacarpal (dorsal). Action: wrist extension + ulnar deviation. Nerve: posterior interosseous nerve (C7,C8). Tendon can sublux with forearm rotation.',m:'"ECU = wrist extend + ulnar deviate." PIN. Tendon subluxation in forearm rotation.'},
  {t:'Extensor digitorum (ED)',d:'Origin: lateral epicondyle. Insertion: extensor expansion (dorsal digital expansion) of digits 2-5. Action: extension of MCP (primarily) + assists PIP/DIP extension + assists wrist extension. Nerve: posterior interosseous nerve (C7,C8). Tendons connected by juncturae tendinum.',m:'"ED = extends MCPs primarily." Juncturae tendinum connect tendons (can mask partial tendon injury).'},
  {t:'Intrinsic hand muscles overview',d:'Thenar eminence (APB, FPB, OP = median nerve; AP = ulnar). Hypothenar (ADM, FDM, ODM = ulnar nerve). Lumbricals 1+2 = median; 3+4 = ulnar. All interossei = ulnar. Lumbricals + interossei = MCP flexion + IP extension (intrinsic plus position).',m:'"LOAF = median (Lumbricals 1+2, Opponens, APB, FPB). All other intrinsics = ulnar."'},
  {t:'Dorsal interossei (×4)',d:'Bipennate muscles. Origin: adjacent sides of 2 metacarpals. Insertion: extensor expansion + base of proximal phalanges. Action: ABDUCTION of fingers from midline (middle finger = reference). Also flex MCPs + extend IPs. Nerve: ulnar nerve (C8,T1). "DAB = Dorsal ABduct."',m:'"DAB = Dorsal ABduct." 4 muscles, abduct from middle finger. All ulnar nerve.'},
  {t:'Palmar interossei (×3 or 4)',d:'Unipennate. Each digit except middle finger. Action: ADDUCTION of fingers toward midline. Also flex MCPs + extend IPs. Nerve: ulnar nerve (C8,T1). "PAD = Palmar ADduct."',m:'"PAD = Palmar ADduct." 3 muscles, adduct toward middle finger. Ulnar nerve.'},
  {t:'Lumbricals (×4)',d:'Origin: FDP tendons in palm. Insertion: radial side of extensor expansion (lateral band) digits 2-5. Action: MCP flexion + IP extension simultaneously (unique function — flexes one joint, extends distal joints). Nerve: lateral 2 = median; medial 2 = ulnar.',m:'"Lumbricals = flex MCP + extend IPs." Origin = FDP tendon (moves with finger). Lateral 2 median, medial 2 ulnar.'},
]},

// ══════════════════════════════════════════
// GROUP 9: TRUNK MUSCLES
// ══════════════════════════════════════════,section:'anatomy'},
{id:'muscles-trunk', label:'Trunk Muscles', icon:'🏋️', color:'#f5c842', cards:[
  {t:'Rectus abdominis',d:'Origin: pubic crest + symphysis. Insertion: costal cartilages 5-7 + xiphoid process. Action: flexion of trunk (sit-ups), posterior pelvic tilt, compresses abdominal contents. Nerve: intercostal nerves T7-T12. Enclosed in rectus sheath. Tendinous intersections at T8, T10, umbilicus. Linea semilunaris = lateral edge.',m:'"6-pack muscle." Linea alba = midline. Tendinous intersections at 3 levels. Linea semilunaris = lateral.'},
  {t:'External oblique',d:'Outermost abdominal muscle. Origin: external surfaces + inferior borders of ribs 5-12. Insertion: iliac crest + linea alba + pubic tubercle (inguinal ligament = folded inferior aponeurosis). Action: trunk flexion + compression + contralateral rotation. Nerve: intercostal T7-T12 + subcostal + iliohypogastric + ilioinguinal.',m:'"External oblique fibers = like hands in front pants pockets (downward-medial)." Contralateral rotation.'},
  {t:'Internal oblique',d:'Origin: thoracolumbar fascia + anterior iliac crest + lateral inguinal ligament. Insertion: inferior ribs 10-12 + aponeurosis to linea alba + inguinal region. Action: trunk flexion + compression + IPSILATERAL rotation. Nerve: intercostal T8-T12 + iliohypogastric + ilioinguinal.',m:'"Internal oblique = IPSILATERAL rotation (opposite of external)." Fibers run perpendicular to external.'},
  {t:'Transversus abdominis',d:'Deepest abdominal muscle. Origin: lower 6 costal cartilages + thoracolumbar fascia + iliac crest + inguinal ligament. Insertion: linea alba + pubic crest (conjoint tendon). Action: compresses abdominal contents (no rotation). Nerve: intercostal T7-T12 + iliohypogastric + ilioinguinal. Key for core stability.',m:'"TA = no movement, just compression." Deep core stabilizer. Activates before limb movement.'},
  {t:'Rectus sheath',d:'Aponeurotic envelope around rectus abdominis. Above arcuate line: anterior = EO aponeurosis + anterior IO aponeurosis; posterior = posterior IO + TA. Below arcuate line (halfway navel-pubis): ALL 3 aponeuroses pass anterior → posterior wall = only transversalis fascia + peritoneum.',m:'"Arcuate line = where rectus sheath changes." Below = no posterior sheath → rectus sits on transversalis fascia.'},
  {t:'Quadratus lumborum',d:'Origin: iliac crest + iliolumbar ligament. Insertion: 12th rib + transverse processes L1-L4. Action: lateral flexion of trunk + stabilizes 12th rib during inspiration + posterior pelvis. Nerve: subcostal + L1-L3 anterior rami. Forms posterior abdominal wall.',m:'"QL = lateral trunk flexion + fixes 12th rib." Posterior abdominal wall. Hip hike.'},
  {t:'Psoas major',d:'Origin: T12-L5 vertebral bodies + transverse processes + IVDs. Insertion: lesser trochanter (with iliacus = iliopsoas). Action: hip flexion + lumbar lateral flexion. Nerve: lumbar plexus (L1-L3 direct branches). Psoas abscess tracks down to femoral triangle.',m:'"Psoas = HIP flexor + lumbar side bender." Psoas abscess from spinal TB tracks to thigh.'},
  {t:'Iliacus',d:'Origin: iliac fossa + sacral ala. Insertion: lesser trochanter (merges with psoas = iliopsoas). Action: hip flexion. Nerve: femoral nerve (L2,L3,L4). Does NOT contribute to lateral flexion of lumbar spine (unlike psoas).',m:'"Iliacus = pure HIP flexor (no lumbar effect)." Femoral nerve. Iliacus hematoma = femoral neuropathy.'},
  {t:'Erector spinae group',d:'3 columns from lateral to medial: Iliocostalis (lateral, ribs), Longissimus (intermediate, transverse processes), Spinalis (medial, spinous processes). Origin: sacrum + iliac crest + spinous processes. Action: bilateral = extend spine; unilateral = lateral flexion. Nerve: dorsal primary rami.',m:'"ILS = Iliocostalis, Longissimus, Spinalis (lateral to medial)." All = extend spine when bilateral.'},
  {t:'Multifidus',d:'Deepest and most important spinal stabilizer. Fills laminar groove between spinous and transverse processes. Short fascicles cross 2-4 vertebral segments. Provides 2/3 of lumbar spinal stability. Atrophies in chronic low back pain. Nerve: dorsal primary rami at each level.',m:'"Multifidus = MOST IMPORTANT spinal stabilizer." Atrophies in chronic LBP. Fills laminar groove.'},
  {t:'Diaphragm',d:'Dome-shaped muscle separating thorax from abdomen. Central tendon (no muscle, fibrous). 3 openings: aortic hiatus T12 (aorta + thoracic duct + azygos), esophageal hiatus T10 (esophagus + vagus nerves), caval opening T8 (IVC + right phrenic nerve). Crura = muscular attachments to L1-L3 vertebrae. Nerve: phrenic nerve (C3,4,5).',m:'"Aorta At T12, Esophagus Enters T10, Caval opening T8." I Ate Ten Eggs At Eight. Phrenic = C345.'},
  {t:'Intercostals (external, internal, innermost)',d:'External (11 pairs): outer surface + inferior border of rib above → superior border rib below. Fibers: down-forward. Elevate ribs in inspiration. Internal (11): same attachments, fibers perpendicular to external. Depress ribs in FORCED expiration. Innermost: deep to internal, same action. All: intercostal nerves (T1-T11).',m:'"External elevate (inspiration). Internal depress (forced expiration)." VAN in costal groove under rib.'},
  {t:'Serratus posterior superior + inferior',d:'Superior: spinous processes C7-T3 → ribs 2-5. Elevate ribs (inspiration). Inferior: spinous processes T11-L3 → ribs 9-12. Depress/fix lower ribs against diaphragm pull. Both: thin muscle deep to erector spinae. Nerves: intercostal nerves.',m:'"Serratus posterior = respiratory accessory muscles." Superior = elevate ribs; inferior = fix lower ribs.'},
]},

// ══════════════════════════════════════════
// GROUP 10: GLUTEAL + HIP MUSCLES
// ══════════════════════════════════════════,section:'anatomy'},
{id:'muscles-hip', label:'Gluteal & Hip Muscles', icon:'🍑', color:'#f07060', cards:[
  {t:'Gluteus maximus',d:'Largest muscle in body. Origin: posterior ilium (behind posterior gluteal line) + posterior sacrum + coccyx + sacrotuberous ligament. Insertion: IT band (upper 3/4) + gluteal tuberosity of femur (lower 1/4). Action: hip extension + lateral rotation. NOT active in normal walking. Nerve: inferior gluteal (L5,S1,S2).',m:'"Glute max = stairs, running, rising from chair." NOT walking. Inferior gluteal nerve. Largest muscle.'},
  {t:'Gluteus medius',d:'Origin: external ilium between anterior + posterior gluteal lines. Insertion: lateral surface of greater trochanter. Action: hip abduction + medial rotation (anterior fibers) + pelvic stabilization in single-leg stance. Nerve: superior gluteal (L4,L5,S1). TRENDELENBURG sign when weak.',m:'"Glute med = TRENDELENBURG." Superior gluteal nerve. Pelvis drops to opposite side when weak.'},
  {t:'Gluteus minimus',d:'Origin: external ilium between anterior + inferior gluteal lines. Insertion: anterior surface of greater trochanter. Action: hip abduction + medial rotation. Nerve: superior gluteal (L4,L5,S1). Deep to gluteus medius. Same function.',m:'"Glute min = same function as glute med." Deep to medius. Superior gluteal nerve. Also Trendelenburg.'},
  {t:'Tensor fasciae latae (TFL)',d:'Origin: ASIS + anterior iliac crest. Insertion: IT band (Gerdy\'s tubercle of tibia via IT band). Action: hip flexion + abduction + medial rotation + tenses IT band. Nerve: superior gluteal (L4,L5,S1). Enclosed in fascia lata near ASIS.',m:'"TFL → IT band." Superior gluteal nerve (same as gluteus medius and minimus).'},
  {t:'Piriformis',d:'Origin: anterior sacrum (between sacral foramina). Insertion: superior border of greater trochanter. Action: lateral rotation + abduction of hip (at <60° flexion) → becomes internal rotator at >60° flexion. Nerve: nerve to piriformis (S1,S2). Sciatic nerve usually exits BELOW it (division in 10%).',m:'"Piriformis = 6 lateral rotators." Sciatic nerve exits inferior to it (usually). Piriformis syndrome.'},
  {t:'Short external rotators of hip',d:'6 muscles (POGO OG): Piriformis (S1,S2), Obturator internus (L5,S1,S2), Gemellus superior (L5,S1,S2), Gemellus inferior (L4,L5,S1), Obturator externus (L3,L4), Quadratus femoris (L4,L5,S1). All: lateral rotation. All insert: greater trochanter or trochanteric fossa.',m:'"POGO OG = 6 short lateral rotators." OR "Pleased Over Getting Quadriceps Going Often" (P,OI,GS,GI,QF,OE).'},
  {t:'Obturator internus',d:'Origin: inner surface of obturator membrane + bony margins. Leaves pelvis through lesser sciatic foramen (hooks around ischium). Insertion: trochanteric fossa (medial greater trochanter). Action: lateral rotation + abduction in flexed hip. Nerve: nerve to obturator internus (L5,S1,S2).',m:'"Obturator internus = exits lesser sciatic foramen." Only pelvic muscle exiting through lesser foramen.'},
  {t:'Obturator externus',d:'Origin: outer surface of obturator membrane + obturator foramen rim. Insertion: trochanteric fossa. Action: lateral rotation of hip. Nerve: posterior branch of obturator nerve (L3,L4). Deep muscle, hard to see clinically.',m:'"Obturator externus = only short lateral rotator from obturator nerve." L3,L4.'},
  {t:'Iliopsoas',d:'Iliacus (iliac fossa, femoral nerve L2-L4) + psoas major (T12-L5 vertebral bodies, lumbar plexus L1-L3). Both insert: lesser trochanter. Action: powerful hip flexion. Also: psoas = lumbar lateral flexion. Together: most powerful hip flexor. Psoas bursa (communicates with hip in 15%).',m:'"Iliopsoas = MOST POWERFUL hip flexor." Femoral nerve (iliacus). L1-L3 (psoas). Lesser trochanter.'},
  {t:'Pectineus',d:'Origin: pectineal line of pubis (pecten pubis). Insertion: pectineal line of femur (between lesser trochanter + linea aspera). Action: hip flexion + adduction. Nerve: femoral nerve (L2,L3) + sometimes obturator nerve. Medial floor of femoral triangle.',m:'"Pectineus = adducts + flexes hip." Femoral nerve. Forms floor of femoral triangle with iliacus.'},
  {t:'Adductor longus',d:'Origin: body of pubis (anterior surface). Insertion: medial lip of linea aspera (middle 1/3 femur). Action: adduction + flexion of hip. Nerve: anterior branch obturator nerve (L2,L3,L4). Most anterior adductor — forms medial boundary of femoral triangle.',m:'"Adductor longus = MEDIAL BORDER of femoral triangle." Most anterior adductor. Anterior obturator nerve.'},
  {t:'Adductor brevis',d:'Origin: body + inferior ramus of pubis. Insertion: pectineal line + upper linea aspera. Action: adduction of hip. Nerve: obturator nerve (L2,L3,L4). Deep to adductor longus.',m:'"Adductor brevis = deep to longus." Obturator nerve. Shorter and deeper adductor.'},
  {t:'Adductor magnus',d:'2 parts: adductor part (ischiopubic ramus → medial linea aspera, obturator nerve L2-L4) + hamstring part (ischial tuberosity → adductor tubercle of medial femoral condyle, sciatic/tibial nerve). Adductor hiatus = gap in adductor insertion → femoral vessels become popliteal vessels.',m:'"Adductor magnus = 2 nerves, 2 parts." Adductor hiatus = femoral vessels become popliteal.'},
  {t:'Gracilis',d:'Origin: inferior ramus of pubis + ischial ramus. Insertion: medial tibia (pes anserinus — with sartorius + semitendinosus). Action: hip adduction + knee flexion + medial rotation of tibia. Nerve: obturator nerve (L2,L3). Common free flap/graft donor.',m:'"Gracilis = pes anserinus + adducts + knee flexes." Obturator nerve. Common surgical graft.'},
  {t:'Sartorius',d:'Longest muscle in body. Origin: ASIS. Insertion: medial tibia (pes anserinus). Action: hip flexion + abduction + lateral rotation + knee flexion + medial rotation of tibia (FABLAR = Flexion, ABduction, Lateral rotation + knee flexion = tailor\'s position). Nerve: femoral nerve (L2,L3). Forms lateral border of femoral triangle.',m:'"Sartorius = LONGEST muscle." Tailor\'s muscle (cross-legged position). Forms lateral border femoral triangle.'},
]},

// ══════════════════════════════════════════
// GROUP 11: THIGH MUSCLES
// ══════════════════════════════════════════,section:'anatomy'},
{id:'muscles-thigh', label:'Thigh Muscles', icon:'🦵', color:'#4ecdc4', cards:[
  {t:'Rectus femoris',d:'Origin: AIIS (direct head) + acetabular rim (indirect/reflected head). Insertion: tibial tuberosity via patellar tendon. Action: knee extension + hip flexion (crosses both). Nerve: femoral nerve (L2,L3,L4). Only quadriceps crossing hip. 2-joint muscle: affected by hip position in stretching.',m:'"Rectus = 2-joint quad." AIIS origin. Hip position affects its function. Strain near AIIS in kicking.'},
  {t:'Vastus lateralis',d:'Origin: greater trochanter + lateral lip of linea aspera + lateral intermuscular septum. Insertion: lateral patella + tibial tuberosity (via quad tendon → patellar ligament). Action: knee extension. Nerve: femoral (L2,L3,L4). Largest quadriceps. IM injection site in infants.',m:'"VL = lateral quad, largest quad." Pulls patella laterally. IM injection site infant.'},
  {t:'Vastus medialis',d:'Origin: intertrochanteric line + medial lip of linea aspera + medial supracondylar ridge. Insertion: medial patella + tibial tuberosity. Action: knee extension + medial patellar stabilization (VMO = oblique fibers). Nerve: femoral (L2,L3,L4). VMO atrophies first in knee pathology.',m:'"VMO = medial stabilizer of patella." Teardrop shape medial distal thigh. First to atrophy.'},
  {t:'Vastus intermedius',d:'Origin: anterior + lateral shaft of femur (upper 2/3). Insertion: tibial tuberosity via quad tendon. Action: knee extension. Nerve: femoral (L2,L3,L4). Deep to rectus femoris. Articularis genu = deepest part, pulls suprapatellar bursa during extension.',m:'"Vastus intermedius = deepest quad." Articularis genu = small deep portion that retracts bursa.'},
  {t:'Biceps femoris',d:'Long head: ischial tuberosity (with semitendinosus). Short head: lateral lip of linea aspera + lateral supracondylar ridge. Insertion: fibular head + lateral condyle of tibia. Action: knee flexion + lateral rotation of tibia. Long head: hip extension. Nerve: long head = tibial division sciatic (L5,S1,S2); short head = common fibular division (L5,S1,S2).',m:'"Biceps femoris = LATERAL hamstring." 2 heads, 2 nerves. Lateral rotation of tibia at knee.'},
  {t:'Semitendinosus',d:'Origin: ischial tuberosity (common tendon with long head biceps femoris). Insertion: medial tibia (pes anserinus = with gracilis + sartorius). Action: hip extension + knee flexion + medial rotation of tibia. Nerve: tibial division of sciatic (L5,S1,S2). Long thin tendon in distal thigh.',m:'"Semitendinosus = medial hamstring, pes anserinus." Long cord-like tendon. Medial rotation of tibia.'},
  {t:'Semimembranosus',d:'Origin: ischial tuberosity (separate attachment, lateral). Insertion: posterior medial condyle of tibia. Also sends expansions: oblique popliteal ligament (reinforces posterior capsule), semimembranosus bursa. Action: hip extension + knee flexion + medial rotation. Nerve: tibial division of sciatic (L5,S1,S2).',m:'"Semimembranosus = membranous proximal tendon." Posterior medial tibial condyle. Oblique popliteal ligament.'},
  {t:'Popliteus',d:'Origin: lateral femoral condyle + popliteal ligament. Insertion: posterior proximal tibia. Action: UNLOCKS the knee (medially rotates tibia on fixed femur OR laterally rotates femur on fixed tibia) + knee flexion. Nerve: tibial nerve (L4,L5,S1). "Key to unlock the knee."',m:'"Popliteus = UNLOCKS knee." Medial rotation to start flexion from full extension. Tibial nerve.'},
]},

// ══════════════════════════════════════════
// GROUP 12: LEG + FOOT MUSCLES
// ══════════════════════════════════════════,section:'anatomy'},
{id:'muscles-leg', label:'Leg & Foot Muscles', icon:'🦶', color:'#f472b6', cards:[
  {t:'Gastrocnemius',d:'2 heads: medial (larger, from medial femoral condyle) + lateral (from lateral femoral condyle). Both heads → Achilles tendon → calcaneal tuberosity. Action: plantarflexion + knee flexion (crosses knee). Nerve: tibial nerve (S1,S2). Together with soleus = triceps surae. Thompson test = Achilles rupture.',m:'"Gastroc = ankle + knee." Only leg muscle crossing knee. Thompson test.'},
  {t:'Soleus',d:'Origin: posterior head of fibula + soleal line of tibia + fibrous arch between. Insertion: Achilles tendon → calcaneal tuberosity. Action: plantarflexion ONLY (does NOT cross knee). Active in standing/walking even with knee bent. Nerve: tibial nerve (S1,S2). Soleus DVT sinuses common clot origin.',m:'"Soleus = pure plantarflexion, postural." DVT sinuses. Active even with knee bent (unlike gastrocnemius).'},
  {t:'Plantaris',d:'Origin: lateral supracondylar ridge. Insertion: medial calcaneal tuberosity (medial to Achilles). Action: weak plantarflexion + knee flexion. Nerve: tibial nerve (S1,S2). Long thin tendon, absent in 10%. Confused with Achilles rupture (continued plantarflexion if Achilles ruptured = plantaris still working).',m:'"Plantaris = tiny, frequently absent." Confused with Achilles rupture clinically.'},
  {t:'Tibialis anterior',d:'Origin: lateral condyle + lateral surface of tibia + interosseous membrane. Insertion: medial cuneiform + base of 1st metatarsal (medial + plantar surface). Action: dorsiflexion + inversion. Nerve: deep fibular (peroneal) nerve (L4,L5). L4 myotome = dorsiflexion.',m:'"TA = dorsiflexion + inversion." L4 nerve (foot drop = L4). Deep fibular nerve.'},
  {t:'Extensor hallucis longus (EHL)',d:'Origin: middle anterior fibula + interosseous membrane. Insertion: dorsal base of distal phalanx of hallux. Action: extension of great toe + dorsiflexion + inversion. Nerve: deep fibular nerve (L5). L5 myotome = great toe extension.',m:'"EHL = great toe extension." L5 nerve (L5 root = great toe). Deep fibular nerve.'},
  {t:'Extensor digitorum longus (EDL)',d:'Origin: lateral condyle of tibia + fibula + interosseous membrane. Insertion: extensor expansion of toes 2-5 (middle + distal phalanges). Action: extension of toes 2-5 + dorsiflexion + eversion. Nerve: deep fibular nerve (L5,S1).',m:'"EDL = toes 2-5 extension + dorsiflexion." Deep fibular nerve. Lateral foot drop compensation.'},
  {t:'Fibularis (Peroneus) longus',d:'Origin: head + upper 2/3 of fibula + lateral condyle of tibia. Insertion: medial cuneiform + base of 1st metatarsal (crosses sole diagonally in peroneal groove of cuboid). Action: eversion + plantarflexion. Nerve: superficial fibular nerve (L5,S1). Supports transverse arch. Sesamoid (os peroneum) in tendon.',m:'"Fibularis longus crosses sole = transverse arch support." Superficial fibular nerve. L5,S1.'},
  {t:'Fibularis (Peroneus) brevis',d:'Origin: lower 2/3 of fibula. Insertion: tuberosity of 5th metatarsal. Action: eversion + plantarflexion. Nerve: superficial fibular nerve (L5,S1). Avulsion of 5th MT tuberosity in inversion sprain (most common ankle X-ray). Jones fracture = stress fracture at base (NOT tuberosity).',m:'"Brevis = 5th MT tuberosity." Avulsion = peroneus brevis pull. Jones fracture ≠ avulsion fracture.'},
  {t:'Fibularis (Peroneus) tertius',d:'Origin: lower anterior fibula. Insertion: dorsal base of 5th metatarsal. Action: dorsiflexion + eversion. Nerve: deep fibular nerve (L5,S1). Absent in ~8%. Extension of extensor digitorum longus.',m:'"Tertius = 3rd peroneal, variable." Only peroneal to deep fibular nerve. Eversion + dorsiflexion.'},
  {t:'Tibialis posterior',d:'Origin: posterior tibia (lateral to vertical line) + fibula + interosseous membrane. Insertion: navicular (primary) + cuneiform bones + cuboid + bases of MT2-4. Action: plantarflexion + INVERSION (primary invertor). Nerve: tibial nerve (L4,L5). Primary stabilizer of medial longitudinal arch. Dysfuction → adult-acquired flatfoot.',m:'"Tibialis posterior = primary invertor + arch stabilizer." Tibial nerve. "Too many toes" sign in dysfunction.'},
  {t:'Flexor digitorum longus (FDL)',d:'Origin: posterior tibia (medial to vertical line). Insertion: distal phalanges of toes 2-5. Passes behind medial malleolus → divides in sole. Action: flexion of toes (curling toes) + plantarflexion + inversion. Nerve: tibial nerve (L5,S1). Tendon divides (Tom = tibialis posterior, Dick = FDL, Harry = FHL).',m:'"Tom, Dick, And Nervous Harry" = T.P., FDL, FHL, Nerves, vessels (medial to lateral at medial malleolus).'},
  {t:'Flexor hallucis longus (FHL)',d:'Origin: posterior fibula + interosseous membrane. Insertion: plantar base of distal phalanx of hallux. Passes through sustentaculum tali groove (calcaneus). Action: flexion of great toe + plantarflexion + supination. Nerve: tibial nerve (L5,S1,S2). Trigger toe = FHL stenosing tenosynovitis.',m:'"FHL = "Most POWERFUL toe flexor." Passes through sustentaculum tali. Trigger toe in dancers.'},
  {t:'Intrinsic foot muscles (overview)',d:'Layer 1 (most superficial): abductor hallucis, flexor digitorum brevis, abductor digiti minimi. Layer 2: quadratus plantae, lumbricals. Layer 3: flexor hallucis brevis, adductor hallucis, flexor digiti minimi. Layer 4 (deepest): dorsal interossei, plantar interossei. Most: medial or lateral plantar nerve (tibial nerve branches).',m:'"4 layers of foot intrinsics, superficial to deep." Medial plantar nerve = most. Lateral plantar = rest.'},
  {t:'Extensor digitorum brevis + Extensor hallucis brevis',d:'Origin: superior calcaneus + sinus tarsi. EDB: extension of toes 2-4 (via EDL tendons). EHB: extension of great toe (to proximal phalanx). Nerve: deep fibular nerve (L5,S1). Only intrinsic muscles on dorsum of foot. Clinically: EDB belly seen as soft swelling over sinus tarsi.',m:'"EDB + EHB = only dorsal foot intrinsics." Deep fibular nerve. EDB belly = clinically palpable.'},
]},

// ══════════════════════════════════════════
// GROUP 13: LIGAMENTS (COMPREHENSIVE)
// ══════════════════════════════════════════,section:'anatomy'},
{id:'lig-spine', label:'Spinal Ligaments', icon:'🔗', color:'#7c9ef8', cards:[
  {t:'Anterior longitudinal ligament (ALL)',d:'Runs entire length of vertebral column — anterior surface of vertebral bodies + IVDs. From occiput to sacrum. Broad, strong. Prevents hyperextension of spine. Only ligament tightened in EXTENSION.',m:'"ALL = limits hyperEXTENSION." Runs anterior to vertebral bodies.'},
  {t:'Posterior longitudinal ligament (PLL)',d:'Runs posterior surfaces of vertebral bodies inside vertebral canal. Narrow (hourglass shape — wider over IVDs, narrower over vertebral bodies). Resists hyperflexion. Does NOT prevent posterolateral disc herniation (where it is thin).',m:'"PLL = limits flexion, narrow posterolaterally." Disc herniation occurs at PLL weak spots (posterolateral).'},
  {t:'Ligamentum flavum',d:'Connects adjacent laminae — from C2/C3 to L5/S1. Yellow (high elastin content — 80% elastin, 20% collagen). Highest elastin of any ligament. Maintains upright posture without muscle effort. Hypertrophies with age → spinal stenosis. Important in epidural injections.',m:'"Ligamentum flavum = YELLOW ligament." Hypertrophy → spinal stenosis. Elastin keeps spine upright.'},
  {t:'Interspinous ligaments',d:'Connect adjacent spinous processes — from apex to root. Relatively weak. Disrupted in flexion injuries (seat belt injury). Merges with supraspinous ligament posteriorly.',m:'"Interspinous = between spinous processes." Weak. Disrupted in flexion-distraction (seat belt) injuries.'},
  {t:'Supraspinous ligament',d:'Runs along tips of spinous processes from C7 to sacrum. Above C7 = nuchal ligament (septum nuchae in posterior midline neck). Resists flexion. Last posterior ligament to fail in progressive flexion injury.',m:'"Supraspinous = last to fail in flexion." C7 upward = nuchal ligament.'},
  {t:'Transverse ligament of atlas',d:'Crosses C1 ring posterior to dens (odontoid process). Holds dens against anterior arch of C1. Critical for atlantoaxial stability. Torn in: rheumatoid arthritis (pannus erodes it), Down syndrome (ligamentous laxity), trauma. Rupture → atlantoaxial instability → cord compression at C1-C2.',m:'"Transverse lig holds dens." Torn in RA + Down syndrome. Atlantoaxial instability.'},
  {t:'Alar ligaments',d:'Bilateral ligaments from sides of dens → occipital condyles. Limit rotation + contralateral lateral flexion. Provide atlantoaxial stability with transverse ligament. Tested with alar ligament stress tests (lateral flexion stops C1 rotation).',m:'"Alar ligaments = check reins of head rotation." Bilateral. Limit rotation + contralateral lateral flexion.'},
  {t:'Iliolumbar ligament',d:'Runs from transverse processes of L4-L5 → iliac crest. Restrains L5 on sacrum, resists anterior slide of L5. Also tethers L5 to pelvis. Important stabilizer of lumbosacral junction. Can be strained in heavy lifting.',m:'"Iliolumbar lig = tethers L5 to ilium." Prevents anterior displacement of L5. Strain in heavy lifting.'},
],section:'anatomy'},
{id:'lig-shoulder', label:'Shoulder Ligaments', icon:'🤝', color:'#b084f5', cards:[
  {t:'Glenohumeral ligaments (SGHL, MGHL, IGHL)',d:'Superior GHL: from supraglenoid tubercle → lesser tubercle. Limits ER at 0° abduction. Middle GHL: from anterior glenoid → lesser tubercle. Limits ER at 45–60° abduction. Inferior GHL (strongest): anterior + posterior bands + axillary pouch. Limits ER + anterior-inferior translation at 90° abduction. Bankart lesion = anterior IGHL + labrum avulsion.',m:'"IGHL = most important at 90° (throwing position)." Bankart = IGHL + anterior labrum.'},
  {t:'Coracohumeral ligament (CHL)',d:'From base + lateral coracoid → greater + lesser tubercles of humerus. Covers rotator interval (gap between supraspinatus + subscapularis). Limits ER at side + inferior translation. Contracted in frozen shoulder (adhesive capsulitis) → most limits ER.',m:'"CHL = contracted in frozen shoulder." Limits ER most. Rotator interval ligament.'},
  {t:'Coracoacromial ligament (CAL)',d:'From coracoid process → acromion. Completes coracoacromial arch (CA arch). Prevents superior humeral head migration. Supraspinatus impinges under this arch. NOT a true joint ligament — a ligamentous roof. Sometimes surgically divided in acromioplasty.',m:'"CA arch = coracoacromial ligament + acromion + coracoid." Supraspinatus impinges under it.'},
  {t:'Coracoclavicular ligaments (trapezoid + conoid)',d:'Suspend the scapula from clavicle. Trapezoid (lateral): coracoid → trapezoid line of clavicle. Resists anterior translation. Conoid (medial): coracoid → conoid tubercle of clavicle. Resists superior displacement. Primary suspensors of upper limb from clavicle.',m:'"CC ligaments = vertical stability of ACJ." Trapezoid (lateral) + conoid (medial). AC separation disrupts these.'},
  {t:'Acromioclavicular (AC) ligaments',d:'Superior + inferior AC ligaments surround ACJ. Provide horizontal stability. Resist AP translation at ACJ. Disrupted in Grade I-II AC sprains. Coracoclavicular ligaments disrupted in Grade III+.',m:'"AC ligaments = horizontal stability." CC ligaments = vertical stability. Grades I-II = AC only; III+ = CC also.'},
  {t:'Sternoclavicular (SC) ligaments',d:'Anterior + posterior SC ligaments. Costoclavicular ligament (strongest). Interclavicular ligament. SC joint is only true joint connecting UL to axial skeleton. Costoclavicular lig = strongest = "rhomboid ligament." SC joint rarely dislocated; posterior dislocation = emergency (compresses trachea/great vessels).',m:'"SC joint = only axial-UL connection." Posterior SC dislocation = emergency (trachea compression).'},
],section:'anatomy'},
{id:'lig-elbow-wrist', label:'Elbow & Wrist Ligaments', icon:'✋', color:'#52d18a', cards:[
  {t:'Ulnar collateral ligament of elbow (UCL)',d:'3 bundles: anterior (most important, thickest), posterior, transverse. Medial epicondyle → coronoid process (anterior) + olecranon (posterior). PRIMARY valgus stabilizer. Anterior bundle = primary restraint in throwing. Tommy John = UCL reconstruction.',m:'"UCL anterior bundle = primary valgus stabilizer." Tommy John surgery. Medial epicondyle to coronoid.'},
  {t:'Radial collateral ligament of elbow (RCL)',d:'Lateral epicondyle → annular ligament + ulna. Primary varus stabilizer. Part of lateral collateral ligament complex (with lateral ulnar collateral). Disrupted in posterolateral rotatory instability (PLRI).',m:'"RCL = lateral epicondyle to annular lig." Varus stabilizer. PLRI when torn.'},
  {t:'Lateral ulnar collateral ligament (LUCL)',d:'Lateral epicondyle → proximal ulna (crista supinatoris). KEY for posterolateral rotatory stability. Disrupted in PLRI (posterolateral rotatory instability) after elbow dislocation or lateral release for tennis elbow.',m:'"LUCL = posterolateral rotatory stability." PLRI if torn. Most important lateral elbow ligament.'},
  {t:'Annular ligament of radius',d:'Encircles radial head: from anterior → posterior margin of radial notch of ulna. Holds radial head in radial notch (proximal RUJ). Lined with fibrocartilage + synovium. Allows pronation/supination. Nursemaid\'s elbow = annular ligament slips over radial head.',m:'"Annular lig = ring around radial head." Nursemaid\'s (pulled elbow) = slips over radial head.'},
  {t:'Flexor retinaculum (transverse carpal ligament)',d:'Pisiform + hamate (medial) → scaphoid tubercle + trapezium (lateral). Roof of carpal tunnel. Contains: 4 FDS + 4 FDP + 1 FPL tendons + median nerve (10 structures). Ulnar nerve is OUTSIDE in Guyon\'s canal. Carpal tunnel release = divide this ligament.',m:'"10 structures in carpal tunnel." Ulnar nerve OUTSIDE. CTS = median nerve compression.'},
  {t:'Extensor retinaculum (wrist)',d:'Horizontal band on dorsum of wrist retaining extensor tendons in 6 compartments. Compartment 1: APL + EPB (de Quervain\'s tenosynovitis). Compartment 2: ECRL + ECRB. Compartment 3: EPL (Drummer\'s palsy). Compartment 4: EDC + EIP. Compartment 5: EDM. Compartment 6: ECU.',m:'"6 extensor compartments." De Quervain\'s = compartment 1 (APL + EPB). EPL can rupture (distal radius fractures).'},
  {t:'Scapholunate ligament (SL)',d:'Intrinsic wrist ligament connecting scaphoid + lunate. Most important wrist ligament for carpal stability. Tear = scapholunate dissociation = "Terry Thomas sign" (gap between scaphoid + lunate on AP X-ray). Wrist instability: DISI (scaphoid flexes forward, lunate extends).',m:'"SL lig = most important wrist lig." SL dissociation = Terry Thomas sign (gap on X-ray).'},
  {t:'Lunotriquetral ligament (LT)',d:'Intrinsic ligament connecting lunate + triquetrum. LT tear → VISI pattern (volar intercalated segment instability). Less common than SL injury. LT compression test positive.',m:'"LT lig tear → VISI." Ulnar-sided wrist pain. LT ballottement test.'},
],section:'anatomy'},
{id:'lig-hip', label:'Hip Ligaments', icon:'🦴', color:'#f5c842', cards:[
  {t:'Iliofemoral ligament (Y-ligament of Bigelow)',d:'STRONGEST ligament in body (~350N force to rupture). 2 bands: iliotrochanteric (lateral, from ASIS to greater trochanter) + iliocapsular (medial, from AIIS to lesser trochanter). Limits hip extension + external rotation. Tightens in standing → "screws" femoral head into acetabulum → passive standing with minimal muscle use.',m:'"Iliofemoral = STRONGEST ligament (body)." Y-shape from ASIS/AIIS. Limits hyperextension.'},
  {t:'Pubofemoral ligament',d:'From pubic part of acetabular rim + superior pubic ramus → intertrochanteric line (inferior). Limits abduction + extension of hip. Reinforces inferior + anterior capsule.',m:'"Pubofemoral = limits abduction." Inferior-anterior capsule reinforcement.'},
  {t:'Ischiofemoral ligament',d:'From ischial part of acetabular rim → posterior greater trochanter. Limits internal rotation + extension. Posterior capsule reinforcement. Weakest of the 3 main hip capsular ligaments.',m:'"Ischiofemoral = posterior capsule, limits internal rotation." Weakest hip lig.'},
  {t:'Ligamentum teres (round ligament of femur)',d:'From acetabular notch (transverse acetabular ligament) → fovea capitis of femoral head. Carries blood supply to femoral head in CHILDREN (obturator artery branch). In adults: minimal mechanical role, carries small artery. Torn in hip dislocation. AVN risk when torn in children.',m:'"Ligamentum teres = blood supply femoral head in children." Tears in hip dislocation.'},
  {t:'Transverse acetabular ligament',d:'Bridges acetabular notch, completing the acetabular ring. Converts notch into foramen. Allows obturator vessels + ligamentum teres to enter acetabulum.',m:'"Transverse acetabular lig = bridges notch." Creates foramen for ligamentum teres + obturator vessels.'},
  {t:'Labrum of hip (acetabular labrum)',d:'Fibrocartilaginous rim deepening acetabulum. Increases contact area by 28%, depth by 21%. Anterior labrum: most commonly torn (hip impingement/FAI). SLAP-equivalent of hip. Labral tears: groin pain + clicking + C-sign.',m:'"Acetabular labrum = deepens hip socket." Anterior most torn. FAI tears labrum.'},
],section:'anatomy'},
{id:'lig-knee', label:'Knee Ligaments', icon:'🦵', color:'#f07060', cards:[
  {t:'ACL (Anterior Cruciate Ligament)',d:'2 bundles: AM (anteromedial, primary, taut in flexion) + PL (posterolateral, taut in extension). Origin: anterior intercondylar area of tibia. Insertion: posterior medial surface of LATERAL femoral condyle. Prevents: anterior tibial translation + tibial IR. Avascular center → cannot heal without surgery. Female ACL: narrower notch, wider Q-angle, hormonal factors.',m:'"ACL: femoral attachment = LATERAL condyle." Lachman = most sensitive. Cannot heal spontaneously.'},
  {t:'PCL (Posterior Cruciate Ligament)',d:'2 bundles: AL (anterolateral, larger, primary) + PM (posteromedial). Origin: posterior intercondylar tibia. Insertion: anterior medial surface of MEDIAL femoral condyle. Prevents: posterior tibial translation. STRONGEST knee ligament (2× ACL strength). Dashboard injury mechanism.',m:'"PCL: femoral attachment = MEDIAL condyle." Strongest knee lig. Dashboard + fall on flexed knee.'},
  {t:'MCL (Medial Collateral Ligament)',d:'2 layers: superficial MCL (femur → tibia, 4-5cm below joint line) + deep MCL (medial capsule, attached to medial meniscus). Superficial = PRIMARY valgus stabilizer. Deep attached to medial meniscus = meniscus also injured. Valgus stress test grades I-III.',m:'"Deep MCL attached to medial meniscus." Unhappy triad = ACL + MCL + medial meniscus. Heals without surgery.'},
  {t:'LCL (Lateral Collateral Ligament)',d:'Cord-like (NOT flat). From lateral femoral condyle → fibular head. NOT attached to lateral meniscus. Primary varus stabilizer. Part of posterolateral corner (PLC) with popliteofibular lig + popliteus tendon. Varus stress test.',m:'"LCL = cord-like, NOT attached to lateral meniscus." PLC = LCL + popliteofibular + popliteus.'},
  {t:'Posterior capsule + oblique popliteal ligament',d:'Posterior knee capsule reinforced by oblique popliteal ligament (expansion of semimembranosus tendon). Arcuate popliteal ligament = lateral expansion. Important secondary stabilizers. Resist hyperextension.',m:'"Oblique popliteal lig = semimembranosus expansion." Posterior capsule resists hyperextension.'},
  {t:'Medial + lateral menisci',d:'Fibrocartilage C-shaped. Medial: attached to MCL (can be torn with MCL injury), less mobile, more commonly torn. Lateral: more circular, not attached to LCL, more mobile. Functions: load distribution (transmit 50-70% load), shock absorption, joint lubrication, stability. Outer 1/3 vascular (red-red zone, heals). Inner 2/3 avascular (white-white, resection).',m:'"Medial meniscus attached to MCL → injured together." Outer = heals. Inner = avascular, cannot heal.'},
  {t:'Patellar ligament (patellar tendon)',d:'Continuation of quadriceps tendon through patella. From inferior pole of patella → tibial tuberosity. Transmits quad force for knee extension. Patellar tendinopathy at inferior pole. Rupture: gap below patella + high-riding patella. Osgood-Schlatter at tibial tuberosity (adolescent apophysitis).',m:'"Patellar lig rupture = gap BELOW." vs "Quad tendon rupture = gap ABOVE." Osgood-Schlatter at tuberosity.'},
],section:'anatomy'},
{id:'lig-ankle-foot', label:'Ankle & Foot Ligaments', icon:'🦶', color:'#4ecdc4', cards:[
  {t:'ATFL (Anterior talofibular ligament)',d:'From anterior distal fibula → anterior talus (lateral neck). Weakest lateral ankle ligament. Limits anterior talar slide + inversion at 0° plantarflexion. Most commonly torn in ankle sprains (~70%). Anterior drawer test positive when torn.',m:'"ATFL = most commonly torn." Weakest lateral lig. Anterior drawer test.'},
  {t:'CFL (Calcaneofibular ligament)',d:'From fibula (just anterior to tip of lateral malleolus) → lateral calcaneus. Crosses both tibiotalar and subtalar joints. Limits inversion in dorsiflexion. Torn in severe ankle sprains (2nd after ATFL). Talar tilt test positive when torn.',m:'"CFL = 2nd most commonly torn." Talar tilt test. Limits inversion in neutral-dorsiflexion.'},
  {t:'PTFL (Posterior talofibular ligament)',d:'From posterior lateral malleolus → posterior talus. STRONGEST of 3 lateral ligaments. Resists posterior talar displacement. Rarely torn (only in complete dislocation). Limits dorsiflexion.',m:'"PTFL = STRONGEST lateral ankle lig, RARELY torn." Only torn in frank dislocation.'},
  {t:'Deltoid ligament (4 parts)',d:'Medial ankle. Fan-shaped, very strong, frequently avulses bone rather than tearing. Tibionavicular → tibiospring → tibiocalcaneal → posterior tibiotalar bands. PRIMARY medial ankle stabilizer. Eversion mechanism. High ankle sprain often disrupts deltoid + syndesmosis.',m:'"Deltoid = medial fan, very strong." 4 parts. Eversion mechanism. Often avulses malleolus.'},
  {t:'Syndesmotic ligaments (high ankle)',d:'Anterior inferior tibiofibular lig (AITFL — most commonly injured), posterior inferior tibiofibular lig (PITFL — stronger), transverse tibiofibular lig, interosseous membrane. Bind tibia + fibula at distal joint. "High ankle sprain" = syndesmotic injury. Longer recovery than lateral sprain.',m:'"High ankle sprain = syndesmotic injury." AITFL most commonly torn. Squeeze test + external rotation test.'},
  {t:'Spring ligament (plantar calcaneonavicular)',d:'From sustentaculum tali of calcaneus → navicular. Supports head of talus. Critical for medial longitudinal arch integrity. Torn in tibialis posterior dysfunction → progressive flatfoot. Contains fibrocartilage (articular surface for talar head).',m:'"Spring lig = arch keystone." Torn with tibialis posterior → flatfoot. Supports talar head.'},
  {t:'Plantar fascia (plantar aponeurosis)',d:'3 bands from medial calcaneal tuberosity → bases of proximal phalanges. Windlass mechanism: toe dorsiflexion → tightens fascia → raises medial arch. Plantar fasciitis: degenerative (not inflammatory) at calcaneal insertion. Worst morning, improves with activity. Night splints + stretching help.',m:'"Windlass = tighten toes = raise arch." Plantar fasciitis NOT inflammatory = fasciosis. Worst first steps.'},
  {t:'Long plantar ligament',d:'From calcaneus (inferior surface, posterior tubercle) → cuboid groove + bases of MT2-5. Longest foot ligament. Converts peroneal groove into tunnel for fibularis longus tendon. Supports lateral longitudinal arch.',m:'"Long plantar lig = LONGEST foot ligament." Covers peroneal groove → tunnel for fibularis longus.'},
  {t:'Short plantar ligament (plantar calcaneocuboid)',d:'From anterior calcaneus → inferior cuboid (deep to long plantar ligament). Supports calcaneocuboid joint. Shorter and deeper than long plantar ligament.',m:'"Short plantar lig = calcaneocuboid support." Deeper to long plantar lig.'},
]},

// ══════════════════════════════════════════
// GROUP 14: TENDONS (COMPREHENSIVE)
// ══════════════════════════════════════════,section:'anatomy'},
{id:'tendons-upper', label:'Upper Limb Tendons', icon:'💪', color:'#52d18a', cards:[
  {t:'Rotator cuff tendons (SITS)',d:'Supraspinatus: superior facet greater tubercle (from supraspinous fossa). Infraspinatus: middle facet (infraspinous fossa). Teres minor: inferior facet (lateral scapular border). Subscapularis: lesser tubercle (subscapular fossa). Form cuff around GH joint. Critical zone: supraspinatus tendon 1cm from insertion = critical zone (poor blood supply = most tears here).',m:'"Critical zone = 1cm from SS insertion = avascular." Most tears here. SITS order on greater tubercle.'},
  {t:'Long head of biceps tendon',d:'From supraglenoid tubercle → travels intra-articularly through joint → into bicipital groove (intertubercular groove). Held in groove by transverse humeral ligament. Tendon sheath communicates with GH joint. Speed\'s test: resisted forward flexion at 90° = bicipital tendinopathy. Yergason\'s: resisted supination.',m:'"LHB = intra-articular but extrasynovial." SLAP tear = origin avulsion. Speed\'s + Yergason\'s tests.'},
  {t:'Distal biceps tendon',d:'Inserts radial tuberosity. Must be directly visible on MRI (requires FABS position: flexion, abduction, supination). Rupture: audible pop + Popeye sign + weakness supination > flexion. Hook test: cannot hook finger under cord = ruptured. Repair important for supination strength.',m:'"Distal biceps rupture = supination weakness > flexion weakness." Hook test.'},
  {t:'Triceps tendon',d:'All 3 heads converge → olecranon process of ulna. Rarely ruptured (most common complete tendon rupture that is missed). Anconeus helps reinforce. Associated with systemic disease (hyperparathyroidism, renal failure, SLE). Triceps reflex = C7.',m:'"Triceps tendon rupture = most missed complete rupture." Associated with systemic disease.'},
  {t:'Common flexor tendon',d:'Origin: medial epicondyle. Attaches: pronator teres, FCR, palmaris longus, FDS, FCU. Medial epicondylitis ("golfer\'s elbow") = degeneration at common flexor origin. Tender medial epicondyle with resisted wrist flexion. Compare with lateral epicondylitis (tennis elbow = common extensor tendon).',m:'"Golfer\'s elbow = medial epicondyle (common flexors)." Resisted wrist flexion reproduces pain.'},
  {t:'Common extensor tendon',d:'Origin: lateral epicondyle. Attaches: ECRB (primary), ECRL, ECU, EDC, EDM. Lateral epicondylitis ("tennis elbow") = ECRB most affected. Cozen\'s test: resisted wrist extension reproduces pain. Mill\'s test: passive wrist flexion with elbow extended.',m:'"Tennis elbow = lateral epicondyle (ECRB primarily)." Cozen\'s test. Resisted wrist extension.'},
  {t:'De Quervain\'s tenosynovitis tendons',d:'Tendons in 1st dorsal compartment: APL (abductor pollicis longus) + EPB (extensor pollicis brevis). Stenosing tenosynovitis at radial styloid. Finkelstein\'s test: ulnar deviation with thumb in fist reproduces pain. Common in new mothers + repetitive radial-ulnar deviation.',m:'"1st compartment = APL + EPB = De Quervain\'s." Finkelstein\'s test. Radial styloid tenderness.'},
  {t:'EPL (Extensor pollicis longus) tendon',d:'3rd dorsal compartment. Wraps around Lister\'s tubercle (dorsal radius) — acts as pulley. Can rupture spontaneously in: distal radius fractures (even undisplaced), RA, steroid injections. Rupture = "Drummer\'s palsy" = cannot extend thumb IP joint.',m:'"EPL wraps Lister\'s tubercle." Rupture after distal radius fracture (even undisplaced). Drummer\'s palsy.'},
],section:'anatomy'},
{id:'tendons-lower', label:'Lower Limb Tendons', icon:'🦵', color:'#f07060', cards:[
  {t:'Quadriceps tendon',d:'All 4 quads → superior pole of patella (4 layers: RF on surface, then VL + VM, then VI deepest). Continues as patellar ligament below patella. Rupture: gap above patella + patient cannot extend knee actively + patella descends (patella baja/lower). Occurs >40 yrs (vs patellar tendon <40).',m:'"Quad tendon rupture = gap ABOVE patella." >40 years. Inability to extend knee.'},
  {t:'Patellar tendon/ligament',d:'Inferior patella → tibial tuberosity. Transmits quad force. Patellar tendinopathy ("jumper\'s knee"): degenerative, at inferior patellar pole, ultrasound hypoechoic area. Rupture: gap BELOW patella + patella rides high (patella alta). <40 yrs. Osgood-Schlatter = apophysitis at tibial tuberosity in adolescents.',m:'"Patellar tendon rupture = gap BELOW + patella alta." <40 yrs. Jumper\'s knee = inferior pole.'},
  {t:'Iliotibial band (IT band)',d:'Dense fascia: TFL + gluteus maximus → Gerdy\'s tubercle lateral tibia. Crosses knee lateral side. IT band syndrome: repetitive friction over lateral femoral condyle at 30° flexion. Ober\'s test = IT band tightness. Noble compression test at lateral condyle. Common in runners.',m:'"IT band syndrome = lateral knee pain at 30°." Ober\'s test for tightness. Distance runners.'},
  {t:'Achilles tendon (calcaneal tendon)',d:'Gastrocnemius + soleus (triceps surae) → calcaneal tuberosity. Strongest tendon in body (withstands ~4000N). Rotates 90° (medial gastrocnemius becomes posterior at insertion). Watershed zone: 2-6cm above insertion (poor vascularity = most ruptures + tendinopathy here). Thompson test = positive if no plantarflexion on calf squeeze.',m:'"Achilles = strongest tendon." Watershed zone 2-6cm above insertion. Thompson test.'},
  {t:'Tibialis anterior tendon',d:'From lateral tibia → medial cuneiform + base MT1. Crosses ankle anterior to medial malleolus. Largest tendon crossing ankle anteriorly. Rupture (rare): foot slap, weak dorsiflexion in elderly. Tendinopathy at insertion.',m:'"TA = dorsiflexion + inversion tendon." Anterior to medial malleolus. Largest anterior ankle tendon.'},
  {t:'Tibialis posterior tendon',d:'Behind medial malleolus (first, most medial). Primary dynamic arch stabilizer. Inserts navicular + springs (spring lig). Tendinopathy → PTTD (posterior tibial tendon dysfunction) → acquired flatfoot. Too many toes sign (excess foot externally rotated). Single heel raise test (inability = PTTD).',m:'"Tibialis posterior tendinopathy → adult flatfoot." Single heel raise test. Too many toes sign.'},
  {t:'Peroneal tendons',d:'Both run behind lateral malleolus in peroneal groove held by superior + inferior peroneal retinaculum. Peroneus brevis (anterior in groove) + longus (posterior). Peroneal tendon subluxation: retinaculum avulsed, tendons snap over malleolus. Longitudinal tears of peroneus brevis (split tear) common.',m:'"Peroneal tendons = behind lateral malleolus." Brevis = anterior. Subluxation = retinaculum avulsion.'},
  {t:'FHL (Flexor hallucis longus) tendon',d:'Passes through sustentaculum tali groove (natural pulley). FHL tenosynovitis: dancers ("dancer\'s tendinopathy"), posterior ankle impingement. Trigger toe = FHL stenosing tenosynovitis → hallux catches in flexion. Hallux saltans = snapping hallux.',m:'"FHL = dancer\'s tendon." Trigger toe = stenosing tenosynovitis. Passes through sustentaculum tali.'},
  {t:'Hamstring tendons',d:'Biceps femoris → fibular head. Semitendinosus + gracilis → pes anserinus (medial tibia). Semimembranosus → posterior medial tibial condyle. Hamstring strain: most common muscle injury in sport. Grade I-III. "High hamstring" = proximal avulsion from ischial tuberosity.',m:'"High hamstring tear = ischial tuberosity avulsion." Pes anserinus = ST + gracilis + sartorius. Proximal = most severe.'},
  {t:'Pes anserinus tendons',d:'3 tendons inserting medial tibia (DISTAL to MCL): Sartorius (most superior) + Gracilis (middle) + Semitendinosus (most inferior). "SAY GRACE TOGETHER." Pes anserinus bursitis: medial knee pain below joint line, tender over insertion, common in obese patients with osteoarthritis.',m:'"SAY GRACE TOGETHER = Sartorius, Gracilis, Semitendinosus (medial tibia)." SGS mnemonic.'},
],section:'anatomy'},
{id:'ap2-endocrine',label:'Ch. 17: Endocrine System',icon:'🧬',color:'#b084f5',section:'ap2',cards:[
{t:'Endocrine vs exocrine glands',d:'Endocrine glands: produce hormones, have NO ducts, release products directly into surrounding tissue fluid absorbed by rich vascular or lymphatic drainage. Exocrine glands: produce nonhormonal substances, release through ducts to a surface (ex. salivary glands, sweat glands).',m:'"Endo = inside (into blood, no duct). Exo = outside (through duct to surface)."'},
{t:'Hormonal vs neural control',d:'Nervous system: nerve impulses through neurons, responds in milliseconds, short-lived (neurotransmitters removed quickly). Endocrine system: hormones released into bloodstream, slower onset (lag of seconds to days), more prolonged effects because hormones last longer in blood.',m:'"Neural = Now (milliseconds, fast, short). Hormonal = Hours-to-days (slow, sustained)."'},
{t:'General functions of the endocrine system',d:'(1) Regulating development and growth. (2) Regulation of cellular metabolism and energy balance. (3) Maintaining homeostasis of blood composition and volume (electrolytes, water, nutrients). (4) Mobilizing body defenses against stress. (5) Controlling digestive processes. (6) Controlling reproductive activities.',m:'"DMESR: Development, Metabolism, Electrolytes, Stress, Reproduction."'},
{t:'Humoral stimuli',d:'Gland triggered by changing blood levels of ions or nutrients — not by nerves or other hormones. Examples: insulin released when blood glucose rises; glucagon released when blood glucose falls; aldosterone released when blood Na+ falls or K+ rises.',m:'"Humoral = blood HUMOR (fluid). Blood chemical levels directly trigger the gland."'},
{t:'Neural stimuli',d:'Sympathetic nervous system DIRECTLY stimulates a gland via nerve fibers. Primary example: sympathetic fibers from hypothalamus stimulate adrenal MEDULLA to release epinephrine and norepinephrine. Only major gland using neural stimuli as primary control.',m:'"Neural = nerve triggers gland. Only adrenal MEDULLA as primary control. Fight-or-flight."'},
{t:'Hormonal stimuli (tropic)',d:'A gland is stimulated or inhibited by another HORMONE. Releasing or inhibiting hormones from hypothalamus travel to anterior pituitary. Most common type of control. Tropic hormones target other endocrine glands. Example: TRH triggers TSH, which triggers T3/T4.',m:'"Tropic = hormones turning toward other glands. TRH to TSH to T3/T4 = hormonal cascade."'},
{t:'Negative feedback',d:'As plasma levels of hormone increase or homeostasis is restored, the producing gland is INHIBITED from making more. Most common control mechanism. Examples: rising T3/T4 inhibits TRH and TSH; rising cortisol inhibits CRH and ACTH.',m:'"Negative feedback = thermostat. Too much hormone shuts off production. Most common in endocrine."'},
{t:'Positive feedback',d:'As plasma levels of hormone increase, the gland is STIMULATED to produce more — self-reinforcing loop until an endpoint. Example: oxytocin during labor, LH surge before ovulation.',m:'"Positive feedback = snowball. Gets bigger and bigger until the event ends it. Labor = classic."'},
{t:'Synergism',d:'The activity of one hormone REINFORCES or AMPLIFIES the activity of another hormone. Combined effect is greater than either alone. Example: growth hormone and reproductive hormones both promote growth together.',m:'"Synergism = 1+1=3. Two hormones amplify each other. GH + sex hormones = bigger growth effect."'},
{t:'Permissiveness',d:'One hormone REQUIRES a second hormone to be present for its full effect on target cell. The first hormone permits the second to work fully. Example: prolactin requires oxytocin to be present for full breastfeeding effect.',m:'"Permissive = one hormone is the gatekeeper allowing another to work. PRL needs oxytocin."'},
{t:'Antagonism',d:'One hormone OPPOSES the action of another on a target cell. Examples: insulin vs glucagon (blood glucose control); PTH vs calcitonin (blood calcium); aldosterone vs ANP (blood volume/pressure).',m:'"Antagonism = opposites fighting. Insulin vs glucagon. PTH vs calcitonin. Aldosterone vs ANP."'},
{t:'Amino acid-based hormones (water-soluble)',d:'Most hormones are amino acid-based. Range from simple amino acid derivatives to large proteins. ALL are water-soluble. Include: peptide hormones (insulin, glucagon, GH, ADH, oxytocin), all anterior pituitary hormones. Cannot cross cell membrane — use second messengers (G protein, cAMP, IP3).',m:'"Most hormones = amino-acid based = water-soluble = cannot enter cell = need second messenger."'},
{t:'Steroid hormones (lipid-soluble)',d:'Synthesized from CHOLESTEROL. Produced by gonads (sex hormones) and adrenal cortex (cortisol, aldosterone). All are LIPID-SOLUBLE. Can cross cell membrane directly. Bind intracellular receptors, form hormone-receptor complex, stimulate DNA to produce mRNA.',m:'"Steroids = cholesterol-derived = lipid-soluble = walks through membrane = intracellular receptor."'},
{t:'Biogenic amines',d:'Derived from amino acids. Catecholamines (epinephrine, norepinephrine) and melatonin = water-soluble. THYROID HORMONE (T3, T4) = LIPID-SOLUBLE (exception to the pattern). Thyroid hormone behaves like a steroid despite being an amine derivative.',m:'"Biogenic amines: MOST water-soluble EXCEPT thyroid hormone which is lipid-soluble. Thyroid = exception."'},
{t:'Lipid-soluble hormone transport',d:'Lipid-soluble hormones (steroids, calcitriol, thyroid hormones) do NOT dissolve in plasma — REQUIRE carrier proteins. Bound to carrier = inactive (bound hormone). Must be FREE (unbound) to bind target cell receptor. Carrier proteins prolong half-life.',m:'"Lipid hormones need a carrier to travel in blood. Must UNBIND from carrier to enter target cell."'},
{t:'Water-soluble hormone transport',d:'Water-soluble hormones dissolve directly in plasma and do NOT require carrier molecules. If they have a carrier protein, it is only to prolong their half-life in the bloodstream, not for transport.',m:'"Water-soluble = dissolves in blood = travels free. No carrier needed for transport."'},
{t:'Half-life of a hormone',d:'Amount of time necessary to reduce the concentration of a hormone in the blood by half. Water-soluble hormones: SHORT half-life (minutes or less). Steroids: LONGEST half-lives (carrier proteins protect from destruction). Shorter half-life = must be replaced more frequently.',m:'"Half-life = hormone survival time in blood. Steroids last longest. Peptides vanish fast."'},
{t:'cAMP second messenger pathway',d:'Water-soluble hormone (first messenger) binds membrane receptor → G protein activated → G protein activates adenylyl cyclase → converts ATP to cAMP (second messenger, cyclic AMP) → activates protein kinase A → phosphorylates enzymes → cellular response. Amplified cascade.',m:'"cAMP cascade: hormone → membrane receptor → G protein → adenylyl cyclase → cAMP → protein kinase A → response."'},
{t:'IP3 second messenger pathway',d:'Alternate pathway: water-soluble hormone binds receptor → G protein activates phospholipase C → produces IP3 (inositol triphosphate) → IP3 increases intracellular Ca2+ (from ER or extracellular) → Ca2+ triggers cellular response.',m:'"IP3 = calcium flood. Phospholipase C → IP3 → Ca2+ released from ER → cellular response."'},
{t:'Up-regulation',d:'Target cells INCREASE receptor numbers when hormone levels are chronically LOW — cell becomes more sensitive to that hormone. Body compensating for insufficient hormone stimulation.',m:'"Up-regulation = more receptors when hormone is scarce = cell MORE sensitive. Compensating upward."'},
{t:'Down-regulation',d:'Target cells DECREASE receptor numbers when hormone levels are chronically HIGH — cell becomes desensitized. Example: chronic high insulin in type 2 diabetes → insulin receptors decrease → insulin resistance.',m:'"Down-regulation = fewer receptors when flooded = LESS sensitive. Type 2 diabetes = classic example."'},
{t:'Hypothalamus',d:'Master endocrine controller in diencephalon. Connected to pituitary by INFUNDIBULUM. Two control routes: (1) Nerve axons go directly to posterior pituitary to release oxytocin and ADH. (2) Releasing/inhibiting hormones travel through hypophyseal portal system to control anterior pituitary.',m:'"Hypothalamus = ultimate boss. Posterior pituitary = nerve axons (direct). Anterior pituitary = portal blood."'},
{t:'Infundibulum',d:'The stalk that physically connects the hypothalamus to the pituitary gland. Contains both blood vessels (hypophyseal portal system) and nerve axons from hypothalamic neurons extending to the posterior pituitary.',m:'"Infundibulum = connecting stalk. Funnel-shaped. Like an umbilical cord for the pituitary."'},
{t:'Hypophyseal portal system',d:'Network of capillaries connecting hypothalamus to anterior pituitary gland. Hypothalamic releasing and inhibiting hormones travel through this portal blood directly to the anterior pituitary without returning to the general circulation first.',m:'"Hypophyseal portal = shortcut blood highway. Hypothalamus releases hormones here → delivered directly to anterior pituitary."'},
{t:'Anterior pituitary (adenohypophysis)',d:'TRUE glandular tissue (adeno = gland). Controlled by hypothalamic releasing/inhibiting hormones via hypophyseal portal system. Produces: ACTH, FSH, LH, TSH, GH, PRL. Adenohypophysis = anterior = actual gland cells.',m:'"Adenohypophysis = anterior = actual gland. 6 hormones: ACTH, FSH, LH, TSH, GH, PRL."'},
{t:'Posterior pituitary (neurohypophysis)',d:'Neural tissue — axon terminals of hypothalamic neurons. NOT true glandular tissue. Does NOT synthesize hormones. Only STORES and RELEASES ADH (antidiuretic hormone/vasopressin) and oxytocin, which are made in the hypothalamus.',m:'"Neurohypophysis = posterior = nerve tissue = STORAGE LOCKER only. ADH and oxytocin made in hypothalamus."'},
{t:'ACTH (adrenocorticotropic hormone)',d:'Released by anterior pituitary. Target tissue: ADRENAL CORTEX. Stimulates adrenal cortex to produce and release cortisol. Regulated by CRH (corticotropin-releasing hormone) from hypothalamus. Negative feedback: rising cortisol inhibits CRH and ACTH.',m:'"ACTH targets Adrenal Cortex. ACTH = A to AC. CRH → ACTH → cortisol → negative feedback."'},
{t:'FSH (follicle-stimulating hormone)',d:'Released by anterior pituitary. Target tissue: OVARIES and TESTES. Females: stimulates follicle development in ovaries + estrogen production. Males: stimulates spermatogenesis in seminiferous tubules via Sertoli cells. Regulated by GnRH from hypothalamus.',m:'"FSH → ovaries + testes. FSH = Follicle Stimulating Hormone. First step in reproduction."'},
{t:'LH (luteinizing hormone)',d:'Released by anterior pituitary. Target tissue: OVARIES and TESTES. Females: LH surge triggers ovulation, stimulates corpus luteum to produce progesterone. Males: stimulates Leydig cells to produce testosterone. Regulated by GnRH.',m:'"LH → ovaries + testes. LH surge = ovulation trigger in females. Males: LH → Leydig → testosterone."'},
{t:'TSH (thyroid-stimulating hormone)',d:'Released by anterior pituitary. Target tissue: THYROID GLAND. Stimulates thyroid follicular cells to produce and release T3 and T4. Regulated by TRH from hypothalamus. Negative feedback: high T3/T4 inhibits both TRH and TSH.',m:'"TSH → thyroid gland. TSH tells the Thyroid to Speak (make T3/T4)."'},
{t:'GH (growth hormone)',d:'Released by anterior pituitary. Target tissue: MOST BODY TISSUES. Stimulates IGF-1 from liver → promotes bone lengthening, muscle growth, protein synthesis, lipolysis. Regulated by GHRH (+) and somatostatin (-). Peaks during slow-wave sleep.',m:'"GH → most body tissues. Peaks during sleep. Child deficiency = dwarfism. Child excess = gigantism. Adult excess = acromegaly."'},
{t:'PRL (prolactin)',d:'Released by anterior pituitary. Target tissue: MAMMARY GLANDS. Stimulates milk PRODUCTION (synthesis) after childbirth. During pregnancy, high progesterone suppresses lactation despite rising PRL. After delivery, progesterone drops → prolactin acts. Suckling stimulates more prolactin release.',m:'"PRL = Prolactin = milk PRoduction (not ejection). Mammary glands. Prolactin blocked during pregnancy by progesterone."'},
{t:'Oxytocin',d:'Synthesized in hypothalamus, stored and released from posterior pituitary. Target tissue: UTERUS and BREAST. Positive feedback in labor: fetal head stretches cervix → more oxytocin → stronger contractions → birth. Milk ejection (let-down reflex): suckling → oxytocin → milk release.',m:'"Oxytocin → uterus + breast. Positive feedback in labor. OXYtocin = quick birth. Milk ejection (not production)."'},
{t:'ADH (antidiuretic hormone / vasopressin)',d:'Synthesized in hypothalamus, stored and released from posterior pituitary. Target tissue: NEPHRONS of KIDNEY. High plasma osmolarity or low blood volume → ADH released → aquaporins inserted in collecting duct → water reabsorbed → concentrated urine, increased blood volume.',m:'"ADH → kidney nephrons. ADH = Anti-Diuresis = keeps water IN. No ADH = diabetes insipidus."'},
{t:'Thyroid gland location',d:'Butterfly-shaped gland on anterior trachea, inferior to larynx. Two lateral lobes + isthmus. Follicular cells produce T3/T4 from tyrosine + iodine. Parafollicular (C) cells produce calcitonin. Largest purely endocrine gland.',m:'"Butterfly on trachea below larynx. Follicular cells = T3/T4. C cells = Calcitonin."'},
{t:'T3 (triiodothyronine) and T4 (thyroxine)',d:'Target tissue: MOST BODY CELLS. T3 = 3 iodines, more active. T4 = 4 iodines, converted to T3 in peripheral tissues. Both lipid-soluble — bind intracellular receptors. Effects: increase BMR (basal metabolic rate), heat production, heart rate, GI motility, essential for normal brain development in fetus/infant.',m:'"T3/T4 → most body cells. T3 turbo-active. Both raise metabolism, heat, HR."'},
{t:'Calcitonin',d:'Produced by parafollicular (C) cells of thyroid gland. Target tissue: BONES. Released when blood Ca2+ is HIGH. LOWERS blood calcium by: inhibiting osteoclasts (reducing bone resorption) and increasing renal Ca2+ excretion. Antagonizes PTH.',m:'"Calcitonin targets BONES. CaliTONIN TONES DOWN calcium. Opposes PTH."'},
{t:'Parathyroid glands',d:'Four small glands embedded in posterior surface of thyroid gland. Functionally unrelated to thyroid — location only. Chief cells secrete PTH. Easy to confuse with thyroid because of location.',m:'"4 parathyroids on BACK of thyroid. Chief cells make PTH. Same neighborhood, different job."'},
{t:'PTH (parathyroid hormone)',d:'Released by parathyroid chief cells. Target tissue: KIDNEYS, BONES, and SMALL INTESTINE. Released when blood Ca2+ is LOW. RAISES Ca2+: (1) activates osteoclasts — bone resorption releases Ca2+; (2) kidneys reabsorb Ca2+; (3) activates vitamin D → increases GI Ca2+ absorption.',m:'"PTH targets kidneys + bones + small intestine. PTH = Please Take calcium Home. Raises Ca2+."'},
{t:'Adrenal gland location',d:'Located atop each kidney (also called suprarenal glands). Two distinct regions: CORTEX (outer, produces steroid hormones — 3 zones) and MEDULLA (inner, produces catecholamines). Cortex = lipid-soluble. Medulla = water-soluble catecholamines.',m:'"Suprarenal = above kidney. Cortex outside (steroids), medulla inside (catecholamines)."'},
{t:'Aldosterone (mineralocorticoid)',d:'From adrenal CORTEX (zona glomerulosa). Target tissue: NEPHRON of KIDNEY. Stimulated by: angiotensin II, high K+, low Na+. Action: increases Na+ reabsorption + K+ secretion in DCT/collecting duct → water follows Na+ → increased blood volume and pressure.',m:'"Aldosterone → kidney nephron. Saves Na+, spills K+. Water follows sodium = blood volume up."'},
{t:'Cortisol (glucocorticoid)',d:'From adrenal CORTEX (zona fasciculata). Target tissue: BODY CELLS and LIVER. Stress response hormone. Actions: increases blood glucose (gluconeogenesis from protein/fat), anti-inflammatory, immunosuppressive. Controlled by: CRH → ACTH → cortisol. Negative feedback loop.',m:'"Cortisol → body cells + liver. Cortisol = stressed SUGAR maker. CRH → ACTH → cortisol loop."'},
{t:'Epinephrine',d:'From adrenal MEDULLA. Target tissue: ORGANS OF SYMPATHETIC STIMULATION. Released by NEURAL stimulus — sympathetic fibers from hypothalamus. Effects: increased HR, BP, blood glucose (glycogenolysis), bronchodilation. Water-soluble catecholamine. Short-acting.',m:'"Epinephrine → sympathetic target organs. Neural stimulus triggers adrenal medulla. Fight-or-flight."'},
{t:'Norepinephrine',d:'From adrenal MEDULLA. Target tissue: ORGANS OF SYMPATHETIC STIMULATION. Released alongside epinephrine during sympathetic activation. More potent vasoconstrictor than epinephrine. Also acts as neurotransmitter in sympathetic NS. Same neural stimulus control.',m:'"Norepinephrine → sympathetic organs. More vasoconstriction than epinephrine. Medulla + neurotransmitter."'},
{t:'Islets of Langerhans',d:'Endocrine structures within the pancreas (1-2% of pancreatic tissue). Beta (β) cells produce insulin. Alpha (α) cells produce glucagon. Delta cells produce somatostatin. Surrounded by exocrine acinar cells. Rich blood supply for direct hormone release.',m:'"Islets of Langerhans = endocrine pancreas. Beta = blood sugar Buster (insulin). Alpha = Away raises glucose."'},
{t:'Insulin',d:'From beta (β) cells of pancreatic islets. Target tissue: MOST BODY CELLS, especially LIVER, ADIPOSE TISSUE, and SKELETAL MUSCLE. Humoral stimulus: released when blood glucose is HIGH. Actions: increased glucose uptake (GLUT4), glycogen synthesis, protein synthesis, fat storage. LOWERS blood glucose.',m:'"Insulin → liver, adipose, skeletal muscle. After eating = store energy. Lowers blood glucose."'},
{t:'Glucagon',d:'From alpha (α) cells of pancreatic islets. Target tissue: LIVER. Humoral stimulus: released when blood glucose is LOW. Actions: glycogenolysis (breaks liver glycogen → glucose), gluconeogenesis, lipolysis. RAISES blood glucose. Antagonizes insulin.',m:'"Glucagon → liver only. Blood glucose GONE = release stored glucose. Alpha = Away from low."'},
{t:'Testosterone',d:'From TESTES (Leydig cells). Target tissue: MOST BODY CELLS. Stimulated by LH from anterior pituitary. Functions: male secondary sex characteristics, spermatogenesis support, libido, anabolic muscle effects.',m:'"Testosterone → most body cells. LH stimulates Leydig cells in testes. Male characteristics."'},
{t:'Estrogen',d:'From OVARIES (granulosa cells of follicles). Target tissue: MOST BODY CELLS and LINING OF UTERUS. Stimulated by FSH. Functions: female secondary sex characteristics, endometrial proliferation (uterine lining), bone density. Usually negative feedback on HPG axis.',m:'"Estrogen → most body cells + uterine lining. FSH → granulosa cells → estrogen."'},
{t:'Progesterone',d:'From OVARIES (corpus luteum after ovulation). Target tissue: UTERUS. Stimulated by LH. Functions: maintains uterine lining for implantation, inhibits uterine contractions during pregnancy, thickens cervical mucus, prepares breasts for lactation. Drops at end of cycle → menstruation.',m:'"Progesterone → uterus. Pro-gestation = supports pregnancy. From corpus luteum (LH stimulates)."'},
{t:'Melatonin',d:'From PINEAL GLAND in the epithalamus. Secreted in DARKNESS — light inhibits production via retinohypothalamic tract. Regulates circadian rhythm and sleep-wake cycles. Peaks 2-4 AM. Decreases with age.',m:'"Pineal = epithalamus, pinecone-shaped. Melatonin = darkness hormone = sleep."'},
{t:'Thymus',d:'Located in SUPERIOR MEDIASTINUM. Secretes thymosins that promote T-lymphocyte maturation. Large in childhood, atrophies after puberty. Know its LOCATION. Does not persist into adulthood as active endocrine gland.',m:'"Thymus = superior mediastinum. T-cell school. Know the location — shrinks after puberty."'}
]},
{id:'ap2-blood',label:'Ch. 18: Blood',icon:'🩸',color:'#f07060',section:'ap2',cards:[
{t:'Blood composition',d:'Connective tissue with liquid extracellular matrix. Approximately 8% of body weight (about 5L in adult). Contains formed elements (erythrocytes, leukocytes, platelets) suspended in plasma. Hematocrit = percentage of whole blood that is formed elements.',m:'"Blood = plasma (55%) + formed elements (45%). Hematocrit = % formed elements."'},
{t:'Plasma',d:'Liquid portion of blood (about 55%). Composition: 91% water; proteins (albumin for osmotic pressure and transport; globulins for immune function; fibrinogen for clotting); electrolytes, nutrients, hormones, waste. Serum = plasma MINUS clotting factors (after clotting occurs).',m:'"Plasma = 91% water + protein soup (AGF: Albumin, Globulins, Fibrinogen). Serum = plasma minus fibrinogen/clotting factors."'},
{t:'Erythrocytes (RBCs)',d:'Biconcave disc — maximizes surface area for gas exchange. Anucleate (no nucleus) and no organelles in mature form — more room for hemoglobin. Flexible membrane for squeezing through narrow capillaries. Normal count: 4-6 million/mm3.',m:'"RBCs: 4-6 million/mm3. Biconcave disc, no nucleus = max hemoglobin space."'},
{t:'Leukocytes (WBCs)',d:'Nucleated white blood cells. Two categories: GRANULOCYTES (visible cytoplasmic granules — neutrophils, eosinophils, basophils) and AGRANULOCYTES (no visible granules — lymphocytes, monocytes). Normal total WBC count: 4800-10800/mm3.',m:'"WBC total normal: 4800-10800/mm3. Granulocytes: NEB. Agranulocytes: LM. Never Let Monkeys Eat Bananas."'},
{t:'Platelets (thrombocytes)',d:'Cell fragments pinched off from megakaryocytes in red bone marrow. No nucleus. 2-4 micrometers in diameter. Normal count 150,000-400,000/uL. Contain granules with clotting chemicals. Lifespan 7-10 days. Essential for primary hemostasis.',m:'"Platelets = cell fragments from megakaryocytes. No nucleus. 7-10 day lifespan. Clotting helpers."'},
{t:'Total WBC count',d:'Normal range: 4800-10800 per mm3 (cubic millimeter). Leukocytosis = elevated count above 10800 — indicates infection, inflammation, or leukemia. Leukopenia = decreased count below 4800 — indicates immunosuppression or bone marrow failure.',m:'"WBC normal: 4800-10800/mm3. Leukocytosis = too many (infection). Leukopenia = too few (suppressed)."'},
{t:'Total RBC count',d:'Normal range: 4-6 million per mm3. Males tend toward higher values, females lower. Polycythemia = excess RBCs above 6 million. Low RBC count + low hemoglobin = anemia.',m:'"RBC normal: 4-6 million/mm3. Easy numbers to remember: 4 to 6 million."'},
{t:'Differential WBC count',d:'Lists the PERCENTAGES of each WBC type in a blood sample. Normal approximate ranges: Neutrophils 60-70%, Lymphocytes 20-30%, Monocytes 2-8%, Eosinophils 2-4%, Basophils less than 1%. Elevated neutrophils = bacterial infection. Elevated lymphocytes = viral infection.',m:'"Differential = percentages of each WBC type. Never Let Monkeys Eat Bananas = order by percentage (N/L/M/E/B)."'},
{t:'Hematocrit',d:'Percentage of whole blood that is formed elements (mostly RBCs), measured by centrifuge. Normal values: MALES = 47 plus or minus 5 percent (range 42-52%). FEMALES = 42 plus or minus 5 percent (range 37-47%). Low hematocrit = anemia. High = polycythemia.',m:'"Hematocrit: Males 47 plus/minus 5. Females 42 plus/minus 5. Males higher due to testosterone stimulating EPO."'},
{t:'Hemoglobin concentration',d:'Normal range: 12-18 g/dL (grams per deciliter). Males 14-18 g/dL, Females 12-16 g/dL. Measures total hemoglobin in blood. Low hemoglobin = anemia (even if RBC count appears normal). High = polycythemia.',m:'"Hemoglobin: 12-18 g/dL. Low = anemia. Spans both male and female normal values."'},
{t:'Coagulation time',d:'Time for blood to form a clot in a test tube. Normal range: 2-6 MINUTES. Tests the intrinsic clotting pathway. Prolonged coagulation time = clotting factor deficiency (hemophilia), anticoagulant drugs (warfarin, heparin), or severe liver disease.',m:'"Coagulation time: 2-6 MINUTES. Prolonged = clotting problem (hemophilia or anticoagulants)."'},
{t:'Bleeding time',d:'Time for a small standardized skin puncture to stop bleeding. Normal range: 3-5 MINUTES. Tests platelet plug formation and vascular spasm response. Prolonged = platelet disorder (thrombocytopenia, von Willebrand disease) or vascular problem.',m:'"Bleeding time: 3-5 MINUTES. Tests platelet plug. Different from coagulation time (which tests cascade)."'},
{t:'Neutrophils',d:'Granulocyte. Most abundant WBC at 60-70% of differential. First responders to bacterial infection. Multi-lobed nucleus with 3-5 lobes. Phagocytose bacteria. Short lifespan (hours to days in tissue). Form pus. Release defensins and oxidative burst to kill bacteria.',m:'"Neutrophils: 60-70%, multi-lobed nucleus, first responders. Pus = dead neutrophils."'},
{t:'Eosinophils',d:'Granulocyte. 2-4% of differential. Bilobed nucleus plus large red/orange granules (stain with eosin dye — red-loving). Combat parasitic infections and allergic reactions. Release histaminase to counteract histamine. Elevated in parasites/allergies.',m:'"Eosinophils: 2-4%, red/orange granules, bilobed nucleus. Allergies + parasites."'},
{t:'Basophils',d:'Granulocyte. Rarest WBC at less than 1% of differential. Large purple/blue granules contain HISTAMINE (vasodilation, inflammation) and HEPARIN (prevents clotting). Role in allergic and inflammatory responses. Related to mast cells in tissues.',m:'"Basophils: less than 1%, purple/blue granules. Histamine + Heparin. Basic blue color."'},

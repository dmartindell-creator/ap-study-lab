{t:'Lymphocytes',d:'Agranulocyte. 20-30% of differential. Large round nucleus fills most of small cell. T lymphocytes (cellular immunity, kill virus-infected cells), B lymphocytes (humoral immunity, produce antibodies), NK cells (natural killer, innate immunity). Elevated in viral infections.',m:'"Lymphocytes: 20-30%, large round nucleus. T cells kill, B cells make antibodies."'},
{t:'Monocytes',d:'Agranulocyte. 2-8% of differential. LARGEST white blood cell. Kidney-shaped or horseshoe-shaped nucleus. Transform into MACROPHAGES when entering tissues — phagocytose pathogens and debris, present antigens to T cells (APCs).',m:'"Monocytes: 2-8%, largest WBC, horseshoe nucleus. Becomes MACROPHAGE in tissues."'},
{t:'Hemostasis — three steps',d:'Process to stop bleeding after vessel injury. Three steps IN ORDER: (1) VASCULAR SPASM — immediate vasoconstriction reduces blood flow. (2) PLATELET PLUG — platelets adhere and aggregate at injury site forming temporary plug. (3) COAGULATION — clotting cascade produces fibrin mesh reinforcing the plug.',m:'"Hemostasis = SPC: Spasm, Plug, Coagulation. In that order, always."'},
{t:'Vascular spasm',d:'Step 1 of hemostasis. Immediate vasoconstriction of the damaged vessel. Triggered by: direct muscle trauma, nervous reflexes, chemical signals from damaged cells and activated platelets (serotonin, thromboxane A2). Reduces blood flow to injury site immediately. Lasts minutes to hours.',m:'"Vascular spasm = IMMEDIATE vessel squeeze = Step 1. Reduces blood loss right away."'},
{t:'Platelet plug formation',d:'Step 2 of hemostasis. Damaged endothelium exposes collagen. von Willebrand factor (vWF) bridges collagen to platelet receptor (GPIb) — platelet ADHESION. Activated platelets release ADP and thromboxane A2 — recruit more platelets — GPIIb/IIIa receptors + fibrinogen link platelets together = PLATELET PLUG. Temporary plug.',m:'"vWF bridges collagen to platelets. ADP calls more platelets. Temporary plug = Step 2."'},
{t:'Coagulation — production of prothrombin activator',d:'Step 3 of hemostasis, Event 1. Two pathways converge: Extrinsic pathway (fast — tissue factor TF released from damaged tissue + Factor VII) and Intrinsic pathway (slower — contact activation, factors XII to XI to IX plus VIII). Both converge on Factor X to form PROTHROMBIN ACTIVATOR.',m:'"Extrinsic (fast, tissue factor) + Intrinsic (slow, contact) both produce prothrombin activator. Two roads, same destination."'},
{t:'Coagulation — prothrombin to thrombin',d:'Step 3 of hemostasis, Event 2. Prothrombin activator converts PROTHROMBIN (inactive protein always present in plasma) to THROMBIN (active enzyme). Thrombin is the key enzyme of coagulation. Calcium ions required for this conversion.',m:'"Prothrombin activator converts prothrombin to THROMBIN. Thrombin = master enzyme. Ca2+ required."'},
{t:'Coagulation — fibrinogen to fibrin',d:'Step 3 of hemostasis, Event 3. Thrombin cleaves FIBRINOGEN (soluble plasma protein) into FIBRIN (insoluble strands). Factor XIII (activated by thrombin) cross-links fibrin strands into a stable mesh. Mesh traps RBCs and more platelets = hard reinforced clot.',m:'"Thrombin: fibrinoGEN to fibRIN. Factor XIII cross-links fibrin = stable clot. GEN to IN."'},
{t:'Blood type A',d:'Has type A ANTIGEN (agglutinogen) on RBC surface. Has ANTI-B ANTIBODY (agglutinin) in plasma. Can donate to: A and AB. Can receive from: A and O.',m:'"Type A: A antigen on RBC + anti-B antibody in plasma. Has A, hates B."'},
{t:'Blood type B',d:'Has type B ANTIGEN on RBC surface. Has ANTI-A ANTIBODY in plasma. Can donate to: B and AB. Can receive from: B and O.',m:'"Type B: B antigen on RBC + anti-A antibody in plasma. Has B, hates A."'},
{t:'Blood type AB',d:'Has BOTH A and B antigens on RBC surface. Has NO antibodies in plasma. UNIVERSAL RECIPIENT — can receive blood from any ABO type without antibody attack. Can only donate to type AB.',m:'"AB: both antigens, no antibodies = Universal Recipient. AB Accepts Blood from all types."'},
{t:'Blood type O',d:'Has NO antigens on RBC surface. Has BOTH anti-A and anti-B antibodies in plasma. UNIVERSAL DONOR — can donate to any ABO type (no antigens to attack). Can only receive from type O.',m:'"O: no antigens, both antibodies = Universal Donor. O gives to Others (all types)."'},
{t:'Rh factor',d:'Separate antigen system based on Rh (D) antigen on RBCs. Rh POSITIVE: antigen IS PRESENT (85% of population). Rh NEGATIVE: antigen is NOT PRESENT. Rh-negative individuals do not naturally have anti-Rh antibodies — develop them only after first exposure to Rh-positive blood.',m:'"Rh positive = antigen IS present. Rh negative = antigen NOT present. Positive = present. Simple."'}
]},
{id:'ap2-heart',label:'Ch. 19: Heart',icon:'❤️',color:'#f07060',section:'ap2',cards:[
{t:'Heart location and coverings',d:'Located in mediastinum, slightly left of midline. Apex points left/inferiorly (5th intercostal space, midclavicular line). Base at top (where great vessels attach). Pericardium: fibrous outer layer + serous inner (parietal + visceral/epicardium). Pericardial cavity filled with serous fluid (reduces friction).',m:'"Heart = mediastinum, apex left 5th ICS MCL. Pericardium = 2 layers + fluid-filled cavity."'},
{t:'Heart wall layers',d:'3 layers: EPICARDIUM (outer, visceral pericardium, fat), MYOCARDIUM (middle, cardiac muscle — thickest; left ventricle has thickest wall for systemic circulation), ENDOCARDIUM (inner, smooth endothelium lining chambers and valves).',m:'"EME: Epi (outside), Myo (muscle middle), Endo (inside). My Energetic Heart."'},
{t:'Heart chambers',d:'4 chambers: RIGHT ATRIUM (receives deoxygenated blood from SVC, IVC, coronary sinus) → RIGHT VENTRICLE (pumps to lungs via pulmonary trunk) → LEFT ATRIUM (receives oxygenated blood from 4 pulmonary veins) → LEFT VENTRICLE (pumps to body via aorta). Interventricular septum separates ventricles.',m:'"Right side = pulmonary (lungs). Left side = systemic (body). Blood flows RA → RV → lungs → LA → LV → body."'},
{t:'Heart valves',d:'AV valves (between atria and ventricles): Tricuspid (right — 3 cusps) and Bicuspid/Mitral (left — 2 cusps). Held by chordae tendineae attached to papillary muscles — prevent eversion into atria during systole. Semilunar valves (at artery exits): Pulmonary (right) and Aortic (left) — 3 cusps each, no chordae.',m:'"Try Before Pumping Aorta = Tricuspid, Bicuspid, Pulmonary, Aortic (right to left, atria to arteries)."'},
{t:'Coronary circulation',d:'Heart’s own blood supply. Right and Left coronary arteries arise from aortic sinuses just above aortic valve. Left coronary → LAD (anterior interventricular) + left circumflex. Right coronary → right marginal + posterior interventricular. Coronary veins → coronary sinus → right atrium. Heart is perfused during diastole.',m:'"LAD = Left Anterior Descending = widow maker artery. Heart fed during diastole (when relaxed)."'},
{t:'Pericardial cavity',d:'The space between the parietal pericardium and the visceral pericardium (epicardium). Normally contains a thin film of serous fluid (15-50 mL) that lubricates the heart surfaces and reduces friction during heartbeat.',m:'"Pericardial cavity = the space between the two pericardial layers. Fluid here prevents friction."'},
{t:'Coronary sinus',d:'A wide venous channel on the posterior surface of the heart, in the atrioventricular groove. Receives blood from the cardiac veins that drained the myocardium. Empties directly into the RIGHT ATRIUM. Major route for returning coronary blood to the heart.',m:'"Coronary sinus → right atrium. Big vein on back of heart collecting coronary venous blood."'},
{t:'Trabeculae carneae',d:'Irregular muscular ridges and columns of myocardium projecting from the inner walls of the VENTRICLES (especially left ventricle). Give the ventricular wall a ridged, spongy appearance. Different from papillary muscles (which attach chordae tendineae).',m:'"Trabeculae carneae = bumpy ridges on ventricular walls. Latin for fleshy beams/trabeculae."'},
{t:'Chordae tendineae',d:'Tendon-like cords that connect the cusps of the AV valves (tricuspid and mitral/bicuspid) to the papillary muscles below. Prevent the valve leaflets from being pushed back (everted) into the atria when the ventricles contract.',m:'"Chordae tendineae = heart strings. Connect valve cusps to papillary muscles. Prevent valve eversion."'},
{t:'Papillary muscles',d:'Cone-shaped muscle projections from the ventricular walls that anchor the chordae tendineae. When ventricles contract, papillary muscles also contract — pulling on chordae tendineae to hold AV valve cusps in closed position against ventricular pressure.',m:'"Papillary muscles pull chordae tendineae → keep AV valves shut during ventricular contraction."'},
{t:'Cardiac muscle properties',d:'Striated and involuntary. Intercalated discs: desmosomes (mechanical coupling) + gap junctions (electrical coupling → action potentials spread cell-to-cell → functional syncytium). Long refractory period prevents tetanus (sustained contraction would be fatal). Relies on aerobic metabolism (mitochondria-rich).',m:'"Intercalated discs = desmosomes (hold together) + gap junctions (electrical). Long refractory = no tetanus."'},
{t:'Cardiac action potential',d:'Phases: 0 = rapid depolarization (fast Na⁺ channels open), 1 = brief repolarization (Na⁺ channels close), 2 = PLATEAU (Ca²⁺ channels open + K⁺ channels partly open — unique to cardiac muscle, lasts 200-300ms), 3 = repolarization (K⁺ out), 4 = resting. Plateau creates long refractory period.',m:'"Phases 0-4. Phase 2 PLATEAU = Ca²⁺ in = unique to heart = causes long refractory period."'},
{t:'Conduction system',d:'SA node (sinoatrial, right atrium = pacemaker, 60-100/min) → internodal pathways → AV node (atrioventricular, between atria and ventricles — delays 0.1 sec) → Bundle of His → right and left bundle branches → Purkinje fibers (rapid ventricular conduction from apex upward → efficient squeeze).',m:'"SA → AV → Bundle of His → Bundle branches → Purkinje. SA = starter, AV = gatekeeper (delays), Purkinje = floor-to-ceiling spread."'},
{t:'ECG (electrocardiogram)',d:'Records electrical activity. P wave = atrial depolarization. QRS complex = ventricular depolarization (atrial repolarization hidden). T wave = ventricular repolarization. PR interval = AV node delay (0.12-0.20 sec). QT interval = ventricular depolarization + repolarization.',m:'"P = atria fire. QRS = ventricles fire. T = ventricles reset. P-QRS-T."'},
{t:'Abnormal cardiac rhythms',d:'Bradycardia <60 bpm. Tachycardia >100 bpm. Atrial flutter: atria 250-350 bpm. Atrial fibrillation: irregular, chaotic atrial activity, no P waves. Ventricular fibrillation: fatal — no coordinated pumping, defibrillation needed. Heart block: impaired AV conduction.',m:'"V-fib = FATAL — defibrillate immediately. A-fib = irregular — stroke risk (clots in atria)."'},
{t:'Cardiac cycle',d:'One complete heartbeat (~0.8 sec at 75 bpm). Systole = contraction, diastole = relaxation. (1) Atrial diastole: AV valves open, blood fills ventricles passively. (2) Atrial systole: atria contract → 25% more blood into ventricles (atrial kick). (3) Ventricular systole: AV valves close (S1 = "lub"), pressure rises → semilunar valves open → ejection. (4) Ventricular diastole: semilunar valves close (S2 = "dub").',m:'"LUB = AV valves close (systole begins). DUB = semilunar valves close (diastole begins). Lub-Dub."'},
{t:'Stroke volume and cardiac output',d:'Stroke volume (SV) = volume ejected per beat. Normal ~70 mL/beat. Cardiac output (CO) = HR × SV. Normal ~5.25 L/min at rest. Cardiac reserve = CO during exercise / CO at rest (normal up to 4-5x increase). Ejection fraction (EF) = SV/EDV × 100. Normal EF ≥ 55%.',m:'"CO = HR × SV. 75 × 70 = 5250 mL/min ≈ 5.25 L/min at rest."'},
{t:'Preload (Frank-Starling law)',d:'Preload = stretch of ventricular walls at END of diastole (= EDV, end-diastolic volume). ↑ venous return → ↑ EDV → ↑ stretch → ↑ force of contraction → ↑ SV. The heart pumps what it receives. Frank-Starling law: force ∝ preload (up to a limit).',m:'"Frank-Starling = MORE stretch = MORE force. Like a rubber band — stretch it more, snaps harder."'},
{t:'Afterload',d:'Resistance the ventricle must overcome to eject blood. Determined by arterial blood pressure. ↑ afterload → ↑ myocardial work → ↓ SV if heart can’t compensate. Hypertension chronically ↑ afterload → left ventricular hypertrophy → heart failure.',m:'"Afterload = resistance AFTER the valve opens. High BP = high afterload = harder pump work."'},
{t:'Autonomic regulation of heart rate',d:'Sympathetic (epinephrine/NE, β1 receptors): ↑ HR (chronotropy), ↑ contractility (inotropy), ↑ conduction velocity. Parasympathetic (ACh, M2 receptors via vagus nerve): ↓ HR. Cardioacceleratory center and cardioinhibitory center in medulla oblongata. Baroreceptors monitor BP.',m:'"Sympathetic = speed up (fight-or-flight). Parasympathetic = slow down (rest-and-digest). Beta-1 = heart."'},
{t:'Heart sounds and murmurs',d:'S1 (lub) = AV valves close at start of ventricular systole. S2 (dub) = semilunar valves close at start of ventricular diastole. S3 = rapid ventricular filling (normal in young, abnormal = heart failure in adults). S4 = stiff ventricle. Murmurs = turbulent blood flow through stenotic or regurgitant valves.',m:'"Lub = valves close going IN (AV close). Dub = valves close going OUT (SL close)."'},
{t:'Mid to late diastole',d:'AV valves are OPEN, semilunar valves are CLOSED. Blood flows passively from pulmonary and systemic circulations into atria and through to ventricles. 70-80% of ventricular filling occurs passively during this phase. Near end: atrial contraction forces residual blood into ventricles — ventricular filling is COMPLETE. End Diastolic Volume (EDV) is reached. ECG: P wave occurs during this phase.',m:'"Mid to late diastole: AV open, SL closed, passive filling (70-80%), atrial kick, EDV reached, P wave."'},
{t:'Isovolumetric contraction',d:'QRS complex occurs — ventricles begin to contract. AV valves CLOSE producing the FIRST HEART SOUND (S1 = LUB). Semilunar valves not yet open because ventricular pressure has not exceeded arterial pressure. Ventricles are completely closed chambers. Pressure climbs rapidly inside ventricles.',m:'"Isovolumetric contraction: QRS → AV valves close = S1 (LUB). Pressure builds but no blood moves yet."'},
{t:'Ventricular ejection',d:'Ventricular pressure now exceeds pulmonary trunk and aortic pressure → semilunar valves OPEN → blood leaves heart. Pressure peaks: aortic pressure reaches 120 mmHg. Atria relax and begin refilling from SVC/IVC. Ventricles reach End Systolic Volume (ESV) — all blood that will leave has left. Stroke volume (SV) = EDV minus ESV.',m:'"Ventricular ejection: SL valves open, blood out, aortic peak 120 mmHg, ESV reached. SV = EDV - ESV."'},
{t:'Isovolumetric relaxation',d:'T wave occurs — ventricles begin to relax. Pressure drops below pulmonary trunk and aortic pressure → semilunar valves CLOSE producing SECOND HEART SOUND (S2 = DUB). AV valves still closed because atrial pressure not yet high enough to open them. Ventricles again completely closed chambers.',m:'"Isovolumetric relaxation: T wave → SL valves close = S2 (DUB). AV still closed. No blood moves yet."'},
{t:'Early diastole',d:'Pressure in the atria from returning blood is now high enough to OPEN the AV valves. Blood begins to flow from atria into ventricles, beginning the next filling cycle. Leads back into mid-to-late diastole.',m:'"Early diastole: atrial pressure finally exceeds ventricular → AV valves open → filling begins again."'},
{t:'EDV and ESV',d:'End Diastolic Volume (EDV) = the maximum volume of blood in the ventricle at the end of filling (before contraction). End Systolic Volume (ESV) = minimum volume remaining after ejection. Stroke Volume (SV) = EDV minus ESV (normally about 70 mL per beat).',m:'"EDV = full (end of filling). ESV = empty (end of ejection). SV = EDV - ESV = what got pumped."'},
{t:'Coronary artery disease (CAD)',d:'Atherosclerosis of coronary arteries → narrowed lumen → reduced O₂ to myocardium. Risk factors: hypertension, hyperlipidemia, smoking, diabetes, obesity, family history. Stable angina = chest pain with exertion, relieved by rest/nitroglycerin.',m:'"CAD = plaque in coronary arteries → less O₂ to heart. Angina = temporary ischemia pain."'},
{t:'Myocardial infarction (MI/heart attack)',d:'Coronary artery occlusion → complete cessation of O₂ → ischemia → infarction (necrosis) of myocardium. Symptoms: crushing chest pain radiating to left arm/jaw, diaphoresis, nausea, dyspnea. Treatment: thrombolytics, PCI (stenting), CABG. Elevated troponin + CK-MB on labs.',m:'"MI = Myocardium is Injured/dead. Troponin = cardiac specific marker rises in 3-4 hours."'},
{t:'Heart failure',d:'Heart unable to pump sufficient blood to meet body needs. Left-sided HF: ↓ CO → pulmonary edema (fluid backs up to lungs → dyspnea, orthopnea). Right-sided HF: → peripheral edema, jugular venous distension, hepatomegaly. Treatment: ACE inhibitors, β-blockers, diuretics, digoxin.',m:'"Left HF = Lungs fill (dyspnea). Right HF = body Retains fluid (ankle swelling, JVD)."'}
]},
{id:'ap2-vessels',label:'Ch. 20: Blood Vessels',icon:'🫀',color:'#7c9ef8',section:'ap2',cards:[
{t:'Tunica interna (intima)',d:'Innermost layer of blood vessel wall. Composed of ENDOTHELIUM (simple squamous epithelium) lining the lumen. Provides smooth, friction-reducing surface. Also called tunica intima. The endothelium secretes chemicals that regulate vascular tone and prevent clotting.',m:'"Tunica interna = innermost = endothelium. Smooth inner lining = blood flows easily."'},
{t:'Tunica media',d:'Middle layer of vessel wall. Composed of SMOOTH MUSCLE and elastic fibers. Thickest layer in arteries. Controlled by sympathetic nervous system (vasoconstriction/vasodilation) and local factors. Determines vessel diameter and therefore blood pressure and flow.',m:'"Tunica media = middle = smooth muscle. Controls vessel diameter = controls blood pressure."'},
{t:'Tunica externa',d:'Outermost layer of vessel wall. Composed of CONNECTIVE TISSUE (collagen fibers). Also called tunica adventitia. Anchors vessel to surrounding tissues. Contains vasa vasorum (tiny blood vessels that supply the vessel wall itself in large vessels).',m:'"Tunica externa = external = connective tissue. Outermost anchoring layer. Adventitia is the other name."'},
{t:'Brachiocephalic artery',d:'First and largest branch off the ARCH OF THE AORTA (right side). Immediately divides into the right common carotid artery and the right subclavian artery. There is NO left brachiocephalic artery — the left common carotid and left subclavian arise directly from the aortic arch.',m:'"Brachiocephalic = arm + head. First branch off aortic arch. RIGHT side only — divides into R carotid + R subclavian."'},
{t:'Left common carotid artery',d:'Second branch off arch of aorta (middle). Ascends the left side of the neck to supply left side of head and brain. Divides into left internal carotid (brain, eye) and left external carotid (face, scalp, neck structures).',m:'"Left common carotid = 2nd off aortic arch (left side). Neck artery to left head/brain."'},
{t:'Left subclavian artery',d:'Third branch off arch of aorta (left side). Passes under the clavicle and becomes the axillary artery at the lateral border of the first rib. Supplies the left arm.',m:'"Left subclavian = 3rd off aortic arch. Sub = under the clavicle. Feeds the left arm."'},
{t:'Common carotid arteries',d:'Right: from brachiocephalic artery. Left: directly from aortic arch. Both ascend in the neck alongside the trachea. Each divides at the level of the thyroid cartilage (C4) into internal and external carotid arteries. Carotid pulse felt here.',m:'"Common carotids in the neck, one each side. Right from brachiocephalic. Left from aorta. Divide at C4."'},
{t:'Internal carotid artery',d:'From common carotid artery. Enters skull through carotid canal in temporal bone. Supplies brain (anterior and middle cerebral arteries) and eye (ophthalmic artery). Part of circle of Willis.',m:'"Internal carotid = goes inside skull = brain + eye. No branches in neck."'},
{t:'External carotid artery',d:'From common carotid artery. Stays external to skull. Supplies structures of the face, scalp, neck, and superficial head. Has multiple branches: facial artery, temporal artery, occipital artery, maxillary artery.',m:'"External carotid = external structures = face, scalp, neck. Multiple branches outside skull."'},
{t:'Vertebral arteries',d:'Branch off subclavian arteries. Ascend through transverse foramina of cervical vertebrae (C6-C1). Enter skull through foramen magnum. Unite at base of brainstem to form the basilar artery. Supply posterior brain, brainstem, and cerebellum.',m:'"Vertebral arteries travel UP through cervical transverse foramina. Feed posterior brain + brainstem."'},
{t:'Basilar artery',d:'Formed by union of the two vertebral arteries at the base of the pons. Travels up the ventral brainstem. Gives off branches to pons, cerebellum, and inner ear. Divides at upper pons into posterior cerebral arteries that join circle of Willis.',m:'"Basilar = base of pons. Vertebral + vertebral = basilar. Feeds brainstem and cerebellum."'},
{t:'Circle of Willis',d:'Arterial anastomosis (ring of connected arteries) at base of brain. Formed by: internal carotid arteries + anterior cerebral arteries + anterior communicating artery + posterior cerebral arteries + posterior communicating arteries. Allows blood to reach all brain areas even if one artery is blocked.',m:'"Circle of Willis = insurance ring for the brain. Connects internal carotid system with vertebrobasilar system."'},
{t:'Subclavian arteries',d:'Right: from brachiocephalic artery. Left: directly from aortic arch. Both pass under the clavicle. Give off vertebral arteries, internal thoracic arteries. Become AXILLARY ARTERIES at the lateral border of the first rib.',m:'"Subclavian = under clavicle. Right from brachiocephalic, left from aorta. Becomes axillary at rib 1."'},
{t:'Axillary artery',d:'Continuation of subclavian artery. Passes through the axilla (armpit). Gives off branches to shoulder, chest wall, and scapular region. Becomes the BRACHIAL ARTERY at the lower border of the teres major muscle.',m:'"Axillary = axilla (armpit). Subclavian → Axillary → Brachial. Follow the arm down."'},
{t:'Brachial artery',d:'Continuation of axillary artery in the arm. Runs medial to the biceps brachii muscle. Used for blood pressure measurement (stethoscope placed over it at antecubital fossa). Divides into RADIAL and ULNAR arteries at the elbow.',m:'"Brachial = arm. BP measurement site. Divides at elbow into radial + ulnar."'},
{t:'Radial artery',d:'Lateral branch from brachial artery at elbow. Runs along the radial (thumb) side of the forearm. Used to measure radial pulse at wrist (lateral wrist). Anastomoses with ulnar artery in palm via palmar arches.',m:'"Radial = thumb side of forearm. Radial pulse = wrist pulse on thumb side."'},
{t:'Ulnar artery',d:'Medial (larger) branch from brachial artery at elbow. Runs along the ulnar (little finger) side of the forearm. Larger of the two forearm arteries. Anastomoses with radial in palm.',m:'"Ulnar = little finger side of forearm. Larger of the two forearm arteries."'},
{t:'Celiac artery (celiac trunk)',d:'First unpaired branch of the abdominal aorta, at T12. Immediately divides into THREE branches: splenic artery (to spleen and pancreas), left gastric artery (to stomach), and common hepatic artery (to liver, gallbladder, stomach, duodenum).',m:'"Celiac = first abdominal aorta branch at T12. Three branches: Splenic + Left Gastric + Hepatic."'},
{t:'Splenic artery',d:'Branch of celiac artery. Runs along the superior border of the pancreas to the spleen. Also supplies the pancreas and parts of the stomach. Largest branch of the celiac trunk.',m:'"Splenic artery = from celiac → to spleen + pancreas."'},
{t:'Left gastric artery',d:'Smallest branch of celiac artery. Supplies the lesser curvature of the stomach and the lower esophagus.',m:'"Left gastric = from celiac → to stomach (lesser curvature). Smallest celiac branch."'},
{t:'Hepatic artery',d:'Branch of celiac artery (also called common hepatic artery). Supplies liver, gallbladder, parts of stomach, and duodenum. Becomes the proper hepatic artery before entering the liver at the porta hepatis.',m:'"Hepatic artery = from celiac → to liver + gallbladder. Hepatic = liver."'},
{t:'Superior mesenteric artery',d:'Unpaired branch of abdominal aorta at L1. Supplies entire small intestine and proximal large intestine (ascending colon and right half of transverse colon). Critical vessel — occlusion causes bowel ischemia.',m:'"Superior mesenteric = small intestine + right colon. Superior = upper GI territory."'},
{t:'Renal arteries',d:'Paired branches of abdominal aorta at L2. Right and left renal arteries. Each enters kidney at the renal hilum and branches extensively into segmental arteries. Kidneys receive 20-25% of cardiac output at rest.',m:'"Renal arteries = L2, one each side, go directly to kidneys. 20-25% of cardiac output."'},
{t:'Gonadal arteries',d:'Paired branches of abdominal aorta below renal arteries. In males = testicular arteries (descend into scrotum with testes). In females = ovarian arteries (pass into the broad ligament to reach ovaries). Long vessels because gonads descended from posterior abdominal wall.',m:'"Gonadal arteries = testicular (male) or ovarian (female). Long because gonads descended from abdominal origin."'},
{t:'Inferior mesenteric artery',d:'Unpaired branch of abdominal aorta at L3. Supplies left half of transverse colon, descending colon, sigmoid colon, and upper rectum.',m:'"Inferior mesenteric = left colon + sigmoid + upper rectum. Inferior = lower GI territory."'},
{t:'Common iliac arteries',d:'Terminal branches of the abdominal aorta. Aorta bifurcates at L4 into right and left common iliac arteries. Each divides into internal and external iliac artery. Supply pelvis and lower extremities.',m:'"Aorta ends at L4 splitting into two common iliacs. Like a Y at belly button level."'},
{t:'Internal iliac artery',d:'Branch of common iliac artery. Enters the pelvis. Supplies pelvic organs (bladder, rectum, uterus, vagina), gluteal muscles, and perineum. Does NOT supply the leg.',m:'"Internal iliac = goes INSIDE pelvis. Pelvic organs + gluteal muscles."'},
{t:'External iliac artery',d:'Branch of common iliac artery. Passes under the inguinal ligament to become the FEMORAL ARTERY. Supplies the lower extremity.',m:'"External iliac = goes outside pelvis under inguinal ligament → becomes femoral artery."'},
{t:'Femoral artery',d:'Continuation of external iliac artery below the inguinal ligament. Runs through the femoral triangle (medial thigh). NAVEL order at inguinal ligament: Nerve, Artery (femoral), Vein, Empty, Lymphatics (lateral to medial). Femoral pulse palpable here. Becomes popliteal artery at adductor hiatus.',m:'"Femoral = thigh artery. NAVEL at inguinal ligament. Femoral pulse in groin."'},
{t:'Popliteal artery',d:'Continuation of femoral artery behind the knee (popliteal fossa). Gives off genicular branches to the knee joint. Divides into anterior and posterior tibial arteries at the lower border of the popliteus muscle.',m:'"Popliteal = behind the knee. Femoral → popliteal → tibial arteries."'},
{t:'Anterior tibial artery',d:'Branch of popliteal artery. Passes through interosseous membrane to the anterior compartment of the leg. Supplies anterior leg muscles (tibialis anterior, extensors). Continues as the dorsalis pedis artery on the dorsum of the foot.',m:'"Anterior tibial = front of leg (extensors). Becomes dorsalis pedis on top of foot."'},
{t:'Posterior tibial artery',d:'Larger branch of popliteal artery. Runs in posterior compartment of leg. Passes behind medial malleolus (where pulse is palpable). Divides into medial and lateral plantar arteries supplying the sole of the foot.',m:'"Posterior tibial = back of leg. Pulse behind medial malleolus. Supplies sole of foot."'},
{t:'Posterior tibial vein',d:'Accompanies posterior tibial artery behind the medial malleolus. Drains posterior leg (calf). Joins anterior tibial vein to form popliteal vein.',m:'"Posterior tibial vein = behind medial malleolus. Drains calf."'},
{t:'Anterior tibial vein',d:'Accompanies anterior tibial artery in anterior compartment. Drains anterior leg muscles. Joins posterior tibial vein to form popliteal vein behind knee.',m:'"Anterior tibial vein = front of leg. Joins posterior tibial to make popliteal."'},
{t:'Popliteal vein',d:'Formed by union of anterior and posterior tibial veins behind the knee. Becomes the femoral vein as it passes through the adductor hiatus.',m:'"Popliteal vein = behind knee. Anterior tibial + posterior tibial → popliteal."'},
{t:'Femoral vein',d:'Continuation of popliteal vein. Accompanies femoral artery through the femoral triangle. Becomes the external iliac vein at the inguinal ligament. Also receives the great saphenous vein.',m:'"Femoral vein = thigh vein. Popliteal → femoral → external iliac."'},
{t:'Great saphenous vein',d:'Longest vein in the body. Superficial vein on medial aspect of leg. Runs from foot (dorsal venous arch) → medial leg → medial thigh → drains into femoral vein. Commonly used for coronary artery bypass grafts. Site of varicose veins.',m:'"Great saphenous = longest vein, medial leg, superficial. Used for CABG. Varicose veins form here."'},
{t:'External iliac vein',d:'Continuation of femoral vein above inguinal ligament. Joins internal iliac vein to form common iliac vein.',m:'"External iliac vein = above inguinal ligament. Femoral → external iliac."'},
{t:'Internal iliac vein',d:'Drains pelvic organs and gluteal region. Joins external iliac vein to form common iliac vein.',m:'"Internal iliac vein drains pelvis. Joins external iliac → common iliac."'},
{t:'Common iliac vein',d:'Formed by union of external and internal iliac veins. Right and left common iliac veins unite at L5 to form the INFERIOR VENA CAVA.',m:'"Common iliac veins → unite at L5 → inferior vena cava. Two tributaries make the IVC."'},
{t:'Radial vein',d:'Accompanies radial artery on the thumb side of the forearm. Deep vein. Joins ulnar vein to form brachial vein at the elbow.',m:'"Radial vein = thumb side forearm deep vein."'},
{t:'Ulnar vein',d:'Accompanies ulnar artery on the little-finger side of the forearm. Deep vein. Joins radial vein to form brachial vein.',m:'"Ulnar vein = little finger side forearm. Radial + ulnar → brachial."'},
{t:'Brachial vein',d:'Deep vein of the arm accompanying brachial artery. Formed by union of radial and ulnar veins at elbow. Becomes axillary vein.',m:'"Brachial vein = deep arm vein. Radial + ulnar → brachial → axillary."'},
{t:'Basilic vein',d:'Superficial vein on the MEDIAL side of the forearm and arm. Joins with the brachial vein to form the axillary vein. Used for IV access and peripherally inserted central catheters (PICC lines).',m:'"Basilic = medial superficial arm vein. BASIlic = medial BASIC (as in baSIc). PICC line site."'},
{t:'Cephalic vein',d:'Superficial vein on the LATERAL (thumb) side of the forearm and arm. Runs from hand to shoulder, drains into axillary vein. Common IV access site.',m:'"Cephalic = lateral (thumb) side superficial vein. Cephalic → toward the head (lat. cephalic = head)."'},
{t:'Axillary vein',d:'Formed by union of brachial vein + basilic vein. Passes through the axilla. Becomes the subclavian vein at the lateral border of the first rib.',m:'"Axillary = armpit vein. Brachial + basilic → axillary → subclavian."'},
{t:'Median cubital vein',d:'Superficial vein in the ANTECUBITAL FOSSA (front of elbow) connecting cephalic and basilic veins. Most common site for venipuncture (blood draws) and IV access. Not always present.',m:'"Median cubital = front of elbow. Most common blood draw site. Connects cephalic to basilic."'},
{t:'Renal veins',d:'Drain kidneys and return blood to inferior vena cava. Left renal vein is LONGER than right (must cross the aorta). Left gonadal vein drains into left renal vein (right gonadal drains directly into IVC).',m:'"Renal veins → IVC. Left renal vein is longer (crosses aorta). Left gonadal drains into left renal."'},
{t:'Hepatic veins',d:'Three hepatic veins (right, middle, left) drain the liver directly into the INFERIOR VENA CAVA just below the diaphragm. Short, wide veins. Receive blood from the hepatic sinusoids after liver processing.',m:'"Hepatic veins → IVC directly, just below diaphragm. Liver → hepatic veins → IVC."'},
{t:'Gonadal veins',d:'Drain the testes (testicular veins) or ovaries (ovarian veins). Right gonadal vein drains into IVC. Left gonadal vein drains into LEFT RENAL VEIN. Asymmetric drainage is clinically important (left varicocele more common due to drainage angle).',m:'"Right gonadal → IVC. Left gonadal → left renal vein. Asymmetry = left varicocele more common."'},
{t:'External jugular vein',d:'Superficial vein on lateral neck. Visible when straining. Drains the scalp and face. Drains into subclavian vein. Jugular venous distension (JVD) visible here in right heart failure.',m:'"External jugular = visible neck vein. JVD = right heart failure sign."'},
{t:'Internal jugular vein',d:'Deep vein running alongside internal carotid and common carotid arteries in the neck (within carotid sheath). Drains brain, face, and neck. Joins subclavian vein to form brachiocephalic vein.',m:'"Internal jugular = deep neck vein in carotid sheath. Drains brain. → brachiocephalic vein."'},
{t:'Subclavian vein',d:'Continuation of axillary vein. Passes under clavicle. Joins internal jugular vein to form brachiocephalic (innominate) vein. Common site for central venous catheter (subclavian line).',m:'"Subclavian vein = under clavicle. Axillary → subclavian. Central line placed here."'},
{t:'Brachiocephalic vein',d:'Formed by union of subclavian and internal jugular veins (one on each side). Right and left brachiocephalic veins unite to form the SUPERIOR VENA CAVA. Also called innominate veins.',m:'"Brachiocephalic vein = subclavian + internal jugular. Two of them unite → superior vena cava."'},
{t:'Hepatic portal system',d:'Special venous system that carries nutrient-rich blood from the GI tract and spleen to the liver BEFORE returning to the heart. Portal vein carries blood from digestive organs → liver sinusoids → hepatic veins → IVC. Liver gets first access to absorbed nutrients and drugs (first-pass metabolism).',m:'"Portal = GI blood goes to LIVER first. First-pass metabolism happens here. Portal vein = highway to liver."'},
{t:'Portal vein',d:'Formed by union of superior mesenteric vein and splenic vein behind the neck of the pancreas. Carries nutrient-rich blood from GI tract and spleen to the liver. Enters liver at porta hepatis.',m:'"Portal vein = superior mesenteric + splenic veins. Enters liver at porta hepatis."'},
{t:'Superior mesenteric vein',d:'Drains the small intestine and proximal large intestine. Joins with splenic vein to form the portal vein. Runs alongside superior mesenteric artery.',m:'"Superior mesenteric vein = drains small intestine. Joins splenic → portal vein."'},
{t:'Splenic vein',d:'Drains the spleen and pancreas. Runs from the spleen across the posterior abdomen. Joins superior mesenteric vein to form portal vein. Also receives inferior mesenteric vein and left gastric vein.',m:'"Splenic vein + superior mesenteric vein = portal vein. Splenic also receives inferior mesenteric."'},
{t:'Inferior mesenteric vein',d:'Drains the left colon, sigmoid colon, and upper rectum. Drains into the splenic vein (or junction of splenic + superior mesenteric). Mirrors inferior mesenteric artery territory.',m:'"Inferior mesenteric vein = left colon drainage → into splenic vein."'},
{t:'Left gastric vein',d:'Drains the lesser curvature of the stomach. Drains into the portal vein. In portal hypertension, blood backs up into left gastric vein → esophageal varices (dangerous).',m:'"Left gastric vein → portal vein. In portal hypertension: backed-up blood → esophageal varices."'}
]},
{id:'ap2-lymphimmune',label:'Ch. 21-22: Lymphatics & Immunity',icon:'🛡️',color:'#4ecdc4',section:'ap2',cards:[
{t:'Lymphatic vessels and flow',d:'One-way. Lymph capillaries to collecting vessels (valves) to trunks to ducts. Right lymphatic duct: right head/neck/arm to right subclavian vein. Thoracic duct: everything else to left subclavian. Cisterna chyli at L1-L2 receives intestinal lymph.',m:'Right = right upper quadrant only. Thoracic duct = everything else.'},
{t:'Lymph nodes',d:'Bean-shaped along lymph vessels. Cortex: B cell follicles. Paracortex: T cells. Medulla: plasma cells and macrophages. Multiple afferent vessels in, one efferent out. Filter lymph and mount immune responses. Cervical (head/neck), axillary (arm), inguinal (leg/pelvis).',m:'Lymph nodes = lymph filters and immune hubs.'},
{t:'Spleen',d:'Largest lymphoid organ. Left hypochondriac region. White pulp: lymphocytes (immune surveillance). Red pulp: macrophages filter old RBCs and store platelets. Filters BLOOD, not lymph.',m:'Spleen = blood filter and RBC graveyard.'},
{t:'Thymus',d:'Bilobed, in mediastinum. Largest in childhood, involutes after puberty. T lymphocyte maturation: positive selection (recognize self-MHC) and negative selection (destroy self-reactive T cells). Secretes thymosin.',m:'Thymus = T cell school. Graduate or die.'},
{t:'Tonsils',d:'Incomplete rings in pharynx. Palatine (oropharynx sides), pharyngeal/adenoids (posterior nasopharynx), lingual (base of tongue). First defense against inhaled and ingested pathogens.',m:'Tonsils = throat immune gatekeepers.'},
{t:'First line of defense',d:'Physical and chemical barriers. Skin (keratin, acid mantle pH 3-5). Mucous membranes and mucus (trap). Cilia (sweep). Lysozyme in saliva, tears, nasal secretions (destroys bacterial cell walls). Sebum (bacteriostatic). Gastric HCl. Protein enzymes.',m:'First line = walls and chemical weapons.'},
{t:'Second line: phagocytes and NK cells',d:'Neutrophils: first responders, phagocytize bacteria. Monocytes/macrophages: phagocytize, present antigens, release cytokines. NK cells: kill virus-infected cells and cancer cells without prior sensitization, recognize missing-self.',m:'Neutrophils first, macrophages follow, NK cells kill without asking.'},
{t:'Inflammatory response',d:'Purposes: limit spread, dispose of debris, promote repair. Cardinal signs: Pain, Redness, Swelling, Heat. Mast cell degranulation (histamine and prostaglandins) causes vasodilation and increased capillary permeability. Steps: margination, diapedesis, chemotaxis.',m:'PRSH: Pain, Redness, Swelling, Heat.'},
{t:'Phagocytosis process',d:'Margination: phagocytes adhere to vessel walls. Diapedesis: squeeze between endothelial cells. Chemotaxis: chemical gradient guides to pathogen. Engulfment forms phagosome, fuses with lysosome to form phagolysosome, enzymes destroy pathogen.',m:'M-D-C then engulf and destroy: Margination, Diapedesis, Chemotaxis.'},
{t:'Fever',d:'Hypothalamic set point raised by pyrogens such as LPS, IL-1, IL-6, TNF from macrophages. Benefits: increased metabolic rate, increased interferon production, inhibits bacterial growth. Dangerous above 40 degrees C.',m:'Fever = body thermostat turned up to fight infection.'},
{t:'Antimicrobial proteins',d:'Interferons (IFN-alpha, beta): secreted by virus-infected cells, warn neighbors to produce antiviral proteins. IFN-gamma from T cells activates macrophages. Complement system (C1-C9): classical, lectin, or alternative pathway leads to MAC (membrane attack complex) causing lysis.',m:'Interferon = warning signal. Complement = punch holes in pathogens.'},
{t:'Antigen and antigen presentation',d:'Antigen: substance that mobilizes adaptive defenses and provokes an immune response. Epitopes = specific binding regions on antigen. APCs (dendritic cells, macrophages, B cells): engulf antigen, display fragments on MHC II, activate helper T cells. MHC I on all nucleated cells activates cytotoxic T cells.',m:'APC with MHC II activates helper T. MHC I activates cytotoxic T.'},
{t:'B lymphocytes and humoral immunity',d:'Mature in bone marrow. Activated by antigen plus T helper cells, differentiate into plasma cells (secrete antibodies) and memory B cells. Antibody structure: 2 heavy plus 2 light chains, Y-shaped. Fab region (variable, antigen-binding). Fc region (constant, binds complement and phagocyte receptors).',m:'B cells = antibody factories. Fab binds antigen. Fc = effector functions.'},
{t:'Immunoglobulin classes',d:'IgM: first produced, pentamer, best complement activator. IgG: most abundant (80%), secondary response, crosses placenta for fetal immunity. IgA: secretory in saliva, tears, breast milk, GI and respiratory mucosa. IgE: allergies and parasites, triggers mast cells. IgD: B cell surface receptor.',m:'MADGE: M=first, A=secretions, D=B cell receptor, G=most, E=allergies.'},
{t:'Antibody functions',d:'Neutralization: block toxins and pathogens from binding host cells. Agglutination: clump antigens for easier phagocytosis. Precipitation: soluble antigens become insoluble. Complement activation leading to MAC and opsonization. Enhanced phagocytosis via opsonization.',m:'NAPCE: Neutralize, Agglutinate, Precipitate, Complement, Enhance phagocytosis.'},
{t:'Types of acquired immunity',d:'Naturally acquired active: infection leads to own antibodies and memory. Naturally acquired passive: maternal IgG crosses placenta, IgA in breast milk. Artificially acquired active: vaccination gives memory without disease. Artificially acquired passive: injection of immune serum (antivenom, rabies) gives immediate protection but no memory.',m:'Active = your own memory. Passive = borrowed antibodies.'},
{t:'T lymphocytes and cell-mediated immunity',d:'Mature in thymus. Require APC and MHC. Helper T cells (CD4+): orchestrate immune response, activate B cells and cytotoxic T cells and macrophages. Cytotoxic T cells (CD8+): kill virus-infected, cancerous, transplant cells via perforins and granzymes. Regulatory T cells: suppress response and prevent autoimmunity.',m:'Helper T = commander. Cytotoxic T = killer. Regulatory T = peacekeeper.'}
]},
{id:'ap2-respiratory',label:'Ch. 23: Respiratory System',icon:'🫁',color:'#7c9ef8',section:'ap2',cards:[
{t:'Paranasal sinuses',d:'Air-filled cavities in skull bones: maxillary (largest), frontal, sphenoidal, ethmoidal. Lined with mucosa continuous with nasal cavity. Functions: reduce skull weight, warm and humidify air, resonate voice. Drain into nasal meatuses. Infection causes sinusitis.',m:'MFSE: Maxillary, Frontal, Sphenoidal, Ethmoidal sinuses.'},
{t:'Nasal cavity',d:'Divided by nasal septum (perpendicular plate of ethmoid + vomer). Superior, middle, inferior turbinates/conchae create turbulence to filter, warm, humidify air. Meatuses = passages below each concha. Olfactory mucosa in superior region. Posterior nasal aperture opens into nasopharynx.',m:'Turbinates create turbulence to condition incoming air.'},
{t:'Pharynx',d:'Nasopharynx (posterior to nasal cavity): pharyngeal tonsils/adenoids, auditory tube openings, air only. Oropharynx (posterior to oral cavity): palatine tonsils, lingual tonsils, uvula, air and food. Laryngopharynx (below hyoid): connects to larynx and esophagus.',m:'Naso = air only. Oro and Laryngo = air and food.'},
{t:'Larynx',d:'Thyroid cartilage (Adam apple). Epiglottis (elastic, covers larynx during swallowing). Glottis = vocal cords plus rima glottidis (opening between cords). True vocal cords (inferior, sound production). False vocal cords (superior, no sound, protection). Cricoid cartilage = complete ring at base.',m:'Thyroid = Adam apple. Epiglottis = food traffic cop. True cords = sound.'},
{t:'Trachea and bronchial tree',d:'Trachea: 16-20 C-shaped cartilage rings (open posteriorly, trachealis muscle). Carina at T4-T5 bifurcates into right and left primary bronchi. Right bronchus = steeper angle (foreign objects lodge here). Secondary (lobar) bronchi: 3 right, 2 left. Segmental (tertiary) bronchi. Bronchioles. Terminal bronchioles. Cartilage disappears in bronchioles.',m:'Right bronchus = steeper = objects go right. No cartilage in bronchioles.'},
{t:'Respiratory zone structures',d:'Respiratory bronchioles (some alveoli in walls). Alveolar ducts. Alveolar sacs. Alveoli (gas exchange). About 300 million alveoli = 70 square meters surface area. Type I pneumocytes (simple squamous, gas exchange). Type II pneumocytes (cuboidal, secrete surfactant to reduce surface tension). Alveolar macrophages = dust cells.',m:'Type I = thin for gas exchange. Type II = surfactant factory.'},
{t:'Lungs',d:'Right lung: 3 lobes (superior, middle, inferior). Left lung: 2 lobes (superior, inferior) plus cardiac notch (accommodates heart). Visceral pleura adheres to lung. Parietal pleura lines thoracic wall. Pleural cavity has serous fluid to reduce friction and hold lungs via surface tension.',m:'Right = 3 lobes. Left = 2 plus cardiac notch.'},
{t:'Muscles of ventilation',d:'Quiet inspiration: diaphragm (flattens, increases vertical dimension) and external intercostals (elevate rib cage). Forced inspiration: sternocleidomastoid, scalenes, pectoralis minor. Quiet expiration: passive recoil of lungs and chest wall. Forced expiration: internal intercostals and abdominal muscles.',m:'Diaphragm and external intercostals for quiet breathing. Abdominals force air out.'},
{t:'Respiratory volumes',d:'Tidal volume (TV): 500 mL quiet breath. Inspiratory reserve volume (IRV): 3100 mL max above TV. Expiratory reserve volume (ERV): 1200 mL max below TV. Residual volume (RV): 1200 mL cannot be exhaled, keeps alveoli open. Vital capacity = TV + IRV + ERV = 4800 mL. Total lung capacity = VC + RV = 6000 mL.',m:'TV = 500. IRV + TV + ERV = vital capacity. Add RV = total.'},
{t:'External and internal respiration',d:'External respiration: O2 from alveoli to blood, CO2 from blood to alveoli. Alveolar PO2 = 105, venous PO2 = 40 mmHg. Internal respiration: O2 from blood to tissues, CO2 from tissues to blood. Both driven by partial pressure gradients (Dalton law).',m:'External = lungs. Internal = tissues. Both use partial pressure gradients.'},
{t:'O2 and CO2 transport',d:'O2: 98.5% bound to hemoglobin (oxyhemoglobin), 1.5% dissolved. Each Hb carries 4 O2. Bohr effect: increased CO2, H+, or temp decreases Hb-O2 affinity (releases O2 to active tissues). CO2: 70% as bicarbonate in plasma via carbonic anhydrase in RBCs, 23% carbaminohemoglobin, 7% dissolved.',m:'O2 rides hemoglobin. CO2 mostly becomes bicarbonate.'},
{t:'Control of breathing',d:'Medullary respiratory centers (dorsal and ventral respiratory groups) set basic rhythm. Pneumotaxic center in pons limits inspiration. Chemical factors: increased PCO2 is the most powerful stimulus, increases ventilation. Decreased pH also increases ventilation. Decreased PO2 only stimulates peripheral chemoreceptors (carotid and aortic bodies) when severely low.',m:'CO2 = strongest respiratory drive. O2 only matters at extreme low levels.'}
]},
{id:'ap2-digestive',label:'Ch. 26: Digestive System',icon:'🫄',color:'#f5c842',section:'ap2',cards:[
{t:'GI wall layers',d:'Mucosa (innermost): epithelium, lamina propria, muscularis mucosae. Submucosa: dense CT, Meissner plexus (sensory, submucosal). Muscularis externa: inner circular, outer longitudinal smooth muscle, Auerbach/myenteric plexus (motor). Serosa: visceral peritoneum (outermost).',m:'MSMS inside out: Mucosa, Submucosa, Muscularis, Serosa.'},
{t:'Peritoneum and mesenteries',d:'Parietal peritoneum lines abdominal wall. Visceral peritoneum covers organs. Peritoneal cavity has serous fluid. Dorsal mesentery tethers small intestine. Greater omentum hangs from greater curvature (fat apron). Lesser omentum: liver to lesser curvature. Retroperitoneal = behind peritoneum (kidneys, duodenum, pancreas, aorta).',m:'Greater omentum = fat apron over small intestine. Lesser = liver to stomach.'},
{t:'Oral cavity and salivary glands',d:'Hard palate (bone) + soft palate (muscle) + uvula. Tongue: filiform papillae (no taste), fungiform (some taste, scattered), circumvallate (most taste, row at back). Salivary glands: parotid (largest, serous, amylase), submandibular (mixed), sublingual (mostly mucous). Saliva contains amylase, lingual lipase, lysozyme, mucin.',m:'Parotid = amylase, starch digestion starts in mouth.'},
{t:'Esophagus',d:'Muscular tube from laryngopharynx to stomach. Upper third skeletal muscle, middle third mixed, lower third smooth muscle. Gastroesophageal sphincter (lower esophageal sphincter) prevents reflux. Peristalsis propels bolus. Dysfunction leads to GERD.',m:'Gastroesophageal sphincter prevents reflux. Upper = voluntary, lower = involuntary.'},
{t:'Stomach anatomy',d:'Fundus (gas pocket). Body (main region). Pylorus and pyloric sphincter (controls gastric emptying). Greater curvature (left, larger) and lesser curvature (right, smaller). Rugae = longitudinal folds allow expansion. Cardiac orifice and gastroesophageal sphincter at entry.',m:'Fundus, Body, Pylorus. Pyloric sphincter controls exit.'},
{t:'Stomach secretions',d:'Chief cells: secrete pepsinogen (activated to pepsin by HCl, begins protein digestion). Parietal cells: secrete HCl (activates pepsin, kills bacteria) and intrinsic factor (required for B12 absorption in ileum). G cells: secrete gastrin (stimulates HCl production). Mucous neck cells: protect stomach lining.',m:'Chief = pepsinogen. Parietal = HCl and intrinsic factor. G cells = gastrin.'},
{t:'Small intestine',d:'Duodenum (25 cm): receives bile and pancreatic juice at hepatopancreatic ampulla/sphincter of Oddi. Jejunum (2.5 m): major absorption site. Ileum (3.5 m): B12 absorption, bile salt reabsorption, ileocecal valve. Surface area increased by: circular folds (plicae circulares), villi (finger projections), microvilli (brush border).',m:'Duodenum = factory. Jejunum = main absorber. Ileum = finisher.'},
{t:'Large intestine',d:'Cecum (blind pouch) + appendix (lymphoid). Ascending colon, hepatic flexure, transverse colon, splenic flexure, descending colon, sigmoid colon, rectum, anal canal, anus. External anal sphincter (voluntary, skeletal). Internal anal sphincter (involuntary, smooth). Taenia coli (3 longitudinal muscle bands) create haustrations. Absorbs H2O and electrolytes.',m:'AHTS-DSRAA: Ascending, Hepatic, Transverse, Splenic, Descending, Sigmoid, Rectum, Anal, Anus.'},
{t:'Accessory organs: liver and gallbladder',d:'Liver: right lobe (larger) and left lobe separated by falciform ligament. Hepatocytes produce bile (emulsifies fats), detoxify, metabolize nutrients. Gallbladder stores and concentrates bile under right lobe. Bile duct joins pancreatic duct at hepatopancreatic ampulla.',m:'Liver = bile factory + detox. Gallbladder = bile storage.'},
{t:'Pancreas',d:'Head in duodenal curve, body, tail toward spleen. Exocrine: acini secrete pancreatic juice (amylase, lipases, proteases, bicarbonate) via pancreatic duct into duodenum. Endocrine: islets of Langerhans: alpha cells = glucagon, beta cells = insulin.',m:'Pancreas: Exocrine = digestive enzymes. Endocrine = insulin and glucagon.'},
{t:'Absorption summary',d:'Carbohydrates: monosaccharides (glucose via SGLT1, fructose via GLUT5) absorbed into capillaries. Proteins: amino acids via active transport into capillaries. Fats: fatty acids and monoglycerides form micelles, enter epithelial cells, reform triglycerides, packaged as chylomicrons, enter lacteals (lymph). Fat-soluble vitamins ADEK via lacteals. B12 requires intrinsic factor.',m:'Fats go to lymph lacteals. Everything else to portal vein.'}
]},
{id:'ap2-urinary',label:'Ch. 24-25: Urinary & Fluid Balance',icon:'🫘',color:'#f5c842',section:'ap2',cards:[
{t:'Gross kidney anatomy',d:'Retroperitoneal at T12-L3. Right kidney lower (liver). Hilum (medial concavity): renal artery, vein, ureter. Fibrous capsule, perirenal fat, renal fascia. Cortex (outer, nephrons). Medulla: renal pyramids (collecting ducts, loops). Renal columns (CT between pyramids). Papilla points to minor calyx, major calyx, renal pelvis, ureter.',m:'Cortex outside, pyramids inside. Papilla to calyx to pelvis to ureter.'},
{t:'Nephron blood supply',d:'Renal artery to interlobar to arcuate to interlobular arteries to afferent arteriole to glomerulus to efferent arteriole to peritubular capillaries (around PCT/DCT) and vasa recta (parallel to loop of Henle). Drains to renal vein.',m:'Afferent in, efferent out. Efferent feeds peritubular capillaries and vasa recta.'},
{t:'Nephron structure',d:'Renal corpuscle: Bowman capsule + glomerulus. Proximal convoluted tubule (PCT, 65% reabsorption). Loop of Henle: thin descending limb (H2O permeable), thick ascending limb (NaCl pumped out, impermeable to H2O). Distal convoluted tubule (DCT, regulated reabsorption). Collecting duct (final adjustment, ADH sensitive).',m:'Corpuscle to PCT to Loop to DCT to Collecting duct.'},
{t:'Urinary tract',d:'Ureters (25 cm, retroperitoneal, peristalsis). Urinary bladder: trigone (triangle between 2 ureteral openings and urethral orifice, no rugae, site of infection). Rugae allow expansion. Internal urethral sphincter (smooth, involuntary). External urethral sphincter (skeletal, voluntary). Male urethra 20 cm, female 4 cm (more UTIs in females).',m:'Trigone = 3-opening triangle. Internal = involuntary. External = voluntary.'},
{t:'Kidney functions',d:'Filtration of blood and excretion of nitrogenous wastes (urea, creatinine, uric acid). Acid-base homeostasis. Fluid and electrolyte balance. Blood pressure regulation via renin and RAAS. Erythropoietin (EPO) production stimulates RBC production. Calcitriol (active vitamin D) activation.',m:'FAEBRE: Filtration, Acid-base, Electrolytes, Blood pressure, RBC (EPO), vitamin D.'},
{t:'Glomerular filtration',d:'NFP = HPg minus (HPc + OPg) = 60 minus (18 + 32) = 10 mmHg. GFR = 125 mL/min (about 180 L/day). Filtration membrane: fenestrated glomerular endothelium, basement membrane, podocytes with pedicels and filtration slits. Filtrate is isotonic to blood: water, ions, nitrogenous wastes, glucose, amino acids. No proteins or cells.',m:'NFP = 10 mmHg. GFR = 125 mL/min. Filtrate = blood minus proteins and cells.'},
{t:'Reabsorption and secretion',d:'PCT: obligatory reabsorption of 65% Na+, all glucose and amino acids, 65% H2O via aquaporins, HCO3-. Loop of Henle: countercurrent multiplier establishes medullary osmotic gradient. DCT: aldosterone increases Na+ reabsorption and K+ secretion. Collecting duct: ADH increases H2O reabsorption (aquaporins). Secretion of H+, K+, NH4+.',m:'PCT = bulk reabsorption. Loop = gradient. DCT and collecting duct = fine tuning.'},
{t:'GFR regulation',d:'Intrinsic: myogenic mechanism (smooth muscle autoregulates). Tubuloglomerular feedback (macula densa senses NaCl, adjusts afferent arteriole). Extrinsic: sympathetic stimulation decreases GFR. RAAS: low BP triggers renin from JG cells, angiotensin II causes vasoconstriction and aldosterone release. ANP from atria increases GFR and decreases Na+ reabsorption.',m:'RAAS = restore BP. ANP = dump excess Na+ and water.'},
{t:'Countercurrent mechanisms',d:'Countercurrent multiplier in loop of Henle: thin descending = H2O out, NaCl in. Thick ascending = NaCl actively pumped out, impermeable to H2O. Builds medullary gradient 300 to 1200 mOsm. Countercurrent exchanger (vasa recta) preserves gradient by passively exchanging solutes. ADH opens aquaporins in collecting duct for concentrated urine. Urea recycling contributes to inner medullary gradient.',m:'Loop builds gradient. Vasa recta preserves it. ADH uses it for concentrated urine.'},
{t:'Fluid compartments',d:'Total body water about 60% of body weight. ICF (62% of TBW): K+ dominant at 140 mEq/L. ECF (38%): plasma (8%) and interstitial fluid (32%), Na+ dominant at 145 mEq/L. Osmolarity (280-300 mOsm) drives water movement between compartments.',m:'ICF = K+ inside. ECF = Na+ outside.'},
{t:'Water homeostasis regulation',d:'ADH (vasopressin): released by increased osmolarity or decreased blood volume, increases aquaporins in collecting duct, increases water reabsorption. RAAS: decreased BP triggers aldosterone, Na+ and water retention. Thirst: triggered by increased osmolarity or decreased blood volume via hypothalamus. ANP: atrial stretch releases ANP, increases Na+ and water excretion.',m:'ADH = water retention. Aldosterone = Na+ and water retention. ANP = excretion.'},
{t:'Acid-base balance',d:'Normal pH 7.35-7.45. Acidosis below 7.35. Alkalosis above 7.45. Buffers (immediate): bicarbonate (main ECF), phosphate (main ICF/urine), proteins including hemoglobin. Respiratory compensation (minutes): increased ventilation decreases CO2 and raises pH. Renal compensation (hours to days): adjusts H+ secretion and HCO3- reabsorption.',m:'CO2 + H2O makes H2CO3 makes H+ and HCO3-. Key equation for pH.'},
{t:'Acid-base disorders',d:'Respiratory acidosis: increased CO2 from hypoventilation (COPD, narcotic overdose). Respiratory alkalosis: decreased CO2 from hyperventilation (anxiety, high altitude, asthma). Metabolic acidosis: decreased HCO3- (diarrhea, DKA, renal failure). Metabolic alkalosis: increased HCO3- (vomiting, diuretics, excess antacids). Respiratory and renal systems compensate for each other.',m:'Respiratory acidosis = trapped CO2. Metabolic acidosis = lost HCO3-.'}
]},
{id:'ap2-reproductive',label:'Ch. 28-29: Reproduction & Development',icon:'👶',color:'#f472b6',section:'ap2',cards:[
{t:'Male anatomy overview',d:'Testes in scrotum (2-3 degrees cooler for spermatogenesis). Epididymis: sperm maturation and storage (2-3 weeks). Ductus deferens (vas deferens): from epididymis to ejaculatory duct. Seminal vesicles: 60% of semen, fructose and prostaglandins. Prostate: 30% of semen, citric acid and enzymes. Bulbourethral glands: pre-ejaculatory fluid.',m:'SEVEN UP: Seminal vesicles, Epididymis, Vas deferens, Ejaculatory duct, Nothing, Urethra, Penis.'},
{t:'Spermatogenesis',d:'In seminiferous tubules. Spermatogonia (2n) to primary spermatocyte (2n, DNA replicated) to 2 secondary spermatocytes (n, meiosis I) to 4 spermatids (n, meiosis II) to 4 spermatozoa. Sertoli cells: blood-testis barrier, nourish sperm, secrete inhibin (inhibits FSH). Leydig/interstitial cells: secrete testosterone (stimulated by LH).',m:'Leydig = testosterone (LH stimulus). Sertoli = nourish sperm (FSH stimulus).'},
{t:'Female anatomy overview',d:'Ovaries: cortex has follicles, medulla has blood vessels. Uterine tubes: fimbriae, infundibulum, ampulla (fertilization site), isthmus. Uterus: fundus (top), body, cervix. Uterine wall: perimetrium (serosa), myometrium (smooth muscle for contractions), endometrium (stratum functionalis sheds in menstruation, stratum basalis remains).',m:'Ampulla = fertilization site. Endometrium sheds. Myometrium contracts during birth.'},
{t:'Oogenesis',d:'All primary oocytes formed before birth, arrested in prophase I. At puberty one per month completes meiosis I to form secondary oocyte (arrested in metaphase II) and first polar body. Ovulation releases the secondary oocyte. Meiosis II completes only if fertilized, producing ovum and second polar body. Asymmetric division produces one large egg.',m:'Oogenesis starts before birth. Meiosis II only completes if fertilized.'},
{t:'Ovarian and uterine cycles',d:'Follicular phase (days 1-14): FSH stimulates follicle development, estrogen rises, LH surge triggers ovulation at day 14. Luteal phase (days 14-28): LH converts ruptured follicle to corpus luteum, which produces progesterone and estrogen to maintain endometrium. No fertilization: corpus luteum degenerates, hormone levels drop, menstruation begins. Uterine cycle: menstrual (1-5), proliferative (6-14, estrogen), secretory (15-28, progesterone).',m:'FSH grows follicle, estrogen rises, LH surge, ovulation, corpus luteum, progesterone.'},
{t:'Fertilization to implantation',d:'Fertilization in ampulla produces zygote (2n). Cleavage produces morula (solid ball), then blastocyst (inner cell mass becomes embryo, trophoblast becomes placenta). Implantation in endometrium days 6-10. Trophoblast secretes hCG to maintain corpus luteum and progesterone production, preventing menstruation. Basis of pregnancy test.',m:'Fertilization to zygote to morula to blastocyst to implantation. hCG = pregnancy hormone.'},
{t:'Embryonic and fetal development',d:'Weeks 1-2: pre-embryonic. Weeks 3-8: embryonic, organogenesis occurs, most vulnerable to teratogens. Gastrulation: ectoderm (nervous system, skin), mesoderm (muscle, bone, cardiovascular), endoderm (GI, respiratory, urinary lining). Week 9 onward: fetal period, growth and maturation. Placenta exchanges O2 and nutrients for CO2 and waste via umbilical vessels.',m:'Ectoderm = outside (skin, nerves). Mesoderm = middle (muscle, bone). Endoderm = inside linings.'},
{t:'Fetal circulation shunts',d:'Fetal lungs are non-functional and fluid-filled, so blood bypasses them. Foramen ovale: opening in atrial septum, blood flows from right atrium to left atrium. Ductus arteriosus: connects pulmonary trunk to aorta, bypasses lungs. Ductus venosus: umbilical vein to IVC, bypasses liver. At birth: lungs inflate, O2 rises, shunts close. Adult remnants: fossa ovalis, ligamentum arteriosum, ligamentum venosum, ligamentum teres.',m:'Three shunts: foramen ovale, ductus arteriosus, ductus venosus. All bypass pulmonary circulation.'},
{t:'Placental hormones',d:'hCG: maintains corpus luteum first trimester, detected in pregnancy tests. hPL (human placental lactogen): prepares breasts and alters maternal metabolism. Estrogen: increases uterine sensitivity and breast development. Progesterone: maintains endometrium and prevents uterine contractions. Late pregnancy: increased oxytocin receptors trigger positive feedback contraction cycle for birth.',m:'hCG = early signal. Progesterone = pregnancy maintainer. Oxytocin = birth trigger.'}
]}
]
const ALL_DECK = [];
CARD_GROUPS.forEach(g => {
  g.cards.forEach(c => {
    const base = {term:c.t, def:c.d, mnemonic:c.m||'', group:g.label, gid:g.id, color:g.color, icon:g.icon};
    ALL_DECK.push({...base, mode:'term→def'});
    ALL_DECK.push({...base, mode:'def→term'});
    ALL_DECK.push({...base, mode:'identify'});
    ALL_DECK.push({...base, mode:'image'}); // AI generates image for all cards
  });
});

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let mastered = JSON.parse(localStorage.getItem('af_mastered') || '[]');
let review = JSON.parse(localStorage.getItem('af_review') || '[]');

function save() {
  localStorage.setItem('af_mastered', JSON.stringify(mastered));
  localStorage.setItem('af_review', JSON.stringify(review));
}

const MODE_INFO = {
  'term→def': {label:'Term → Def', emoji:'📄', desc:'See term, recall definition'},
  'def→term': {label:'Def → Term', emoji:'🔍', desc:'See definition, name the term'},
  'identify':  {label:'Identify', emoji:'🎯', desc:'See image/clue, name the structure'},
  'image':     {label:'Image Quiz', emoji:'🖼️', desc:'Image only — name what you see'},
  'all':       {label:'All 4 Modes', emoji:'🔀', desc:'Mix of all card types'},
};

let curDeck = [];
let curIdx = 0;
let curFlipped = false;
let curMode = 'all';
let curGroup = null;

// ═══════════════════════════════════
// HOME
// ═══════════════════════════════════
function showHome() {
  document.getElementById('homeView').style.display = 'block';
  document.getElementById('fcView').style.display = 'none';
  renderHome();
}

function renderHome() {
  const totalBase = ALL_DECK.length / 3;
  document.getElementById('statTotal').textContent = ALL_DECK.length;
  document.getElementById('statMastered').textContent = mastered.length;
  document.getElementById('statReview').textContent = review.length;
  document.getElementById('statRemaining').textContent = ALL_DECK.length - mastered.length;
  const ap1 = CARD_GROUPS.filter(g => g.section === 'ap1');
  const anatomy = CARD_GROUPS.filter(g => g.section === 'anatomy');
  const ap2 = CARD_GROUPS.filter(g => g.section === 'ap2');

  function renderSection(groups) {
    return groups.map(g => {
      const total = g.cards.length * 4;
      const m = g.cards.filter(c => mastered.includes(c.t + '|' + g.id)).length * 3;
      const pct = total > 0 ? Math.round(m/total*100) : 0;
      return '<div class="gcard" style="border-top-color:' + g.color + '" onclick="startGroup(\'' + g.id + '\')">' +
        '<div class="gcard-icon">' + g.icon + '</div>' +
        '<h3>' + g.label + '</h3>' +
        '<p>' + g.cards.length + ' terms × 4 modes = ' + total + ' cards</p>' +
        '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%;background:' + g.color + '"></div></div>' +
        '<div style="font-size:10px;color:var(--text3);margin-top:5px">' + m + '/' + total + ' mastered</div>' +
        '</div>';
    }).join('');
  }

  document.getElementById('groupGrid').innerHTML =
    '<div class="section-header">🦴 A&P 1 — Foundations</div>' +
    '<div class="section-grid">' + renderSection(ap1) + '</div>' +
    '<div class="section-header">💀 Anatomy Atlas</div>' +
    '<div class="section-grid">' + renderSection(anatomy) + '</div>' +
    '<div class="section-header">🔬 A&P 2 — Systems</div>' +
    '<div class="section-grid">' + renderSection(ap2) + '</div>';
}

function startGroup(gid) {
  curGroup = gid;
  const g = CARD_GROUPS.find(x => x.id === gid);
  buildCurDeck();
  showFC(g.label);
}

let curSection = null;

function shuffleAll() {
  curGroup = null;
  curSection = null;
  buildCurDeck();
  showFC('All Groups — Shuffled');
}

function shuffleSection(section) {
  curGroup = null;
  curSection = section;
  buildCurDeck();
  showFC(section === 'ap1' ? 'A&P 1 Anatomy — All Groups' : 'A&P 2 Systems — All Groups');
}

function buildCurDeck() {
  let source;
  if (curGroup) {
    source = ALL_DECK.filter(c => c.gid === curGroup);
  } else if (curSection) {
    const ids = CARD_GROUPS.filter(g => g.section === curSection).map(g => g.id);
    source = ALL_DECK.filter(c => ids.includes(c.gid));
  } else {
    source = [...ALL_DECK];
  }
  if (curMode !== 'all') source = source.filter(c => c.mode === curMode);
  curDeck = source.sort(() => Math.random() - .5);
  curIdx = 0;
  curFlipped = false;
}

// ═══════════════════════════════════
// FLASHCARD SCREEN
// ═══════════════════════════════════
function showFC(title) {
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('fcView').style.display = 'block';
  document.getElementById('fcTitle').textContent = title;
  renderModeRow();
  renderCard();
}

function renderModeRow() {
  document.getElementById('modeRow').innerHTML = Object.entries(MODE_INFO).map(([mode, info]) => {
    const isOn = mode === curMode;
    const g = curGroup ? CARD_GROUPS.find(x => x.id === curGroup) : null;
    const bg = isOn ? (g ? g.color : 'var(--accent2)') : 'transparent';
    const clr = isOn ? '#0d0f14' : '';
    return `<button class="mbtn ${isOn?'on':''}" style="${isOn?`background:${bg};color:${clr}`:''}" onclick="setMode('${mode}')">${info.emoji} ${info.label}</button>`;
  }).join('');
}

function setMode(m) {
  curMode = m;
  buildCurDeck();
  renderModeRow();
  renderCard();
}

// ═══════════════════════════════════════════════════
// ANATOMY FLASHCARD SVG LIBRARY
// Detailed, shaded, color-coded anatomical diagrams


function renderCard() {
  if (!curDeck.length) {
    document.getElementById('cardFront').innerHTML = '<div class="fc-term">No cards in this set</div>';
    document.getElementById('cardBack').innerHTML = '';
    return;
  }
  const total = curDeck.length;
  const idx = curIdx % total;
  const c = curDeck[idx];
  const pct = Math.round(idx / total * 100);
  const key = c.term + '|' + c.gid;
  const isMastered = mastered.includes(key);
  const isReview = review.includes(key);

  document.getElementById('fcCounter').textContent = (idx + 1) + ' / ' + total;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('cardInner').className = 'card-inner' + (curFlipped ? ' flipped' : '');

  // ── Status + mode badges ────────────────────────────────────────────────
  const modeBadge = '<div class="mode-badge" style="background:' + c.color + '33;color:' + c.color + '">'
    + MODE_INFO[c.mode].emoji + ' ' + MODE_INFO[c.mode].label + '</div>';
  const statusBadge = isMastered
    ? '<div class="status-badge" style="background:rgba(82,209,138,.12);color:var(--green)">✓ Mastered</div>'
    : isReview
    ? '<div class="status-badge" style="background:rgba(240,112,96,.12);color:var(--coral)">↺ Review</div>'
    : '';

  // ── Short def = first sentence only ────────────────────────────────────
  const shortDef = c.def.split('.')[0].trim() + '.';

  // ── Build a short def + "show more" expandable ─────────────────────────
  const fullDefId = 'fulldef_' + idx;
  const defHTML = c.def.length > shortDef.length
    ? '<div class="fc-def-short">' + shortDef + '</div>'
      + '<div class="fc-def-full" id="' + fullDefId + '" style="display:none">'
      + '<div class="fc-def" style="margin-top:8px">' + c.def + '</div></div>'
      + '<button class="expand-btn" onclick="toggleDef(\'' + fullDefId + '\',this)">+ More detail</button>'
    : '<div class="fc-def-short">' + c.def + '</div>';

  const mnemonicHTML = c.mnemonic
    ? '<div class="mnem-box">💡 ' + c.mnemonic + '</div>'
    : '';

  // ── FRONT content by mode ───────────────────────────────────────────────
  let frontHTML = '';
  let backHTML = '';

  if (c.mode === 'term→def') {
    // FRONT: clean term name only
    frontHTML = '<div class="fc-term-display">'
      + '<div style="font-size:34px;margin-bottom:14px">' + c.icon + '</div>'
      + '<div class="fc-term">' + c.term + '</div>'
      + '<div class="fc-group-label">' + c.group + '</div>'
      + '</div>';
    // BACK: short def on top, full expandable below, mnemonic
    backHTML = '<div class="fc-answer-wrap">'
      + '<div class="fc-back-term">' + c.term + '</div>'
      + defHTML
      + mnemonicHTML
      + '</div>';

  } else if (c.mode === 'def→term') {
    // FRONT: short definition — guess the term
    frontHTML = '<div class="fc-question-wrap">'
      + '<div class="fc-prompt-label">What term matches this definition?</div>'
      + '<div class="fc-def-front">' + shortDef + '</div>'
      + '<div class="fc-group-label">' + c.group + '</div>'
      + '</div>';
    // BACK: term revealed + full def + mnemonic
    backHTML = '<div class="fc-answer-wrap">'
      + '<div class="fc-back-term" style="color:var(--green)">' + c.term + '</div>'
      + defHTML
      + mnemonicHTML
      + '</div>';

  } else if (c.mode === 'identify') {
    // FRONT: AI image with manual generate button
    frontHTML = '<div class="fc-question-wrap">'
      + '<div class="fc-prompt-label">Identify the structure:</div>'
      + imgHTML(c.term, c.group, false)
      + '<div class="fc-group-label">Group: ' + c.group + '</div>'
      + '</div>';
    // BACK: term + short def + mnemonic
    backHTML = '<div class="fc-answer-wrap">'
      + '<div class="fc-back-term" style="color:var(--accent)">' + c.term + '</div>'
      + defHTML
      + mnemonicHTML
      + '</div>';

  } else if (c.mode === 'image') {
    // FRONT: AI image — auto-generates and caches
    frontHTML = '<div class="fc-image-wrap">'
      + imgHTML(c.term, c.group, true)
      + '<div class="fc-prompt-label" style="margin-top:10px">What structure is shown?</div>'
      + '</div>';
    // BACK: term + short def + mnemonic
    backHTML = '<div class="fc-answer-wrap">'
      + '<div class="fc-back-term" style="color:var(--purple)">' + c.term + '</div>'
      + defHTML
      + mnemonicHTML
      + '</div>';
  }

  const hint = '<div class="fc-hint">tap card to flip</div>';

  document.getElementById('cardFront').innerHTML = modeBadge + statusBadge + frontHTML + hint;
  document.getElementById('cardBack').innerHTML = modeBadge + backHTML + '<div class="fc-hint">tap to flip back</div>';

  document.getElementById('scMastered').textContent = mastered.length;
  document.getElementById('scReview').textContent = review.length;
  document.getElementById('scRemaining').textContent = curDeck.length
    - mastered.filter(k => curDeck.some(c => c.term + '|' + c.gid === k)).length;
}

function toggleDef(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  btn.textContent = open ? '+ More detail' : '− Less';
}



function flip() { curFlipped = !curFlipped; renderCard(); }

function nav(dir) {
  curIdx = (curIdx + dir + curDeck.length) % curDeck.length;
  curFlipped = false;
  renderCard();
}

function mark(type) {
  const c = curDeck[curIdx % curDeck.length];
  const key = c.term + '|' + c.gid;
  if (type === 'mastered') {
    mastered = [...new Set([...mastered, key])];
    review = review.filter(k => k !== key);
  } else {
    review = [...new Set([...review, key])];
    mastered = mastered.filter(k => k !== key);
  }
  save();
  nav(1);
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// AI IMAGE GENERATION
// ═══════════════════════════════════════════════════════════════

// Cache: localStorage key prefix
const IMG_CACHE_KEY = 'af_aiimg_';

function getImgCache(term) {
  try { return localStorage.getItem(IMG_CACHE_KEY + term); } catch(e) { return null; }
}
function clearImgCache() {
  const keys = Object.keys(localStorage).filter(k => k.startsWith(IMG_CACHE_KEY));
  keys.forEach(k => localStorage.removeItem(k));
  alert('Image cache cleared (' + keys.length + ' images). Images will regenerate on next view.');
}

function setImgCache(term, dataUrl) {
  try { localStorage.setItem(IMG_CACHE_KEY + term, dataUrl); } catch(e) {}
}

// Build a detailed anatomy illustration prompt
function buildPrompt(term, group) {
  // Category detection for style
  const isOrgan = ['Heart chambers & valves','Nephron','Glomerulus','Blood composition','Insulin'].includes(term);
  const isMuscle = group.toLowerCase().includes('muscle') || ['Deltoid','ACL — Anterior Cruciate Ligament'].includes(term);
  const isBone = group.toLowerCase().includes('bone') || group.toLowerCase().includes('skeletal') || group.toLowerCase().includes('skull') || group.toLowerCase().includes('vertebr') || group.toLowerCase().includes('limb');

  let style, focus;

  if (isOrgan) {
    style = "detailed medical textbook cross-section illustration, clean white background, accurate anatomical colors, educational diagram style, Netter's Atlas quality";
    focus = `The ${term} is the ONLY subject, centered and large, filling 80% of the frame. Use a bright red or orange highlight arrow or colored overlay directly on the ${term} structure to make it immediately obvious which part is being shown.`;
  } else if (isMuscle) {
    style = "Gray's Anatomy atlas illustration, parchment background, detailed muscle fiber rendering, warm anatomical colors";
    focus = `Show the ${term} highlighted in a deeper red-orange color compared to surrounding muscles. The ${term} should be the clear focal point, with surrounding structures lighter/more faded.`;
  } else if (isBone) {
    style = "Gray's Anatomy atlas pencil illustration, ivory parchment paper background, warm bone tones, detailed shading";
    focus = `The ${term} is HIGHLIGHTED — shown in a warmer golden-tan color or with a subtle red outline to distinguish it from surrounding bones. The ${term} fills most of the frame. Surrounding skull/skeleton bones are present but lighter/more faded for context.`;
  } else {
    style = "Netter's Atlas of Human Anatomy illustration style, clean white background, professional medical illustration";
    focus = `The ${term} is the clear focal point, highlighted or colored differently from surrounding structures. Large and centered in the frame.`;
  }

  return `${style}. ${focus}. Single illustration only, no text labels, no borders, no page frames, no book edges, clinical accuracy for anatomy exam study of the ${term}.`;
}

// Render image HTML — used in card front
function imgHTML(term, group, autoGenerate) {
  const cached = getImgCache(term);
  const safeId = 'aiimg_' + term.replace(/[^a-z0-9]/gi,'_');

  if (cached) {
    // Already generated — show immediately
    return '<div class="ai-img-wrap"><img src="' + cached + '" alt="' + term + '"/></div>';
  }

  if (autoGenerate) {
    // Mode 4: show spinner, trigger generation after render
    setTimeout(() => generateImage(term, group, safeId), 100);
    return '<div class="ai-img-wrap">'
      + '<div class="ai-img-placeholder" id="' + safeId + '">'
      + '<div class="ai-spinner"></div>'
      + '<div>Generating illustration...</div>'
      + '</div></div>';
  }

  // Manual trigger button
  return '<div class="ai-img-wrap">'
    + '<div class="ai-img-placeholder" id="' + safeId + '">'
    + '<div style="font-size:32px">🎨</div>'
    + '<button class="ai-gen-btn" onclick="generateImage(\'' + term.replace(/'/g,"\'") + '\',\'' + group.replace(/'/g,"\'") + '\',\'' + safeId + '\')">'
    + '<span>✨ Generate Illustration</span>'
    + '</button>'
    + '<div style="font-size:11px;opacity:.6;margin-top:4px">AI-generated • saves for future use</div>'
    + '</div></div>';
}

async function generateImage(term, group, placeholderId) {
  const el = document.getElementById(placeholderId);
  if (!el) return;

  el.innerHTML = '<div class="ai-spinner"></div><div style="font-size:13px;color:#8a7a58;margin-top:6px">Generating illustration...</div>';
  // Update message after 8s so user knows it's still working
  const msgTimer = setTimeout(function() {
    const spinEl = document.getElementById(placeholderId);
    if (spinEl && spinEl.querySelector('.ai-spinner')) {
      spinEl.querySelector('div:last-child').textContent = 'Still rendering... (up to 40s)';
    }
  }, 8000);

  const prompt = buildPrompt(term, group);
  const encoded = encodeURIComponent(prompt);

  async function tryLoad(seed) {
    return new Promise((resolve, reject) => {
      const url = 'https://image.pollinations.ai/prompt/' + encoded
        + '?width=600&height=600&nologo=true&enhance=true&model=flux&seed=' + seed;
      const img = new Image();
      const timer = setTimeout(function() { img.src = ''; reject('timeout'); }, 40000);
      img.onload = function() { clearTimeout(timer); try { clearTimeout(msgTimer); } catch(e){} resolve(url); };
      img.onerror = function() { clearTimeout(timer); reject('error'); };
      img.src = url;
    });
  }

  const seeds = [Math.floor(Math.random() * 99999), 42, 7];
  for (let i = 0; i < seeds.length; i++) {
    try {
      if (i > 0) {
        el.innerHTML = '<div class="ai-spinner"></div><div style="font-size:12px;color:#8a7a58;margin-top:6px">Retrying... (attempt ' + (i + 1) + ')</div>';
      }
      const url = await tryLoad(seeds[i]);
      setImgCache(term, url);
      const wrapper = el.closest('.ai-img-wrap') || el.parentElement;
      if (wrapper) {
        wrapper.innerHTML = '<img src="' + url + '" alt="' + term + '" style="width:100%;border-radius:8px;border:1px solid #d8c8a0;box-shadow:0 2px 12px rgba(0,0,0,.12)"/>';
      }
      return;
    } catch(e) {
      if (i === seeds.length - 1) {
        el.innerHTML = '<div style="font-size:28px">\uD83D\uDDBC\uFE0F</div>'
          + '<div class="ai-img-error">Image unavailable \u2014 check connection</div>'
          + '<button class="ai-gen-btn" style="margin-top:8px" onclick="generateImage(\'' + term.replace(/'/g, '\\\'') + '\',\'' + group.replace(/'/g, '\\\'') + '\',\'' + placeholderId + '\')"> Retry</button>';
      }
    }
  }
}


showHome();
</script>

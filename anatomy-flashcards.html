<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>A&P Anatomy Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;--bg4:#222736;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#e8eaf2;--text2:#9099b0;--text3:#5c6480;
  --accent:#7c9ef8;--accent2:#5577e8;
  --green:#52d18a;--amber:#f5c842;--coral:#f07060;
  --purple:#b084f5;--teal:#4ecdc4;--pink:#f472b6;
  --radius:14px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100}
.logo{font-family:'Fraunces',serif;font-size:20px;font-weight:400;color:var(--text)}
.logo span{color:var(--accent);font-style:italic}
.header-actions{display:flex;align-items:center;gap:10px}
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn:hover{background:var(--bg4);color:var(--text)}
.btn-primary{background:var(--accent2);border-color:var(--accent2);color:#fff}
.btn-primary:hover{background:#4466d8}
.main{padding:24px;max-width:1200px;margin:0 auto}
.section-header{font-family:'Fraunces',serif;font-size:20px;font-weight:300;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);color:var(--text2)}
.section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:8px}
.group-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.group-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.group-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;background:var(--g-color,var(--accent))}
.group-icon{font-size:24px;margin-bottom:8px}
.group-name{font-size:13px;font-weight:500;margin-bottom:4px;line-height:1.3}
.group-count{font-size:11px;color:var(--text3)}
.group-prog{height:3px;background:var(--bg4);border-radius:2px;margin-top:10px}
.group-prog-fill{height:100%;border-radius:2px;transition:width .4s}

/* Study view */
.study-view{display:none;max-width:760px;margin:0 auto;padding:24px}
.study-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.study-title{font-family:'Fraunces',serif;font-size:22px;font-weight:300}
.mode-tabs{display:flex;gap:6px;flex-wrap:wrap}
.mode-tab{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s}
.mode-tab:hover{color:var(--text);border-color:var(--text3)}
.mode-tab.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.progress-bar{height:4px;background:var(--bg4);border-radius:2px;margin-bottom:16px}
.progress-fill{height:100%;border-radius:2px;transition:width .4s}
.card-counter{font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px}
.card-wrap{perspective:1200px;cursor:pointer;height:360px;max-width:620px;margin:0 auto}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:20px;border:1px solid var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center}
.card-front{background:var(--bg2)}
.card-back{background:var(--bg3);transform:rotateY(180deg)}
.fc-term{font-family:'Fraunces',serif;font-size:22px;font-weight:300;color:var(--text);margin-bottom:8px;line-height:1.3}
.fc-group-tag{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:6px}
.fc-hint{font-size:11px;color:var(--text3);margin-top:12px}
.fc-def{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:10px;overflow-y:auto;max-height:180px}
.fc-mnemonic{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.2);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--amber);width:100%;margin-top:6px}
.fc-mnemonic-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;opacity:.7;margin-bottom:3px}
.card-actions{display:flex;gap:10px;align-items:center;justify-content:center;margin-top:16px;flex-wrap:wrap}
.card-btn{padding:9px 20px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s}
.card-btn:hover{background:var(--bg4)}
.card-btn.got-it{border-color:var(--green);color:var(--green)}
.card-btn.got-it:hover{background:rgba(82,209,138,.1)}
.card-btn.needs-review{border-color:var(--coral);color:var(--coral)}
.card-btn.needs-review:hover{background:rgba(240,112,96,.1)}
.card-btn.flip-btn{background:var(--accent2);border-color:var(--accent2);color:#fff}
.status-row{display:flex;gap:16px;font-size:12px;color:var(--text2);justify-content:center;margin-top:8px}
.status-row span{color:var(--text);font-weight:500}

/* Identify mode */
.ai-img-wrap{width:260px;height:260px;border-radius:12px;border:1px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:12px}
.ai-img-wrap img{width:100%;height:100%;object-fit:cover;border-radius:11px}
.ai-gen-btn{padding:8px 18px;border-radius:var(--radius-sm);border:1px solid var(--accent2);background:transparent;color:var(--accent);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s;margin-top:8px}
.ai-gen-btn:hover{background:rgba(85,119,232,.1)}
.ai-img-loading{font-size:12px;color:var(--text3);text-align:center;padding:20px}
.ai-img-error{font-size:12px;color:var(--coral);text-align:center;padding:8px}

@media(max-width:600px){
  .card-wrap{height:300px}
  .fc-term{font-size:18px}
  .fc-def{font-size:12px}
  .study-view{padding:16px}
  .main{padding:16px}
}
</style>
</head>
<body>
<header>
  <div class="logo">A&P <span>Flashcards</span></div>
  <div class="header-actions">
    <div id="streakBadge" style="font-size:13px;color:var(--amber);background:rgba(245,200,66,.1);padding:5px 12px;border-radius:20px;border:1px solid rgba(245,200,66,.2)">🔥 <span id="streakNum">0</span> mastered</div>
    <button class="btn" onclick="showHome()" id="backBtn" style="display:none">← Back</button>
  </div>
</header>
<div id="homeView">
  <div class="main">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Total Cards</div>
        <div style="font-family:'Fraunces',serif;font-size:28px;font-weight:300;color:var(--accent)" id="statTotal">0</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Mastered</div>
        <div style="font-family:'Fraunces',serif;font-size:28px;font-weight:300;color:var(--green)" id="statMastered">0</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Needs Review</div>
        <div style="font-family:'Fraunces',serif;font-size:28px;font-weight:300;color:var(--coral)" id="statReview">0</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Remaining</div>
        <div style="font-family:'Fraunces',serif;font-size:28px;font-weight:300;color:var(--text2)" id="statRemaining">0</div>
      </div>
    </div>
    <div id="groupGrid"></div>
  </div>
</div>
<div id="fcView" style="display:none;padding:24px;max-width:760px;margin:0 auto">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div id="fcTitle" style="font-family:'Fraunces',serif;font-size:22px;font-weight:300"></div>
    <div id="modeRow" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  <div class="card-counter" id="fcCounter"></div>
  <div class="card-wrap" onclick="flip()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front" id="cardFront"></div>
      <div class="card-face card-back" id="cardBack"></div>
    </div>
  </div>
  <div class="card-actions" id="cardActions"></div>
  <div class="status-row">
    <div>Mastered: <span id="scMastered">0</span></div>
    <div>Review: <span id="scReview">0</span></div>
    <div>Remaining: <span id="scRemaining">0</span></div>
  </div>
</div>
<script>
const CARD_GROUPS = [
{id:'ap1-org',label:'Ch. 1-3: Organization & Chemistry',icon:'⚗️',color:'#7c9ef8',section:'ap1',cards:[
{t:'Chemical level',d:'Atoms and molecules — smallest level; includes water, proteins, lipids, DNA, ATP.',m:'Cells Can’t Talk On Saturday Organically (Chemical→Cellular→Tissue→Organ→System→Organism)'},
{t:'Cellular level',d:'Cells are the basic structural and functional units of life. All cells come from pre-existing cells (cell theory).',m:'CELL = CErtainly the smaLLest living unit.'},
{t:'Tissue level',d:'Groups of similar cells performing a common function. Four types: epithelial, connective, muscle, nervous.',m:'Think of tissue paper — layers of similar material.'},
{t:'Organ level',d:'Two or more tissue types working together for a specific function.',m:'ORGAN = ORGANized tissues.'},
{t:'Organ system level',d:'Several organs cooperating toward a common purpose.',m:''},
{t:'Organismal level',d:'All organ systems working together to sustain life via homeostasis.',m:''},
{t:'Anatomical position',d:'Body erect, feet together, palms facing forward. Standard reference for all directional terms.',m:'Standing at attention, thumbs out.'},
{t:'Directional terms',d:'Superior/inferior (up/down). Anterior/posterior (front/back). Medial/lateral (toward/away from midline). Proximal/distal (near/far from origin). Superficial/deep.',m:'Super Infants Are Prone to Medial Lateral Problems Sometimes Deep.'},
{t:'Body planes',d:'Sagittal (divides L/R). Frontal/coronal (front/back). Transverse/horizontal (top/bottom). Oblique = diagonal cut.',m:'SFT like X, Y, Z axes.'},
{t:'Body cavities',d:'Dorsal: cranial + spinal. Ventral: thoracic (pleural + pericardial) + abdominopelvic (abdominal + pelvic). Mediastinum = central thoracic region.',m:'Dorsal = back. Ventral = front.'},
{t:'Covalent bond',d:'Atoms share electrons. Polar: unequal sharing (water). Nonpolar: equal (O₂). Strong bonds — backbone of organic molecules.',m:'"Co" = together. Covalent = sharing together.'},
{t:'Ionic bond',d:'Atom donates electron(s) → oppositely charged ions attract. Dissolved by water. E.g., NaCl → Na⁺ + Cl⁻.',m:'"I" gave my electron to you — ionic.'},
{t:'Hydrogen bond',d:'Weak attraction between δ+ hydrogen and δ− atom (O or N). Stabilizes DNA, protein shape, water surface tension.',m:'H-bonds: Helpful but Weak. Critical in DNA and proteins.'},
{t:'pH scale',d:'0–14. Below 7 = acidic (↑H⁺). Above 7 = basic (↑OH⁻). Blood pH = 7.35–7.45. Buffers resist pH changes.',m:'pH 7 = Pure Heaven. Blood barely above it.'},
{t:'ATP',d:'Adenosine triphosphate — energy currency. ATP→ADP+Pi releases energy. Made by cellular respiration. Powers muscle contraction, active transport, biosynthesis.',m:'ATP = A Tiny Powerhouse.'},
{t:'Enzymes',d:'Biological catalysts — lower activation energy. Proteins, not consumed. Specific (lock-and-key / induced fit). Denatured by extreme pH/temp.',m:'"EN-zymes ENhance reactions without being used up."'},
{t:'Carbohydrates',d:'C:H:O ratio ~1:2:1. Monosaccharides (glucose), disaccharides (sucrose), polysaccharides (glycogen = animal storage, starch = plant). Primary short-term fuel.',m:'"Carbo" = carbon + "hydrate" = water.'},
{t:'Lipids',d:'Nonpolar, hydrophobic. Triglycerides (energy storage), phospholipids (cell membranes), steroids (cholesterol→hormones).',m:'Lipids Love to be Lone — they repel water.'},
{t:'Proteins',d:'Amino acids linked by peptide bonds. Primary → secondary (α-helix/β-sheet) → tertiary (3D fold) → quaternary. Functions: structural, enzymatic, transport (Hb), hormonal, immune.',m:'Proteins = Primary workers of the cell.'},
{t:'Nucleic acids',d:'DNA: deoxyribose, double helix, ATGC — stores genetic info. RNA: ribose, single strand — transcribes and translates. mRNA carries code, tRNA brings amino acids.',m:'DNA = blueprint. RNA = working copy.'},
{t:'Dehydration synthesis vs hydrolysis',d:'Dehydration synthesis: H₂O removed to join monomers → polymer. Hydrolysis: H₂O added to break polymer → monomers. All digestion = hydrolysis; biosynthesis = dehydration.',m:'Dehydration = remove water to build. Hydrolysis = add water to break.'}
]},
{id:'ap1-cell',label:'Ch. 4: Cell Biology',icon:'🔬',color:'#4ecdc4',section:'ap1',cards:[
{t:'Plasma membrane',d:'Phospholipid bilayer — hydrophilic heads out, hydrophobic tails in. Fluid mosaic model. Selectively permeable. Cholesterol stabilizes fluidity. Glycoproteins for cell recognition.',m:'FMM = Fluid Mosaic Model. Icebergs in a sea.'},
{t:'Nucleus',d:'Largest organelle. Double membrane + pores. Nucleolus: makes rRNA, assembles ribosomes. Chromatin ↔ chromosomes. Contains DNA.',m:'"Nucle-us" = the boss with the instruction manual.'},
{t:'Mitochondria',d:'Double membrane: outer (smooth) + inner (cristae). Matrix: Krebs cycle. Inner membrane: ETC → ATP. Own DNA → endosymbiotic origin.',m:'"Mighty Mitochondria Make Much ATP."'},
{t:'Rough ER',d:'Ribosomes studded on surface. Synthesizes proteins for secretion, membranes, lysosomes. Sends transport vesicles → Golgi.',m:'"Rough ER = factory with workers making exports."'},
{t:'Smooth ER',d:'No ribosomes. Lipid/steroid synthesis, detoxification (liver), Ca²⁺ storage (muscle = sarcoplasmic reticulum).',m:'"Smooth = no bumps. Lipid factory + detox."'},
{t:'Ribosomes',d:'Free (proteins for cytoplasm) or bound (proteins for secretion). Made of rRNA + proteins. Two subunits. No membrane.',m:'"Ribosomes = Responsible for Building proteins."'},
{t:'Golgi apparatus',d:'Cis face receives from rough ER. Trans face ships. Modifies, packages, sorts proteins/lipids. Makes lysosomes.',m:'Golgi = FedEx. Cis receives, Trans ships.'},
{t:'Lysosomes',d:'Membrane sacs with hydrolytic enzymes. pH ~5. Digest organelles (autophagy), bacteria (phagolysosomes). "Suicide bag" if ruptured.',m:'"Lysosome = cell stomach + trash compactor."'},
{t:'Cytoskeleton',d:'Microfilaments (actin — shape/movement). Intermediate filaments (stability). Microtubules (tubulin — division, organelle transport, cilia/flagella).',m:'"MIT: Microfilaments, Intermediate, Tubules."'},
{t:'Cilia & flagella',d:'Cilia: short, numerous, sweep substances (respiratory, uterine tube). Flagella: long, single (sperm). Both: 9+2 microtubule array. Dynein motors.',m:'"Cilia sweep, flagella propel."'},
{t:'Diffusion',d:'High → low concentration (down gradient). Passive (no ATP). Rate ↑ with temp, surface area, gradient; ↓ with distance, molecule size.',m:'"Diffusion Doesn’t Demand energy."'},
{t:'Osmosis',d:'Water diffusion across selectively permeable membrane. Water moves toward higher solute concentration.',m:'"Osmosis = Only water moves." Toward more concentrated side.'},
{t:'Facilitated diffusion',d:'Passive — channel or carrier proteins. No ATP. Follows gradient. Channels: ions. Carriers: glucose (GLUT). Saturable.',m:'"Facilitated = protein FACILITATOR."'},
{t:'Active transport (primary)',d:'Against gradient. Requires ATP + carrier. Na⁺/K⁺ ATPase: 3 Na⁺ out, 2 K⁺ in. Maintains RMP at −70 mV.',m:'"Active = ATP to go Against the gradient."'},
{t:'Secondary active transport',d:'Uses Na⁺ gradient (built by Na⁺/K⁺ pump) to move other substances. Symport: Na⁺ + glucose (intestine). Antiport: Na⁺ in, Ca²⁺ out.',m:'"Secondary = piggybacks on Na⁺ gradient."'},
{t:'Endocytosis & exocytosis',d:'Endocytosis: phagocytosis (cells/debris), pinocytosis (fluids), receptor-mediated (LDL). Exocytosis: vesicle fuses with plasma membrane, releases contents.',m:'"Endo = into. Exo = out."'},
{t:'Tonicity',d:'Isotonic (0.9% NaCl): no net osmosis. Hypotonic: water enters → swells/lyses (hemolysis). Hypertonic: water leaves → shrinks (crenation).',m:'"Iso = equal. Hypo = less → pops. Hyper = more → shrivels."'},
{t:'Interphase',d:'G1: growth + protein synthesis. S phase: DNA replication (each chromosome → 2 sister chromatids at centromere). G2: final prep, centrioles duplicate. ~90% of cell cycle.',m:'"I Studied Genetics" = G1-S-G2.'},
{t:'Mitosis (PMAT)',d:'Prophase (condense, spindle forms). Metaphase (align at plate). Anaphase (chromatids to poles). Telophase (nuclear envelopes reform) + cytokinesis.',m:'"PMAT: People Meet And Talk."'},
{t:'Meiosis',d:'Two divisions → 4 haploid gametes. Crossing over in prophase I → genetic diversity. Spermatogenesis: 4 sperm. Oogenesis: 1 egg + 3 polar bodies.',m:'"Meiosis makes gametes — half the chromosomes."'},
{t:'Cell cycle control',d:'Checkpoints: G1, G2, M. Cyclins + CDKs drive cycle forward. p53 = guardian of genome. Proto-oncogenes → oncogenes = cancer.',m:'"G1-G2-M: Go? Go? Go?"'},
{t:'DNA replication',d:'Semi-conservative. Helicase unwinds, primase adds primer, DNA polymerase builds 5’→3’, ligase seals Okazaki fragments. Occurs in S phase.',m:'"HPPL: Helicase, Primase, Polymerase, Ligase."'}
]},
{id:'ap1-tissue',label:'Ch. 5: Tissue Organization',icon:'🧫',color:'#b084f5',section:'ap1',cards:[
{t:'Epithelium basics',d:'Covers body surfaces, lines cavities/organs, forms glands. Avascular (diffusion from CT below). High mitotic rate. Basement membrane anchors it. Apical surface faces lumen/environment.',m:'"Epithelium = Edge tissue — it lines everything."'},
{t:'Simple squamous',d:'Single layer, flat cells. Alveoli (gas exchange), glomeruli (filtration), endothelium (BVs), mesothelium (body cavities). Minimizes diffusion distance.',m:'"Squished flat — one layer thin for diffusion."'},
{t:'Simple cuboidal',d:'Single layer, cube-shaped cells. Kidney tubules (absorption/secretion), thyroid follicles, small gland ducts.',m:'"Cube cells = kidney tubes."'},
{t:'Simple columnar',d:'Single layer, tall cells. Microvilli ↑absorption. Goblet cells secrete mucus. Lines stomach, small/large intestine, gallbladder.',m:'"Tall columns guard the gut."'},
{t:'Pseudostratified columnar',d:'All cells on basement membrane; only some reach surface. Ciliated with goblet cells. Lines respiratory tract — mucus trap + cilia sweep.',m:'"Pseudo = fake stratified. All touch the base."'},
{t:'Stratified squamous',d:'Multiple layers. Keratinized (dead, waterproof): skin. Nonkeratinized (living, moist): mouth, esophagus, vagina, cornea.',m:'"Stratified = stacked for strength."'},
{t:'Transitional epithelium',d:'Stratified, stretchy. Dome-shaped cells relax → flat when stretched. Lines urinary bladder, ureter, renal pelvis.',m:'"Transitional = transforms with stretch." Bladder.'},
{t:'Glands',d:'Endocrine: ductless, hormones into blood. Exocrine: ducted, onto surface/lumen. Secretion: merocrine (exocytosis), apocrine (apical cytoplasm lost), holocrine (whole cell ruptures = sebaceous).',m:'"Endo = no duct, into blood. Exo = duct, out."'},
{t:'CT basics',d:'Most abundant tissue. Cells + ECM (ground substance + fibers). Functions: support, binding, protection, insulation, transport (blood).',m:'"CT = Connects and supports everything."'},
{t:'CT fibers',d:'Collagen (most abundant — thick, white, high tensile strength). Elastic (stretch/recoil). Reticular (thin collagen framework — lymph nodes, liver, bone marrow).',m:'"CER: Collagen, Elastic, Reticular."'},
{t:'Loose CT (areolar)',d:'Most widely distributed CT. Gel-like ground substance. Wraps BVs, nerves, underlies epithelia. Fluid reservoir.',m:'"Areolar = airy and loose — bubble wrap for organs."'},
{t:'Dense regular CT',d:'Parallel collagen bundles. Withstands unidirectional stress. Tendons (muscle→bone), ligaments (bone→bone), aponeuroses.',m:'"Dense Regular = Direct pull only."'},
{t:'Adipose tissue',d:'Adipocytes with lipid droplet (nucleus pushed to periphery). Energy storage, insulation, cushion. Brown fat = thermogenesis in newborns.',m:'"Adipose = fat. Storage, insulation, cushion."'},
{t:'Hyaline cartilage',d:'Glassy ground substance (type II collagen invisible). Chondrocytes in lacunae. Avascular → slow healing. Articular surfaces, costal cartilage, trachea, nose.',m:'"Hyaline = glassy. Most common cartilage."'},
{t:'Fibrocartilage',d:'Thick parallel collagen + chondrocytes. Strongest cartilage. Intervertebral discs, pubic symphysis, menisci.',m:'"Fibrocartilage = fibrous + cushioning. Discs and menisci."'},
{t:'Bone (osseous tissue)',d:'Matrix: collagen + hydroxyapatite. Osteon = structural unit: concentric lamellae, central canal, osteocytes in lacunae connected by canaliculi.',m:'"B before C: BLASTs Build, CLASTs Crush."'},
{t:'Blood',d:'Fluid CT. Matrix = plasma. Formed elements: RBCs (O₂), WBCs (immunity), platelets (clotting). Hematopoiesis in red bone marrow.',m:'"Blood = fluid CT — cells in liquid matrix."'},
{t:'Skeletal muscle',d:'Long cylindrical fibers. Multinucleated (peripheral). Striated. Voluntary. Attached by tendons. Sarcomere = functional unit.',m:'"Skeletal = Striped, Strong, Self-controlled."'},
{t:'Cardiac muscle',d:'Branching cells. Single central nucleus. Striated. Involuntary. Intercalated discs: desmosomes (mechanical) + gap junctions (electrical). Only in myocardium.',m:'"Cardiac = can’t stop — discs keep it synced."'},
{t:'Smooth muscle',d:'Spindle-shaped. Single central nucleus. Nonstriated. Involuntary. Walls of hollow organs: GI, BVs, bladder, uterus, airways.',m:'"Smooth = no stripes, slow, sustained."'},
{t:'Neurons',d:'Dendrites (receive) → soma (nucleus) → axon hillock (AP initiation) → axon → synaptic terminals (release NT). Amitotic.',m:'"DAD: Dendrites Absorb, Axon Delivers."'},
{t:'Neuroglia',d:'Support cells (10–50× more than neurons). CNS: astrocytes (BBB), oligodendrocytes (myelin), microglia (immune), ependymal (CSF). PNS: Schwann cells (myelin), satellite cells.',m:'"Glia = glue. AOME in CNS."'}
]},
{id:'ap1-integumentary',label:'Ch. 6: Integumentary System',icon:'🫀',color:'#f5c842',section:'ap1',cards:[
{t:'Stratum basale',d:'Deepest layer on basement membrane. Keratinocytes (mitotic — replenish all layers every 2–4 weeks). Melanocytes (produce melanin, transfer to keratinocytes). Merkel cells (touch receptors).',m:'"Basale = BASE. Babies Born at the Base."'},
{t:'Stratum spinosum',d:'8–10 layers. Desmosomes appear spiny. Langerhans cells (antigen presentation). Keratin synthesis begins.',m:'"Spinosum = spiny connections."'},
{t:'Stratum granulosum',d:'3–5 layers. Keratohyalin granules → keratin. Lamellar granules release lipids → waterproof barrier. Cells flatten and die.',m:'"Granulosum = grains forming. Waterproofing here."'},
{t:'Stratum lucidum',d:'Only in thick skin (palms, soles). Thin, clear, dead cells. Transitional zone.',m:'"Lucid = clear. Only in palm and sole."'},
{t:'Stratum corneum',d:'20–30 layers dead, flat, anucleate, keratinized cells. Main barrier vs water loss, UV, microbes. Shed every 2 weeks.',m:'"Corneum = horny dead bodyguard layer."'},
{t:'Dermis — papillary layer',d:'Superficial 20%. Loose areolar CT. Dermal papillae → fingerprints. Meissner’s corpuscles (light touch), free nerve endings (pain/temp), capillary loops.',m:'"Papillary = tiny papillae bumps."'},
{t:'Dermis — reticular layer',d:'Deep 80%. Dense irregular CT — interlacing collagen + elastic. Pacinian corpuscles (deep pressure), hair follicles, sweat/sebaceous glands.',m:'"Reticular = net-like weave = strength."'},
{t:'Hypodermis (subcutaneous)',d:'Not part of skin. Loose CT + adipose. Anchors skin, insulation, energy storage, shock absorption. SC injection site.',m:'"Hypo = below skin. Fat layer under everything."'},
{t:'Melanocytes & melanin',d:'In stratum basale. Same number in all races — skin color = melanin production rate. Eumelanin (brown/black), pheomelanin (yellow/red). Absorbs UV → protects DNA.',m:'"Same factory, different output."'},
{t:'Eccrine sweat glands',d:'Merocrine secretion. Everywhere (densest: palms, soles, forehead). H₂O + NaCl + urea. Thermoregulation via evaporative cooling.',m:'"Eccrine = Everywhere, Evaporative cooling."'},
{t:'Apocrine sweat glands',d:'Axilla, groin, areola. Protein-rich secretion. Odorless until bacteria metabolize. Activated at puberty. Emotional sweating.',m:'"Apocrine = Axilla, puberty."'},
{t:'Sebaceous glands',d:'Holocrine secretion (whole cell ruptures → sebum). Associated with hair follicles. Sebum waterproofs + softens. Activated at puberty. Blocked → acne.',m:'"Sebum = SEBaceous = SEBum."'},
{t:'Skin functions',d:'Protection (UV, microbes, water loss). Thermoregulation (sweating + vasodilation). Sensation. Vitamin D synthesis. Excretion (urea, salts via sweat).',m:'"PTSVSE: Protection, Thermo, Sensation, Vitamin D, Secretion, Excretion."'},
{t:'Burns — classification',d:'1st degree: epidermis only — redness (sunburn). 2nd degree: epidermis + partial dermis — blisters, pain. 3rd degree: full thickness — painless (nerves destroyed), leathery, needs grafting.',m:'"1st = sunburn. 2nd = blisters. 3rd = no pain = deep."'},
{t:'Vitamin D synthesis',d:'UV converts 7-dehydrocholesterol → D3 in skin → liver → kidney → active calcitriol. Required for Ca²⁺ absorption. Deficiency → rickets / osteomalacia.',m:'"Skin → liver → kidney = active vitamin D."'}
]},
{id:'ap1-skeletal',label:'Ch. 7-9: Skeletal System',icon:'🦴',color:'#f07060',section:'ap1',cards:[
{t:'Gross bone anatomy',d:'Diaphysis (shaft — compact bone, yellow marrow). Epiphyses (ends — spongy bone). Metaphysis (growth plate). Periosteum (outer CT — Sharpey’s fibers). Endosteum (inner lining). Articular cartilage on joint surfaces.',m:'"DEMP: Diaphysis, Epiphysis, Metaphysis, Periosteum."'},
{t:'Compact bone (osteon)',d:'Dense outer layer. Osteons = concentric lamellae around central canal (BVs + nerves). Osteocytes in lacunae connected by canaliculi. Circumferential + interstitial lamellae.',m:'"Osteon = bull’s-eye. Central canal in center."'},
{t:'Spongy bone',d:'Trabeculae aligned along stress. Red marrow → hematopoiesis. Lighter, absorbs compression. Epiphyses, vertebral bodies, sternum, iliac crests.',m:'"Spongy = trabeculae sponge. Red marrow for blood cells."'},
{t:'Bone matrix',d:'35% organic (osteoid = collagen → flexibility). 65% inorganic (hydroxyapatite → hardness). Remove mineral → rubbery. Remove organic → brittle.',m:'"Organic = flex. Mineral = hard. Both = bone."'},
{t:'Osteoblasts',d:'Bone-forming cells. Secrete osteoid. Mineralize with Ca²⁺ + PO₄³⁻. Once surrounded by matrix → become osteocytes.',m:'"osteoBLAST = BLASTs bone into existence."'},
{t:'Osteoclasts',d:'Bone-resorbing. Multinucleated. Ruffled border: HCl (dissolves mineral) + enzymes (digest collagen). PTH ↑resorption; calcitonin ↓resorption.',m:'"osteoCLAST = CLAShes and destroys bone."'},
{t:'Bone remodeling',d:'Continuous: osteoclasts resorb → osteoblasts refill. Driven by Wolff’s law (stress), hormones (PTH, estrogen), vitamins (D, C). Bone replaced ~every 10 years.',m:'"Remodel = tear down, rebuild stronger."'},
{t:'Ossification',d:'Intramembranous: flat bones (skull, clavicle) — CT ossifies directly. Endochondral: most bones — hyaline cartilage template replaced. Epiphyseal plate = growth zone (closes 18–25 years).',m:'"Intra = in membrane. Endo = from cartilage."'},
{t:'Calcium homeostasis',d:'↓Ca²⁺ → PTH → ↑osteoclasts + ↑kidney Ca²⁺ reabsorption + ↑vitamin D → ↑intestinal absorption. ↑Ca²⁺ → calcitonin → ↑osteoblasts + ↓reabsorption.',m:'"PTH = raise Ca²⁺. Calcitonin = calm Ca²⁺."'},
{t:'Fibrous joints',d:'No cavity. Dense CT. Sutures (skull — immovable). Syndesmoses (interosseous membrane — slightly movable). Gomphoses (teeth in sockets).',m:'"Fibrous = fixed. Skull sutures forever."'},
{t:'Cartilaginous joints',d:'No cavity. Synchondroses (hyaline cartilage — epiphyseal plates). Symphyses (fibrocartilage — pubic symphysis, intervertebral discs — slightly movable).',m:'"Cartilaginous = barely turns."'},
{t:'Synovial joints',d:'Joint cavity with synovial fluid. Hyaline articular cartilage. Fibrous capsule + synovial membrane. Reinforced by ligaments.',m:'"Synovial = Slippery, freely movable."'},
{t:'Synovial joint types',d:'Hinge (elbow, knee). Pivot (atlas-axis). Ball & socket (shoulder, hip). Saddle (thumb CMC). Gliding (intercarpal). Condyloid (knuckles).',m:'"His Ball Pivots Smoothly, Giving Confidence."'},
{t:'Joint movements',d:'Flexion/extension. Abduction/adduction. Rotation. Circumduction. Dorsiflexion/plantarflexion. Inversion/eversion. Pronation/supination.',m:'"Flex = decrease angle. Abduct = away from midline."'},
{t:'Axial skeleton (80 bones)',d:'Skull (22): cranium 8 + facial 14. Vertebral column (26): C7, T12, L5, sacrum, coccyx. Thoracic cage (25): sternum + 12 pairs ribs (7 true, 3 false, 2 floating).',m:'"AXIAL = AXis. Skull + Spine + Ribs."'},
{t:'Appendicular skeleton (126 bones)',d:'Pectoral girdle (clavicle + scapula ×2). Upper limb: humerus, radius, ulna, 8 carpals, 5 metacarpals, 14 phalanges ×2. Pelvic girdle (2 hip bones). Lower limb: femur, patella, tibia, fibula, 7 tarsals, 5 metatarsals, 14 phalanges ×2.',m:'"APPENDicular = APPENDages."'},
{t:'Vertebral column regions',d:'Cervical (7): C1 atlas (nodding), C2 axis (rotation). Thoracic (12): ribs attached, kyphosis. Lumbar (5): massive bodies, lordosis. Sacrum (5 fused). Coccyx (3–4 fused).',m:'"Breakfast 7am, Lunch 12pm, Dinner 5pm = C7, T12, L5."'}
]},
{id:'ap1-muscular',label:'Ch. 10-11: Muscular System',icon:'💪',color:'#f472b6',section:'ap1',cards:[
{t:'Connective tissue wrappings',d:'Endomysium (each fiber). Perimysium (fascicle = bundle). Epimysium (whole muscle). All merge → tendon (to bone) or aponeurosis (broad flat tendon).',m:'"EPP outside in: Epimysium, Perimysium, Endomysium."'},
{t:'Sarcomere',d:'Functional unit: Z-line to Z-line. Thick filaments (myosin — A band). Thin filaments (actin + troponin + tropomyosin — I band, extend into A band). M line centers thick filaments.',m:'"Z-Z-Z = one sarcomere engine unit."'},
{t:'A band',d:'Full length of thick (myosin) filaments. DARK. Does not shorten. Contains H zone (myosin only, no actin) + M line.',m:'"A band is Always the same length."'},
{t:'I band',d:'Only thin (actin) filaments. LIGHT. SHORTENS during contraction. Bisected by Z-line.',m:'"I band Is lighter and It shortens."'},
{t:'H zone',d:'Center of A band — myosin only, no actin overlap. Disappears during maximal contraction.',m:'"H zone Hides when muscle contracts."'},
{t:'Thin filament proteins',d:'F-actin: two twisted strands with active sites. Tropomyosin: blocks active sites at rest. Troponin TnC: binds Ca²⁺ → conformational change → tropomyosin shifts → active sites exposed.',m:'"Troponin-tropomyosin = bouncer duo. Ca²⁺ = VIP card."'},
{t:'Cross-bridge cycle',d:'Ca²⁺ binds TnC → active sites exposed. Energized myosin (ADP+Pi) binds actin. Power stroke: myosin pivots, pulls actin toward M-line. ATP binds → detaches. Hydrolysis re-energizes. Repeats while Ca²⁺ present.',m:'"Ca opens door, myosin walks in, ATP shows it out."'},
{t:'Neuromuscular junction (NMJ)',d:'AP in motor neuron → Ca²⁺ in terminal → ACh released → nicotinic receptors on motor end plate → end plate potential → AP in sarcolemma. ACh degraded by acetylcholinesterase.',m:'"ACh = Action triggers Contraction."'},
{t:'Excitation-contraction coupling',d:'Sarcolemma AP → T-tubules → SR → Ca²⁺ released → binds TnC → contraction. Relaxation: SERCA pumps Ca²⁺ back into SR → tropomyosin re-covers actin.',m:'"AP → T-tubule → SR → Ca²⁺ → contract."'},
{t:'Motor unit',d:'One α motor neuron + ALL fibers it innervates. Small MU (eye) = precision. Large MU (gastrocnemius) = power. All-or-none within the unit.',m:'"Motor unit = one boss, all its workers."'},
{t:'Summation & recruitment',d:'Wave summation: APs before relaxation → increased force → tetanus. Motor unit recruitment: more MUs activated → greater force. Both mechanisms grade muscle force.',m:'"More APs = summation. More units = recruitment."'},
{t:'Isotonic vs isometric',d:'Isotonic: muscle changes length. Concentric = shortens (lifting). Eccentric = lengthens under load (lowering). Isometric: muscle contracts, no length change (holding).',m:'"Isotonic = movement. Isometric = immovable."'},
{t:'ATP sources for muscle',d:'1. Creatine phosphate: immediate, ~10 sec. 2. Anaerobic glycolysis: glucose → 2 ATP + lactate, ~2 min, no O₂. 3. Aerobic respiration: glucose + O₂ → 36–38 ATP, sustained.',m:'"CP → Glycolysis → Aerobic: sprint → 400m → marathon."'},
{t:'Muscle fiber types',d:'Type I (slow oxidative): red, fatigue-resistant, aerobic — posture (soleus). Type IIa (fast oxidative-glycolytic): moderate fatigue, mixed. Type IIx (fast glycolytic): white, rapid fatigue, anaerobic, high force — power/sprinting.',m:'"I = endurance. IIa = middle. IIx = explosive."'},
{t:'Oxygen debt (EPOC)',d:'After intense exercise: replenish CP, convert lactate, restore O₂ on myoglobin/Hb. "Burn" = H⁺ accumulation (not lactate).',m:'"O₂ debt = paying back the anaerobic loan."'},
{t:'Muscle naming conventions',d:'Named by: location (brachialis), action (extensor/flexor), shape (deltoid = triangle), size (maximus/minimus/longus/brevis), orientation (rectus = parallel, oblique = diagonal), heads (biceps, triceps), attachment (sternocleidomastoid).',m:'"LASSO-HA: Location, Action, Shape, Size, Orientation, Heads, Attachment."'},
{t:'Muscle action roles',d:'Prime mover (agonist): produces action. Antagonist: opposes (must relax). Synergist: assists + stabilizes. Fixator: immobilizes origin. Bicep curl: biceps = PM, triceps = antagonist.',m:'"PASF: Prime, Antagonist, Synergist, Fixator."'},
{t:'Key upper limb muscles',d:'Deltoid (abduction). Biceps brachii (flexion + supination). Triceps brachii (extension). Rotator cuff SITS: Supraspinatus, Infraspinatus, Teres minor, Subscapularis.',m:'"SITS = rotator cuff. SIT on the shoulder."'},
{t:'Key lower limb muscles',d:'Iliopsoas (hip flexion). Gluteus maximus (hip extension). Hamstrings (BFL: Biceps femoris, Semimembranosus, Semitendinosus — knee flexion). Quadriceps (knee extension). Gastrocnemius + soleus → plantarflexion.',m:'"Hams flex knee. Quads extend knee."'}
]},
{id:'ap1-nervous',label:'Ch. 12-16: Nervous System',icon:'🧠',color:'#4ecdc4',section:'ap1',cards:[
{t:'Neuron anatomy',d:'Dendrites (receive → toward soma). Soma (nucleus, Nissl bodies/RER). Axon hillock (AP initiation). Axon (propagates AP). Axon terminals (release NT). Anterograde transport (kinesin, → terminal). Retrograde (dynein, ← soma).',m:'"DAD: Dendrites Absorb, Axon Delivers."'},
{t:'Neuron classification',d:'Structural: multipolar (most CNS), bipolar (retina), pseudounipolar (sensory DRG). Functional: sensory/afferent (toward CNS), motor/efferent (away CNS), interneurons (99% — within CNS).',m:'"Afferent = Arrives at CNS. Efferent = Exits CNS."'},
{t:'Resting membrane potential',d:'−70 mV (inside negative). K⁺ leak channels (K⁺ diffuses out = main driver). Na⁺/K⁺ ATPase (3 Na⁺ out : 2 K⁺ in, electrogenic). High K⁺ inside, high Na⁺ outside.',m:'"−70 mV. 3 Na out, 2 K in (3-2 basketball)."'},
{t:'Action potential',d:'Threshold (−55 mV) → Na⁺ channels open → Na⁺ in → depolarization (+30 mV). Na⁺ inactivate + K⁺ channels open → K⁺ out → repolarization → hyperpolarization → return to −70. All-or-none.',m:'"Na in depolarizes. K out repolarizes."'},
{t:'Saltatory conduction',d:'Myelinated axons: AP jumps node to node (Ranvier). 10–100× faster (120 m/s vs 0.5). Energy efficient. MS = demyelination → slowed/blocked.',m:'"Saltatory = JUMPS like a frog node to node."'},
{t:'Synapse & neurotransmitters',d:'AP → Ca²⁺ in terminal → NT released → binds receptor → EPSP (depolarize) or IPSP (hyperpolarize). ACh (NMJ, PNS), glutamate (main CNS excitatory), GABA (main CNS inhibitory), dopamine, serotonin, NE.',m:'"Glu = go! GABA = stop. ACh = NMJ/PNS."'},
{t:'Spinal cord organization',d:'Gray matter: dorsal horn (sensory), ventral horn (motor — α motor neurons), lateral horn (T1–L2: sympathetic). White matter: ascending (sensory) + descending (motor) tracts. 31 spinal nerve pairs.',m:'"Dorsal = data in (sensory). Ventral = voluntary out (motor)."'},
{t:'Spinal reflexes',d:'Arc: receptor → afferent → spinal cord (integration) → efferent → effector. Monosynaptic: patellar stretch reflex. Polysynaptic: withdrawal (flexor) reflex.',m:'"RAIFE: Receptor, Afferent, Integration, Efferent, Effector."'},
{t:'Meninges & CSF',d:'Dura mater (tough outer). Arachnoid (subarachnoid space = CSF). Pia mater (adheres to brain). CSF: choroid plexus → subarachnoid space → arachnoid villi. Cushions + nourishes brain.',m:'"DAP: Dura, Arachnoid, Pia. CSF = brain’s water cushion."'},
{t:'Cerebral cortex lobes',d:'Frontal: primary motor (precentral gyrus), Broca’s (speech production), prefrontal (executive function). Parietal: somatosensory (postcentral gyrus), spatial. Temporal: auditory, hippocampus. Occipital: visual.',m:'"Front does, Parietal feels, Temporal hears, Occipital sees."'},
{t:'Diencephalon',d:'Thalamus: relay for ALL sensory (except smell) → cortex. Hypothalamus: homeostasis HQ — temp, hunger, thirst, circadian, ANS, pituitary. Pineal gland (melatonin).',m:'"Thalamus = Tollbooth. Hypothalamus = Homeostasis HQ."'},
{t:'Brain stem',d:'Midbrain: superior/inferior colliculi (reflexes), substantia nigra (dopamine — Parkinson’s). Pons: sleep, respiration. Medulla oblongata: vital centers (cardiac, vasomotor, respiratory), vomiting/swallowing.',m:'"Medulla = mandatory for life."'},
{t:'Limbic system',d:'Emotional brain. Amygdala (fear, emotional memory). Hippocampus (short→long-term memory). Cingulate gyrus. Dysfunction → PTSD, anxiety, amnesia.',m:'"AHCH: Amygdala, Hippocampus, Cingulate, Hypothalamus."'},
{t:'Cerebellum',d:'Posterior brain. Receives motor commands from cortex + proprioceptive feedback. Coordinates voluntary movement, balance, muscle tone. Damage → ataxia.',m:'"Cerebellum = body’s GPS + autocorrect for movement."'},
{t:'Somatic vs autonomic NS',d:'Somatic: voluntary, single efferent neuron, ACh at skeletal muscle. Autonomic: involuntary, two-neuron chain (pre + postganglionic), smooth/cardiac muscle + glands.',m:'"Somatic = skeletal, voluntary. Autonomic = visceral, involuntary."'},
{t:'Sympathetic NS',d:'Thoracolumbar (T1–L2). Short preganglionic → paravertebral ganglia. NE at most targets (α, β receptors). ACh at adrenal medulla → epi. ↑HR, ↑BP, dilates pupils/bronchi, ↓digestion.',m:'"Fight or Flight: Heart pumping, pupils wide."'},
{t:'Parasympathetic NS',d:'Craniosacral (CN III, VII, IX, X + S2–S4). Long preganglionic → terminal ganglia. ACh everywhere (muscarinic receptors). ↓HR, ↑digestion (SLUDD), constricts pupils, bronchoconstriction.',m:'"SLUDD: Salivation, Lacrimation, Urination, Defecation, Digestion."'},
{t:'Cranial nerves (I–XII)',d:'I Olfactory, II Optic, III Oculomotor (+para: pupil), IV Trochlear (SO4), V Trigeminal (face + mastication), VI Abducens (LR6), VII Facial (expression + taste ant 2/3), VIII Vestibulocochlear, IX Glossopharyngeal (taste post 1/3), X Vagus (para: thorax/abdomen), XI Accessory (SCM + trapezius), XII Hypoglossal (tongue).',m:'"Oh Oh Oh To Touch And Feel Very Good Velvet Ah."'},
{t:'Sensory receptors',d:'Meissner’s corpuscles (light touch). Pacinian corpuscles (deep pressure/vibration). Merkel’s discs (sustained pressure). Ruffini endings (skin stretch). Muscle spindles (stretch). Golgi tendon organs (tension). Nociceptors (pain). Thermoreceptors.',m:'"Meissner’s = light, Pacinian = deep, Merkel = sustained, Ruffini = stretch."'}
]},
{id:'ap1-homeostasis',label:'Ch. 1: Anatomy & Physiology Intro',icon:'⚖️',color:'#7c9ef8',section:'ap1',cards:[
{t:'Homeostasis definition',d:'Maintenance of a relatively stable internal environment despite external changes. Regulated variables: core temp (37°C), blood glucose (70–110 mg/dL), blood pH (7.35–7.45), osmolarity (280–300 mOsm), blood pressure.',m:'"Homeostasis = Home is stable."'},
{t:'Negative feedback',d:'Response opposes stimulus → returns variable to set point. Most homeostatic mechanisms. Examples: temp (hot → sweat + vasodilate), blood glucose (↑glucose → insulin), BP (↑BP → ↓HR).',m:'"Negative = goes back the other way. Like a thermostat."'},
{t:'Positive feedback',d:'Response amplifies stimulus → drives further from set point until interrupted. Examples: childbirth (oxytocin → more contractions), platelet plug, LH surge → ovulation, coagulation cascade.',m:'"Positive = pushes further. Cascades to completion, then STOPS."'},
{t:'Control system components',d:'1. Receptor/sensor: detects change (carotid body, hypothalamic thermoreceptors). 2. Control center: integrates + responds (hypothalamus, medulla). 3. Effector: executes response (sweat glands, BVs, heart).',m:'"RCE: Receptor, Control center, Effector. RaCE to homeostasis."'},
{t:'Thermoregulation',d:'Set point: 37°C. Too hot: cutaneous vasodilation + sweating (evaporative cooling). Too cold: vasoconstriction + shivering (muscle heat) + piloerection. Hypothalamus = thermostat.',m:'"Hot = vasodilate + sweat. Cold = vasoconstrict + shiver."'},
{t:'Blood glucose regulation',d:'↑glucose → β cells → insulin → ↑GLUT4 (muscle/fat), ↑glycogen synthesis, ↓gluconeogenesis. ↓glucose → α cells → glucagon → ↑glycogenolysis + ↑gluconeogenesis (liver).',m:'"Insulin = deposit. Glucagon = withdraw."'},
{t:'Blood pressure regulation',d:'Short-term: baroreceptors (carotid sinus, aortic arch) → medulla → ±HR + vasomotor tone. Long-term: RAAS (renin→angiotensin→aldosterone → Na⁺/H₂O retention). ADH → ↑water reabsorption.',m:'"Baroreceptors = fast. RAAS + ADH = slow but lasting."'},
{t:'Acid-base balance',d:'Normal pH 7.35–7.45. Buffers (immediate): bicarbonate (HCO₃⁻/H₂CO₃), phosphate, proteins. Respiratory (minutes): ↑ventilation → ↓CO₂ → ↑pH. Renal (days): ↑/↓ H⁺ secretion + HCO₃⁻ reabsorption.',m:'"3 defenses: Buffers (instant), Lungs (minutes), Kidneys (days)."'},
{t:'Fluid compartments',d:'Total body water ~60% body weight. ICF (40%): K⁺ dominant inside. ECF (20%): plasma (3%) + interstitial (17%), Na⁺ dominant. Osmolarity drives water between compartments.',m:'"ICF = K⁺ inside. ECF = Na⁺ outside sea."'},
{t:'Disease as homeostasis failure',d:'Hypertension = chronic BP failure. Diabetes Type 1 (no insulin) / Type 2 (insulin resistance). Fever = temp set point raised by pyrogens. Acidosis/alkalosis = pH failure.',m:'"Disease = homeostasis that failed to compensate."'},
{t:'Circadian rhythms',d:'~24-hour physiological cycles. Suprachiasmatic nucleus (SCN) in hypothalamus = master clock. Light → retinohypothalamic tract → SCN → pineal gland (melatonin at night). Affects sleep, temp, cortisol.',m:'"SCN = master clock. Melatonin = darkness signal."'}
]},
{id:'skull', label:'Skull Bones', icon:'💀', color:'#7c9ef8', cards:[
  {t:'Frontal bone',d:'Single flat bone forming forehead + roof of orbits + anterior cranial fossa floor. Contains frontal sinuses (paranasal sinuses). Ossification: intramembranous. Joins parietal at coronal suture.',m:'"Frontal = FRONT of skull." Contains frontal sinuses. Coronal suture with parietal bones.'},
  {t:'Parietal bones (×2)',d:'Paired flat bones forming superior + lateral cranial walls. Meet each other at sagittal suture. Key markings: temporal lines (temporalis attachment), parietal foramen (emissary vein).',m:'"Parietal = PARIETAL walls of skull." Sagittal suture between them. Coronal suture = parietal+frontal.'},
  {t:'Temporal bone (×2)',d:'Complex irregular bones housing entire ear apparatus. Parts: squamous (lateral wall), petrous (inner ear), mastoid (posterior), tympanic (EAM), styloid process. Major foramina: carotid canal, jugular foramen, internal acoustic meatus, stylomastoid foramen.',m:'"Temporal = at the TEMPLES." Houses ear. Mastoid process = SCM attachment. CN VII exits stylomastoid foramen.'},
  {t:'Occipital bone',d:'Posterior + inferior cranium. Contains foramen magnum (brainstem passage). Occipital condyles articulate with C1 atlas. External occipital protuberance = palpable landmark. Ossification: mostly endochondral.',m:'"Occipital = BACK of skull." Foramen magnum at base. Occipital condyles = skull sits on atlas here.'},
  {t:'Sphenoid bone',d:'Bat-shaped keystone of skull base — articulates with ALL other cranial bones. Body contains sella turcica (pituitary gland fossa). Major foramina: optic canal (CN II), SOF (CN III,IV,V1,VI), foramen rotundum (V2), foramen ovale (V3), foramen spinosum (middle meningeal artery).',m:'"Sphenoid = keystone, articulates with ALL." Sella turcica = pituitary seat. V1=SOF, V2=rotundum, V3=ovale.'},
  {t:'Ethmoid bone',d:'Delicate midline bone between orbits. Forms nasal septum (perpendicular plate), roof of nasal cavity (cribriform plate — CN I olfactory nerve passes through), medial orbital wall (orbital plate). Crista galli = falx cerebri attachment.',m:'"Ethmoid = sieve-like (cribriform = sieve)." CN I through cribriform plate. Crista galli = rooster comb.'},
  {t:'Mandible',d:'Only movable skull bone. Body + 2 rami. Condylar process forms TMJ with mandibular fossa of temporal bone. Coronoid process = temporalis insertion. Mental foramen transmits CN V3 (mental nerve). Mandibular foramen = inferior alveolar nerve. Alveolar process = tooth sockets.',m:'"Mandible = LOWER jaw, moves." Condyle = TMJ. Mental foramen = "mentum" = chin nerve.'},
  {t:'Maxillae (×2)',d:'Form upper jaw, anterior hard palate, cheeks, floor + lateral walls of nasal cavity, floor of orbit. Contain maxillary sinuses (largest paranasal sinuses). Infraorbital foramen transmits CN V2. Cleft palate = failure of palatine processes to fuse.',m:'"Maxillae = upper jaw + cheek." Contain maxillary sinuses. Cleft palate = palatine processes fail to fuse.'},
  {t:'Zygomatic bones (×2)',d:'Cheekbones. Form lateral orbit walls + zygomatic arch (with temporal zygomatic process). Articulate with frontal, temporal, maxilla, sphenoid bones. Zygomaticofacial foramen on anterior surface.',m:'"Zygomatic = CHEEKBONE." Zygomatic arch = cheekbone + temporal process. Articulates with 4 bones.'},
  {t:'Nasal bones (×2)',d:'Small paired flat bones forming bony bridge of nose. Articulate with each other (internasal suture), frontal bone, maxillae, and ethmoid. Fractured in "broken nose" injuries.',m:'"Nasal bones = bridge of nose." Two small bones. Most commonly fractured facial bones (along with mandible).'},
  {t:'Lacrimal bones (×2)',d:'Smallest facial bones. Medial wall of orbit. Contain lacrimal groove → nasolacrimal fossa → nasolacrimal duct (tears drain to nasal cavity). Posterior lacrimal crest.',m:'"Lacrimal = TEARS." Smallest facial bones. Lacrimal groove → nasolacrimal duct drains tears into nose.'},
  {t:'Palatine bones (×2)',d:'L-shaped bones. Horizontal plate = posterior 1/3 of hard palate. Perpendicular plate = lateral nasal wall. Small portion of orbit floor. Greater and lesser palatine foramina transmit palatine nerves and vessels.',m:'"Palatine = PALATE (posterior part)." L-shaped. Greater palatine foramen = palatine nerve + vessels.'},
  {t:'Inferior nasal conchae (×2)',d:'Scroll-like bones projecting medially into nasal cavity. Increase surface area for warming and humidifying air. Only facial bones that are separate bones (others are processes). Innervated by CN V2.',m:'"Inferior conchae = SCROLL bones increasing nasal surface area." Only independent facial scroll bones.'},
  {t:'Vomer',d:'Thin flat bone forming inferior + posterior nasal septum. Articulates with ethmoid perpendicular plate (superior), maxillae and palatine bones (inferior). Deviated septum often involves vomer.',m:'"Vomer = ploughshare shaped." Forms lower nasal septum. Deviated septum often at vomer-ethmoid junction.'},
  {t:'Hyoid bone',d:'U-shaped bone in anterior neck at C3 level. Only bone not articulating with another bone (suspended by muscles/ligaments). Body + greater horns + lesser horns. Supports tongue, assists swallowing and speech.',m:'"Hyoid = ONLY bone with NO joint." Suspended by muscles. Fracture in strangulation.'},
]},

// ══════════════════════════════════════════,section:'anatomy'},
{id:'vertebrae', label:'Vertebral Column', icon:'🦴', color:'#52d18a', cards:[
  {t:'Atlas (C1)',d:'Ring-shaped, no body or spinous process. Anterior arch + posterior arch + 2 lateral masses. Superior articular facets = occipital condyles (atlanto-occipital joint = "yes" nodding). Transverse foramina = vertebral artery. No disc above.',m:'"Atlas holds the world (skull)." No body. Nodding yes = atlanto-occipital joint.'},
  {t:'Axis (C2)',d:'Has dens (odontoid process) projecting superiorly from body — C1 pivots around it (atlantoaxial joint = "no" rotation). Held by transverse ligament of atlas. Bifid spinous process. Transverse foramina.',m:'"Axis = pivot for NO rotation." Dens = key feature. Transverse ligament holds dens against C1 anterior arch.'},
  {t:'C3–C6 (typical cervical)',d:'Smallest vertebral bodies. Bifid spinous processes. Transverse foramina (vertebral artery C1–C6). Large triangular vertebral foramen. Uncinate processes (lateral body = joints of Luschka). Greatest cervical ROM.',m:'"Cervical = bifid spinous processes + transverse foramina." Most mobile part of spine.'},
  {t:'C7 — Vertebra prominens',d:'Transitional cervical vertebra. NON-bifid spinous process (long, palpable landmark). May lack transverse foramen or have small one (vertebral artery at C6 level). Marks cervicothoracic junction.',m:'"C7 = vertebra prominens." First palpable spinous process from neck. Marks C-T junction.'},
  {t:'Thoracic vertebrae (T1–T12)',d:'Heart-shaped bodies increasing in size T1→T12. Long spinous processes projecting INFERIORLY (overlap like shingles — limits extension). Costal facets on body and transverse processes (T1–T10) for rib articulation. Circular vertebral foramen.',m:'"Thoracic = shingle spinous processes + costal facets." Most restricted motion (ribs + long spinous).'},
  {t:'Lumbar vertebrae (L1–L5)',d:'Largest vertebral bodies. Kidney-shaped. SHORT blunt spinous processes projecting POSTERIORLY (horizontal = can palpate gaps). No costal facets, no transverse foramina. Triangular vertebral foramen. Mammillary + accessory processes.',m:'"Lumbar = LARGEST bodies, shortest spinous." Lumbar puncture between L3-L4 or L4-L5 (conus at L1-L2).'},
  {t:'Sacrum',d:'5 fused vertebrae. Triangular. Sacral promontory (S1 anterosuperior edge = obstetric landmark). Sacral canal (continuation of vertebral canal). 4 pairs of sacral foramina (anterior + posterior). Auricular surface = SI joint. Sacral hiatus = epidural access.',m:'"Sacrum = S-shaped triangular bone." Sacral promontory = obstetric diameter. Sacral hiatus = caudal epidural.'},
  {t:'Coccyx',d:'3–4 fused coccygeal vertebrae. Vestigial tail. Coccygeal cornua articulate with sacral cornua. Attachment for: gluteus maximus, coccygeus, levator ani (pelvic floor), sacrotuberous ligament, anococcygeal ligament.',m:'"Coccyx = tailbone." Coccydynia = coccyx pain. Pelvic floor + gluteus maximus attach here.'},
  {t:'Intervertebral disc',d:'Fibrocartilaginous structure between adjacent vertebral bodies (C2/3 to L5/S1 = 23 total). Nucleus pulposus (gel core, remnant notochord) + annulus fibrosus (concentric fibrocartilage rings). C/L: greater thickness = more movement.',m:'"IVD = shock absorber." Nucleus = gel center. Herniation = nucleus ruptures annulus → nerve root compression.'},
]},

// ══════════════════════════════════════════
// GROUP 3: THORACIC CAGE
// ══════════════════════════════════════════,section:'anatomy'},
{id:'thorax-bones', label:'Thoracic Cage', icon:'🫀', color:'#f5c842', cards:[
  {t:'Sternum',d:'Flat bone: manubrium + body + xiphoid process. Manubrium: clavicular notches (SCJ), rib 1 articulation. Sternal angle (angle of Louis) = manubrium-body junction = T4/T5 level = rib 2 landmark. Xiphoid: diaphragm + rectus abdominis attachment. Ossifies ~40yrs.',m:'"Sternal angle of Louis = rib 2 + T4/T5." Manubrium=clavicle+rib1. Xiphoid=diaphragm attachment.'},
  {t:'Ribs 1–7 (true ribs)',d:'Connect directly to sternum via own costal cartilage. Rib 1: flat, short, articulates with manubrium. Ribs 2–7: typical structure. Each: head (2 articular facets), neck, tubercle, angle, shaft. Costal groove (inferior surface) houses VAN = Vein, Artery, Nerve.',m:'"True ribs 1–7 = own cartilage to sternum." VAN under each rib: Vein, Artery, Nerve (superior to inferior).'},
  {t:'Ribs 8–10 (false ribs)',d:'Costal cartilage joins rib 7 cartilage (not sternum directly). Form costal margin (clinically important palpable landmark). Liver palpable below right costal margin, spleen below left.',m:'"False ribs 8–10 = join rib 7 cartilage." Form costal margin. Liver = right; spleen = left.'},
  {t:'Ribs 11–12 (floating ribs)',d:'No anterior attachment (free ends in musculature). Only single articular facet on head (articulate with one vertebral body only). Short and rudimentary. Posterior kidney lies deep to rib 12.',m:'"Floating ribs 11–12 = free ends." Only 1 costal facet. Kidney sits behind rib 12.'},
]},

// ══════════════════════════════════════════
// GROUP 4: PECTORAL GIRDLE + UPPER LIMB
// ══════════════════════════════════════════,section:'anatomy'},
{id:'upper-bones', label:'Upper Limb Bones', icon:'💪', color:'#b084f5', cards:[
  {t:'Clavicle',d:'S-shaped long bone. ONLY bony connection upper limb to axial skeleton. Sternal end (SCJ), acromial end (ACJ). First bone to ossify (week 5 fetal), last to fully ossify (25 yrs). Ossification: intramembranous (unique for long bone). Most commonly fractured bone overall (middle third).',m:'"Clavicle = ONLY bony UL-axial connection." First to ossify, last to mature. Most fractured = middle third.'},
  {t:'Scapula',d:'Triangular flat bone T2–T7 posterior thorax. Glenoid cavity (shoulder socket — faces anterolaterally). Coracoid process (biceps short head, coracobrachialis, pec minor). Acromion = highest point. Spine divides posterior surface: supraspinous fossa (supraspinatus) + infraspinous fossa (infraspinatus). Subscapular fossa (subscapularis). Suprascapular notch = suprascapular nerve.',m:'"Scapula = wing bone." Coracoid = hook-shaped. Suprascapular notch = "nerve goes under bridge (ligament), artery goes over."'},
  {t:'Humerus',d:'Longest upper limb bone. Head (faces medially + superiorly). Anatomical neck = growth plate. Surgical neck (most common fracture site = axillary nerve + anterior circumflex humeral artery). Greater tubercle (SS, IS, TMin). Lesser tubercle (subscapularis). Radial/spiral groove = radial nerve. Medial epicondyle — ulnar nerve runs posterior to it.',m:'"Surgical neck = axillary nerve danger." Radial groove = radial nerve + deep brachial artery danger.'},
  {t:'Radius',d:'Lateral forearm bone. Proximal: head (articulates with capitulum + radial notch of ulna), radial tuberosity (biceps insertion). Distal: wider end, styloid process (longer than ulna), ulnar notch. Rotates around ulna in pronation/supination. FOOSH fracture = Colles\u2019 fracture (distal radius).',m:'"Radius rotates." Colles\u2019 fracture = FOOSH distal radius. Radial styloid longer than ulnar.'},
  {t:'Ulna',d:'Medial forearm bone. Proximal: olecranon (triceps insertion), coronoid process (brachialis), trochlear notch (hinge with trochlea). Radial notch (proximal RUJ). Distal: head + ulnar styloid. Primary elbow stabilizer.',m:'"Ulna = U shape at elbow." Olecranon = elbow point. Trochlear notch = hinge of elbow.'},
  {t:'Scaphoid',d:'Most common fractured carpal bone (FOOSH injury). Blood supply enters distally → proximal pole at risk for AVN after fracture. Anatomical snuffbox tenderness = scaphoid fracture until proven otherwise. Articulates with radius at radiocarpal joint.',m:'"Scaphoid = most fractured carpal." Snuffbox tenderness = scaphoid fracture. AVN risk = proximal pole.'},
  {t:'Lunate',d:'Most commonly DISLOCATED carpal bone. Pushed anteriorly (volar). Lunate dislocation can compress median nerve → acute carpal tunnel syndrome. Articulates with radius + scaphoid + triquetrum.',m:'"Lunate = most dislocated." Anterior dislocation compresses median nerve. Crescent/moon shaped.'},
  {t:'Triquetrum',d:'3rd carpal in proximal row. Pyramidal shape. Only articulates with pisiform on palmar surface. Triquetral fractures from ulnar-sided wrist impact.',m:'"Triquetrum = tricky 3-sided bone." Pisiform sits on top of it.'},
  {t:'Pisiform',d:'Sesamoid bone within FCU tendon. Smallest carpal. Palmar surface of triquetrum. Pisohamate + pisometacarpal ligaments extend from it. Ulnar nerve and artery pass through Guyon\u2019s canal (between pisiform and hook of hamate).',m:'"Pisiform = pea-shaped sesamoid in FCU." Forms medial wall of Guyon\u2019s canal.'},
  {t:'Trapezium',d:'Distal row, lateral. Saddle-shaped articulation with 1st metacarpal (CMC joint = saddle joint — only example). Flexor carpi radialis tendon groove on palmar surface. Forms lateral wall of carpal tunnel.',m:'"TrapEZIUM = THUMB CMC joint (saddle joint)." Only true saddle joint in body.'},
  {t:'Trapezoid',d:'Smallest distal carpal bone. Wedge-shaped. Articulates with 2nd metacarpal. Rarely fractured due to protected position.',m:'"Trapezoid = 4-sided = 2nd metacarpal." Least commonly dislocated carpal.'},
  {t:'Capitate',d:'Largest carpal bone. Keystone of distal row. Articulates with 3rd metacarpal primarily. Head fits into cup formed by scaphoid + lunate. First to ossify among carpals (~1 yr).',m:'"Capitate = LARGEST carpal, keystone." Head, neck, body. First carpal to ossify.'},
  {t:'Hamate',d:'Hook of hamate on palmar surface — forms lateral wall of Guyon\u2019s canal (ulnar nerve + artery). Articulates with 4th and 5th metacarpals. Hook fracture from golf/baseball swing.',m:'"Hamate = HOOK." Hook fractures in racquet sports. Forms lateral border Guyon\u2019s canal.'},
  {t:'Metacarpals 1–5',d:'5 miniature long bones. Base (proximal, carpometacarpal joints), shaft, head (distal = knuckle, metacarpophalangeal joints). MC1 (thumb): shortest, most mobile, saddle joint. MC3: styloid process. MC5 neck fracture = "boxer\u2019s fracture" (most common MC fracture).',m:'"MC5 neck = boxer\u2019s fracture." MC1 = saddle joint. MC heads = knuckles.'},
  {t:'Phalanges of hand',d:'Thumb (digit 1): 2 phalanges — proximal + distal. Fingers 2–5: 3 each — proximal, middle, distal. Mallet finger = distal phalanx avulsion (extensor tendon). Boutonnière = middle phalanx (central slip). Jersey finger = distal phalanx avulsion (FDP).',m:'"Thumb has 2, fingers have 3." Mallet = DIP droop. Jersey = DIP can\u2019t flex. Boutonnière = PIP flexed.'},
  {t:'Sesamoid bones of hand',d:'2 sesamoid bones at 1st MCP joint (thumb) — embedded in flexor pollicis brevis tendon. Protect FPL tendon. Can be fractured in hyperextension injuries. Variable sesamoids at other MCPs.',m:'"2 sesamoids at thumb MCP." Protect FPL tendon. Fracture in hyperextension of thumb.'},
]},

// ══════════════════════════════════════════
// GROUP 5: PELVIC GIRDLE + LOWER LIMB
// ══════════════════════════════════════════,section:'anatomy'},
{id:'lower-bones', label:'Lower Limb Bones', icon:'🦵', color:'#f07060', cards:[
  {t:'Hip bone (Os coxa)',d:'Formed by fusion of 3 bones at acetabulum (~23 yrs): Ilium (superior 2/5 of acetabulum), Ischium (posteroinferior 2/5), Pubis (anteroinferior 1/5). With sacrum + coccyx = bony pelvis. Triradiate cartilage = fusion site in children (closes ~16 yrs).',m:'"Os coxa = ilium + ischium + pubis fused at acetabulum." Triradiate cartilage closes by 16.'},
  {t:'Ilium',d:'Largest part of hip bone. Iliac crest (ASIS + PSIS at its ends) — L4 level for lumbar puncture landmark. Iliac fossa (iliacus muscle). Anterior gluteal line, posterior gluteal line, inferior gluteal line divide gluteal surface for gluteal muscle attachments. Arcuate line = pelvic brim.',m:'"Iliac crest = L4 level." ASIS = sartorius + TFL origin. AIIS = rectus femoris origin.'},
  {t:'Ischium',d:'Posteroinferior hip bone. Ischial tuberosity = "sitting bone" (hamstrings origin, sacrotuberous ligament). Ischial spine = sacrospinous ligament attachment, divides greater + lesser sciatic notches. Lesser sciatic notch transmits obturator internus tendon. Ischial ramus = inferior pubic ramus.',m:'"Ischium = sitting bone." Ischial tuberosity = hamstrings. Ischial spine = sacrospinous lig divides notches.'},
  {t:'Pubis',d:'Anteroinferior hip bone. Body + superior + inferior rami. Pubic tubercle = inguinal ligament attachment (medial end). Pubic symphysis (fibrocartilage joint between 2 pubic bodies). Pectineal line (iliopectineal line continues to form pelvic brim). Obturator foramen (largest foramen in skeleton).',m:'"Pubic tubercle = medial attachment inguinal ligament." Obturator foramen = largest in body.'},
  {t:'Acetabulum',d:'Cup-shaped socket for femoral head. Formed by all 3 hip bones. Lunate surface = articular (horseshoe-shaped, covered in hyaline cartilage). Acetabular fossa = central non-articular depression (fat pad + ligamentum teres). Acetabular notch transmits ligamentum teres (carries obturator artery to femoral head in children).',m:'"Acetabulum = hip socket." Lunate surface = articular. Acetabular notch = ligamentum teres + blood supply.'},
  {t:'Femur',d:'Longest, heaviest, strongest bone. Neck-shaft angle ~126° (coxa valga >135°, vara <120°). Blood to femoral head: medial femoral circumflex artery (retinacular branches). Linea aspera (posterior ridge) = major muscle attachment. Lesser trochanter = iliopsoas. Greater trochanter = abductors + short external rotators.',m:'"Linea aspera = highway for muscle attachments." Neck fracture = medial circumflex artery danger = AVN.'},
  {t:'Patella',d:'Largest sesamoid bone. Embedded in quadriceps tendon. Increases mechanical advantage of quads by ~30%. Ossifies 3–6 years. Bipartite patella (unfused accessory ossification center, usually superolateral — don\u2019t mistake for fracture). Lateral retinaculum often tight in patellar maltracking.',m:'"Patella = largest sesamoid." Ossifies 3–6 yrs. Bipartite = normal variant (superolateral).'},
  {t:'Tibia',d:'Medial, weight-bearing leg bone. Tibial plateau (medial + lateral condyles, separated by intercondylar eminence). Tibial tuberosity (patellar ligament). Anterior crest (subcutaneous = no overlying muscle). Gerdy\u2019s tubercle (IT band). Medial malleolus (medial ankle). Fibular notch (distal tibiofibular joint). Soleal line (posterior).',m:'"Tibia = shin bone, weight-bearing." Gerdy\u2019s tubercle = IT band. Medial malleolus = medial ankle.'},
  {t:'Fibula',d:'Lateral non-weight-bearing leg bone (<10% body weight). Extensive muscle attachment. Head (biceps femoris, fibular collateral ligament). Fibular neck = common fibular nerve wraps around here (high-risk fracture site). Lateral malleolus extends MORE inferiorly than medial malleolus = critical for ankle stability.',m:'"Fibular neck = common peroneal nerve." Lateral malleolus lower than medial = ankle stability.'},
  {t:'Talus',d:'Only tarsal with no muscle attachments. Transmits entire body weight from tibia to foot. Trochlea = articulates with ankle mortise (tibia + both malleoli). Head = talonavicular joint. Neck = common site of fracture (AVN risk). 60% covered by articular cartilage.',m:'"Talus = NO muscle attachments." Body weight relay bone. Talar neck fracture = AVN risk.'},
  {t:'Calcaneus',d:'Largest tarsal bone. Forms heel. Calcaneal tuberosity (Achilles tendon, plantar fascia). Sustentaculum tali (FHL tendon groove, spring ligament). Peroneal trochlea. Articulates with talus (subtalar joint) + cuboid. "Lover\u2019s fracture" = bilateral calcaneal fractures from fall.',m:'"Calcaneus = HEEL bone." Sustentaculum tali = FHL groove + spring ligament. Lover\u2019s fracture = bilateral.'},
  {t:'Navicular',d:'Tarsal on medial side. "Navicular" = boat-shaped. Navicular tuberosity = tibialis posterior primary insertion (palpable medial foot landmark). Articulates with talus posteriorly + 3 cuneiforms anteriorly. Accessory navicular (os tibiale externum) in 10% of population.',m:'"Navicular = boat-shaped, medial." Tuberosity = tibialis posterior. Accessory navicular = common variant.'},
  {t:'Cuboid',d:'Lateral tarsal. Articulates with calcaneus, lateral cuneiform, bases of 4th + 5th metatarsals. Peroneal groove (plantar surface) = fibularis longus tendon passes through here with sesamoid. Cuboid syndrome = subluxation causing lateral foot pain.',m:'"Cuboid = cube-shaped, lateral." Peroneal groove on plantar surface for fibularis longus.'},
  {t:'Cuneiforms (×3)',d:'Medial, intermediate (smallest), lateral cuneiforms. Medial articulates with MT1, intermediate with MT2, lateral with MT3. Key to transverse arch of foot. Lisfranc injury = disruption of 2nd TMT joint (key joint of Lisfranc complex).',m:'"3 cuneiforms = MT1, MT2, MT3." Intermediate = smallest. Lisfranc = 2nd TMT joint key.'},
  {t:'Metatarsals 1–5',d:'MT1: shortest, widest, strongest. 2 sesamoids under MT1 head (in FHB tendons). MT2 base = keystone of transverse arch (Lisfranc joint). MT5 tuberosity = fibularis brevis insertion (Jones fracture at metaphysis vs avulsion at tuberosity). Stress fractures common in MT2/MT3.',m:'"MT5 tuberosity = fibularis brevis." Jones fracture = MT5 metaphysis (poor healing). MT1 = strongest.'},
  {t:'Phalanges of foot',d:'Hallux (big toe): 2 phalanges (proximal + distal). Toes 2–5: 3 each. Less mobile than hand. Hallux valgus = lateral deviation of great toe at MTP joint. Hammertoe = PIP flexion contracture. Claw toe = MTP hyperextension + PIP/DIP flexion.',m:'"Hallux has 2, others have 3." Hallux valgus = bunion. Hammertoe = PIP flexed.'},
]},

// ══════════════════════════════════════════
// GROUP 6: HEAD & NECK MUSCLES
// ══════════════════════════════════════════,section:'anatomy'},
{id:'muscles-head-neck', label:'Head & Neck Muscles', icon:'🦷', color:'#7c9ef8', cards:[
  {t:'Temporalis',d:'Origin: temporal fossa. Insertion: coronoid process + anterior ramus of mandible. Action: elevation (closing jaw) + retraction of mandible. Nerve: deep temporal branches of CN V3 (mandibular). Fan-shaped muscle beneath temporal fascia.',m:'"Temporalis = close jaw + retract." Temporal fossa origin. CN V3. Fan-shaped.'},
  {t:'Masseter',d:'Origin: zygomatic arch (superficial) + deep surface zygomatic arch (deep). Insertion: lateral surface of mandible (angle + ramus). Action: elevation of mandible (MOST POWERFUL jaw closer). Nerve: masseteric branch CN V3.',m:'"Masseter = MOST POWERFUL jaw closer." Bruxism (teeth grinding) hypertrophies masseter.'},
  {t:'Medial pterygoid',d:'Origin: medial surface lateral pterygoid plate + pyramidal process of palatine bone. Insertion: medial surface of mandible (angle). Action: elevation + protrusion of mandible + contralateral (grinding) movement. Nerve: medial pterygoid nerve CN V3.',m:'"Medial pterygoid = medial side, elevation + grinding." With masseter forms "sling" around mandible.'},
  {t:'Lateral pterygoid',d:'2 heads. Superior head: infratemporal crest. Inferior head: lateral surface of lateral pterygoid plate. Insertion: neck of mandible (condyle) + TMJ disc. Action: protrusion + depression of mandible. Nerve: lateral pterygoid nerve CN V3.',m:'"Lateral pterygoid = ONLY muscle opening jaw + protrusion." Superior head stabilizes TMJ disc.'},
  {t:'Digastric',d:'2 bellies connected by intermediate tendon (through hyoid bone loop). Anterior belly: digastric fossa of mandible (CN V3 — mylohyoid nerve). Posterior belly: mastoid notch of temporal bone (CN VII). Action: depresses mandible + elevates hyoid. Forms floor of digastric triangle.',m:'"Digastric = 2 bellies, 2 nerves." Anterior = V3, Posterior = VII. Elevates hyoid during swallowing.'},
  {t:'Mylohyoid',d:'Origin: mylohyoid line of mandible. Insertion: hyoid body + median raphe. Action: elevates hyoid + floor of mouth (swallowing) + depresses mandible. Nerve: mylohyoid branch of inferior alveolar nerve (CN V3). Forms muscular floor of oral cavity.',m:'"Mylohyoid = FLOOR of mouth." Mylohyoid raphe forms midline. CN V3 (inferior alveolar branch).'},
  {t:'Geniohyoid',d:'Origin: mental spine (inferior mental spine) of mandible. Insertion: body of hyoid. Action: elevates + protrudes hyoid (swallowing), depresses mandible. Nerve: C1 via CN XII (hypoglossal nerve carries C1 fibers). Above mylohyoid.',m:'"Geniohyoid = above mylohyoid, same action." C1 via XII (unique nerve supply).'},
  {t:'Stylohyoid',d:'Origin: styloid process of temporal bone. Insertion: body of hyoid. Action: elevates and retracts hyoid during swallowing. Nerve: CN VII (facial). Splits around intermediate digastric tendon.',m:'"Stylohyoid = CN VII." Remember: posterior digastric ALSO CN VII.'},
  {t:'Thyrohyoid',d:'Origin: oblique line of thyroid cartilage. Insertion: inferior border of body + greater horn of hyoid. Action: elevates larynx + thyroid cartilage (swallowing) OR depresses hyoid when larynx fixed. Nerve: C1 via CN XII.',m:'"Thyrohyoid = elevates larynx." C1 via CN XII (same as geniohyoid).'},
  {t:'Sternohyoid',d:'Origin: manubrium + medial clavicle. Insertion: inferior border hyoid body. Action: depresses hyoid after swallowing. Nerve: ansa cervicalis (C1,C2,C3). One of infrahyoid (strap) muscles.',m:'"Strap muscles = ansa cervicalis (C1-C3)." Depress hyoid/larynx after elevation.'},
  {t:'Omohyoid',d:'2 bellies with intermediate tendon. Inferior belly: superior border of scapula (suprascapular notch region). Superior belly: body of hyoid. Action: depresses hyoid + tenses anterior cervical fascia. Nerve: ansa cervicalis.',m:'"Omohyoid = 2 bellies from SCAPULA to HYOID." Tenses cervical fascia → compresses internal jugular vein.'},
  {t:'Sternothyroid',d:'Origin: posterior manubrium. Insertion: oblique line of thyroid cartilage. Action: depresses larynx. Nerve: ansa cervicalis. Lies deep to sternohyoid.',m:'"Sternothyroid = deeper strap muscle, depresses larynx." Lies deep to sternohyoid.'},
  {t:'Scalenes (anterior, middle, posterior)',d:'Anterior: C3-C6 transverse processes → 1st rib (scalene tubercle). Middle: C2-C7 → 1st rib (posterior to anterior scalene). Posterior: C4-C6 → 2nd rib. Action: lateral flexion of neck + elevation of ribs 1–2 (accessory inspiration). Brachial plexus exits between anterior + middle scalenes.',m:'"Scalene triangle = brachial plexus + subclavian artery between ant + mid scalenes." Thoracic outlet.'},
  {t:'Sternocleidomastoid (SCM)',d:'2 heads: sternal (manubrium) + clavicular (medial 1/3 clavicle). Insertion: mastoid process + superior nuchal line. Both = flex cervical spine + extend head at atlantooccipital. Unilateral = ipsilateral lateral flex + contralateral rotation. Nerve: CN XI + C2-C3 (proprioception).',m:'"SCM: contract RIGHT SCM = head turns LEFT." Torticollis = wryneck. CN XI damage = dropped shoulder.'},
  {t:'Trapezius (upper, middle, lower)',d:'Largest back/neck muscle. Origin: EOP + nuchal lig + C7–T12 spinous processes. Upper → lateral clavicle (elevate scapula + extend/rotate head). Middle → acromion + spine of scapula (retract). Lower → medial spine of scapula (depress). Nerve: CN XI + C3-C4. Upward rotation of glenoid (all fibers).',m:'"Trapezius = 3 regions, 3 actions." CN XI = motor. Dropped shoulder if CN XI damaged. Key for overhead arm.'},
  {t:'Semispinalis capitis',d:'Origin: C4-T6 transverse processes + articular processes. Insertion: between superior + inferior nuchal lines of occipital bone. Action: extends head + neck, contralateral rotation. Nerve: posterior rami of cervical spinal nerves. Large belly in posterior neck.',m:'"Semispinalis capitis = BIG posterior neck muscle for extension." Between nuchal lines.'},
  {t:'Splenius capitis + cervicis',d:'Origin: nuchal ligament + C7–T6 spinous processes. Capitis → mastoid process + lateral superior nuchal line. Cervicis → C1-C3 transverse processes. Action: bilateral = extend head/neck; unilateral = ipsilateral rotation + lateral flexion. Nerve: posterior rami.',m:'"Splenius = strap across posterior neck." Unilateral = turns head SAME side (unlike SCM).'},
]},

// ══════════════════════════════════════════
// GROUP 7: ROTATOR CUFF + SHOULDER MUSCLES
// ══════════════════════════════════════════,section:'anatomy'},
{id:'muscles-shoulder', label:'Shoulder Muscles', icon:'🤸', color:'#b084f5', cards:[
  {t:'Supraspinatus',d:'Origin: supraspinous fossa of scapula. Insertion: superior facet of greater tubercle of humerus. Action: initiates abduction (0-15°), assists deltoid. Nerve: suprascapular nerve (C5,C6). Runs under coracoacromial arch (impingement zone). Most commonly torn RC muscle.',m:'"Supraspinatus = starts abduction." Most torn. Empty can test (Jobe). Under CA arch.'},
  {t:'Infraspinatus',d:'Origin: infraspinous fossa of scapula. Insertion: middle facet of greater tubercle. Action: lateral (external) rotation of humerus; GH joint stability. Nerve: suprascapular nerve (C5,C6). 2nd most commonly torn rotator cuff muscle.',m:'"Infraspinatus = external rotation." 2nd most torn. External rotation lag sign = large tear.'},
  {t:'Teres minor',d:'Origin: lateral border of scapula (upper 2/3). Insertion: inferior facet of greater tubercle. Action: lateral rotation; weak adduction; GH stabilizer. Nerve: axillary nerve (C5,C6). Works with infraspinatus.',m:'"Teres minor = ER, works with infraspinatus." Axillary nerve (same as deltoid).'},
  {t:'Subscapularis',d:'Origin: subscapular fossa (entire anterior surface of scapula). Insertion: lesser tubercle + subscapular bursa. Action: medial (internal) rotation + adduction; anterior GH stabilizer. Nerve: upper + lower subscapular nerves (C5,C6,C7). Most powerful internal rotator.',m:'"Subscapularis = ONLY anterior SITS." Most powerful IR. Lift-off test (Gerber).'},
  {t:'Deltoid',d:'3 parts (anterior, middle, posterior). Anterior: lateral clavicle → flex + medial rotate. Middle: acromion → abduct (15–180°). Posterior: spine of scapula → extend + lateral rotate. All insert: deltoid tuberosity. Nerve: axillary nerve (C5,C6).',m:'"Deltoid = 3 parts, triangular." Axillary nerve at surgical neck. Paralysis = flat shoulder.'},
  {t:'Teres major',d:'Origin: inferior angle of scapula. Insertion: medial lip of intertubercular groove (humerus). Action: medial rotation + adduction + extension of humerus ("little lat"). Nerve: lower subscapular nerve (C5,C6,C7). NOT part of rotator cuff.',m:'"Teres major = little latissimus." Medial IP intertubercular groove. Lower subscapular nerve.'},
  {t:'Coracobrachialis',d:'Origin: coracoid process (with short head biceps + pec minor). Insertion: medial shaft of humerus. Action: flexion + adduction of arm. Nerve: musculocutaneous nerve (C5,C6,C7). Musculocutaneous nerve pierces it.',m:'"Coracobrachialis = coracoid to arm, adducts + flexes." Musculocutaneous nerve pierces it.'},
  {t:'Pectoralis major',d:'Clavicular head (medial clavicle) + sternal head (sternum + costal cartilages 1-6). Insertion: lateral lip of bicipital groove (humerus). Clavicular = flexion. Sternal = extension from flexion. Both = adduction + medial rotation. Nerve: medial + lateral pectoral nerves (C5-T1).',m:'"Pec major = adducts + medially rotates." Lateral IP groove. "Pec major reversal" at 90° flexion.'},
  {t:'Pectoralis minor',d:'Origin: anterior surfaces of ribs 3-5 (or 2-4). Insertion: coracoid process. Action: protract + depress scapula + tilt anteriorly; elevates ribs 3-5 during forced inspiration. Nerve: medial pectoral nerve (C8,T1). Landmark for axillary artery (divides it into 3 parts).',m:'"Pec minor = divides axillary artery into 3 parts." Coracoid insertion. Medial pectoral nerve.'},
  {t:'Serratus anterior',d:'Origin: outer surfaces ribs 1-8/9 (lateral). Insertion: costal surface medial border + inferior angle of scapula. Action: protracts scapula; holds against thorax; UPWARD rotation; essential for arm elevation >90°. Nerve: long thoracic nerve (C5,C6,C7).',m:'"Long thoracic = serratus anterior." Winged scapula if paralyzed. "Boxer\'s muscle." C567 (die in heaven).'},
  {t:'Latissimus dorsi',d:'Origin: T7-L5 spinous processes, posterior iliac crest, lower 3-4 ribs, inferior angle of scapula. Insertion: floor of bicipital groove (medial lip of intertubercular groove). Action: extension + adduction + medial rotation of arm. Nerve: thoracodorsal nerve (C6,C7,C8).',m:'"Lat = swim stroke muscle (extension + adduction)." Thoracodorsal nerve. "Lady between two majors."'},
]},

// ══════════════════════════════════════════
// GROUP 8: ARM + FOREARM MUSCLES
// ══════════════════════════════════════════,section:'anatomy'},
{id:'muscles-arm', label:'Arm & Forearm Muscles', icon:'💪', color:'#52d18a', cards:[
  {t:'Biceps brachii',d:'Long head: supraglenoid tubercle (intra-articular tendon through bicipital groove). Short head: coracoid process. Insertion: radial tuberosity + bicipital aponeurosis (deep fascia). Action: elbow flexion + SUPINATION (most powerful supinator) + weak shoulder flexion. Nerve: musculocutaneous (C5,C6). "Biceps reflex = C5,C6."',m:'"Biceps = SUPINATION more than flexion." Long head rupture = Popeye sign. Bicipital aponeurosis protects brachial artery.'},
  {t:'Brachialis',d:'Origin: anterior distal humerus (lower 2/3). Insertion: coronoid process + ulnar tuberosity. Action: MOST POWERFUL elbow flexor (pure flexor — works in all forearm positions, unlike biceps). Nerve: musculocutaneous (C5,C6) + small contribution from radial nerve.',m:'"Brachialis = workhorse flexor." Works in pronation (unlike biceps). Radial nerve small contribution.'},
  {t:'Triceps brachii',d:'Long head: infraglenoid tubercle of scapula. Lateral head: posterior humerus (above radial groove). Medial head: posterior humerus (below radial groove). Insertion: olecranon process of ulna. Action: elbow extension (all heads) + arm adduction + extension (long head). Nerve: radial nerve (C6,C7,C8). "Triceps reflex = C7."',m:'"Triceps = C7 reflex." Radial nerve in radial groove → fracture = wrist drop.'},
  {t:'Anconeus',d:'Origin: lateral epicondyle of humerus. Insertion: lateral olecranon + posterior ulna. Action: assists triceps in elbow extension + elbow joint stabilizer. Nerve: radial nerve (C7,C8). Small triangular muscle.',m:'"Anconeus = assistant to triceps." Triangular, posterolateral elbow. Radial nerve.'},
